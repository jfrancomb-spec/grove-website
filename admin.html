<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grove | Admin</title>

  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" type="image/png" href="./MainIcon.png" />
</head>

<body>
  <!-- Shared header -->
  <div id="header-placeholder"></div>

<main class="admin-page">
  <section class="admin-section">
    <h1>Admin Dashboard</h1>
    <p class="admin-subtext">Review caregiver and family profiles.</p>
  </section>

  <section class="admin-section">
    <h2>Approval Needed</h2>
    <div id="pending-list" class="admin-list"></div>
  </section>

  <section class="admin-section">
    <h2>Approved</h2>
    <div id="approved-list" class="admin-list"></div>
  </section>

  <section class="admin-section">
    <h2>Denied</h2>
    <div id="denied-list" class="admin-list"></div>
  </section>
</main>
  
  <!-- Shared footer -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./app.js"></script>

  <!-- Page script -->
  <script>
    // =====================================================
    // Utility helpers
    // =====================================================
    function fmtDate(ts) {
      try {
        return new Date(ts).toLocaleString();
      } catch {
        return ts;
      }
    }

    function cardRow(title, lines) {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `<h3>${title}</h3>` + lines.map(line => `<p>${line}</p>`).join("");
      return div;
    }

    function renderEmptyOrError(box, error, emptyText, items) {
      box.innerHTML = "";

      if (error) {
        box.innerHTML = "<p>Unable to load right now.</p>";
        console.error(error);
        return true;
      }

      if (!items || items.length === 0) {
        box.innerHTML = `<p>${emptyText}</p>`;
        return true;
      }

      return false;
    }

    // =====================================================
    // Approve / Deny listing actions
    // =====================================================
    async function setJobPostStatus(id, approve) {
      const patch = approve
        ? { status: "approved", is_active: true }
        : { status: "denied", is_active: false };

      const { error } = await window.db
        .from("job_posts")
        .update(patch)
        .eq("id", id);

      if (error) {
        handleError(error, "Update failed");
        return;
      }

      await loadAdminData();
    }

async function setCaregiverPostStatus(id, approve) {
  const patch = approve
    ? { status: "approved", is_active: true }
    : { status: "denied", is_active: false };

  const { error } = await window.db
    .from("caregiver_profiles")
    .update(patch)
    .eq("id", id);

      if (error) {
        handleError(error, "Update failed");
        return;
      }

      await loadAdminData();
    }

    // =====================================================
    // Load all admin data
    // =====================================================
function renderAdminSection(container, profiles, sectionType) {
  if (!container) return;

  if (!profiles.length) {
    container.innerHTML = `<div class="admin-empty">No profiles in this section.</div>`;
    return;
  }

  container.innerHTML = profiles
    .map((profile) => {
      const roleLabel = profile.profile_type === "family" ? "Family" : "Caregiver";
      const badges = getAdminBadges(profile);

      const photoList =
        Array.isArray(profile.photo_urls) && profile.photo_urls.length
          ? profile.photo_urls.filter(Boolean)
          : profile.photo_url
            ? [profile.photo_url]
            : [];

      const mainPhoto = photoList.length
        ? `<img src="${escapeHtml(photoList[0])}" alt="${escapeHtml(profile.name_display || "Profile photo")}" class="admin-photo-main">`
        : `<div class="admin-photo-placeholder">No Photo</div>`;

      const photoStrip =
        photoList.length > 1
          ? `
            <div class="admin-photo-strip">
              ${photoList
                .slice(0, 5)
                .map(
                  (url) => `
                    <img
                      src="${escapeHtml(url)}"
                      alt="Profile photo"
                      class="admin-photo-thumb"
                    >
                  `
                )
                .join("")}
            </div>
          `
          : "";

      const caregiverDetails = `
        ${profile.location ? `<div class="admin-meta">${escapeHtml(profile.location)}</div>` : ""}
        ${
          Array.isArray(profile.care_types) && profile.care_types.length
            ? `<div class="admin-meta"><strong>Care Types:</strong> ${escapeHtml(profile.care_types.join(", "))}</div>`
            : ""
        }
        ${
          profile.years_experience
            ? `<div class="admin-meta"><strong>Experience:</strong> ${escapeHtml(profile.years_experience)}</div>`
            : ""
        }
        ${profile.email ? `<div class="admin-meta"><strong>Email:</strong> ${escapeHtml(profile.email)}</div>` : ""}
        ${profile.phone ? `<div class="admin-meta"><strong>Phone:</strong> ${escapeHtml(profile.phone)}</div>` : ""}
        ${profile.bio ? `<div><strong>Bio:</strong> ${escapeHtml(profile.bio)}</div>` : ""}
      `;

      const familyDetails = `
        ${profile.location ? `<div class="admin-meta">${escapeHtml(profile.location)}</div>` : ""}
        ${
          Array.isArray(profile.care_types_needed) && profile.care_types_needed.length
            ? `<div class="admin-meta"><strong>Care Needed:</strong> ${escapeHtml(profile.care_types_needed.join(", "))}</div>`
            : ""
        }
        ${
          profile.household_description
            ? `<div><strong>Household:</strong> ${escapeHtml(profile.household_description)}</div>`
            : ""
        }
        ${
          profile.children_description
            ? `<div><strong>Children:</strong> ${escapeHtml(profile.children_description)}</div>`
            : ""
        }
        ${
          profile.pets_description
            ? `<div><strong>Pets:</strong> ${escapeHtml(profile.pets_description)}</div>`
            : ""
        }
        ${profile.bio ? `<div><strong>Bio:</strong> ${escapeHtml(profile.bio)}</div>` : ""}
        ${profile.email ? `<div class="admin-meta"><strong>Email:</strong> ${escapeHtml(profile.email)}</div>` : ""}
        ${profile.phone ? `<div class="admin-meta"><strong>Phone:</strong> ${escapeHtml(profile.phone)}</div>` : ""}
      `;

      return `
        <div class="admin-card">
          <div class="admin-card-layout">
            <div class="admin-photo-column">
              ${mainPhoto}
              ${photoStrip}
            </div>

            <div class="admin-card-top">
              <div>
                <h3>${escapeHtml(profile.name_display || "Unnamed Profile")}</h3>
                <div class="admin-meta">${roleLabel}</div>

                ${profile.profile_type === "family" ? familyDetails : caregiverDetails}

                ${
                  badges.length
                    ? `<div class="admin-badges">
                        ${badges.map((badge) => `<span class="admin-badge">${escapeHtml(badge)}</span>`).join("")}
                      </div>`
                    : ""
                }
              </div>

              <div class="admin-actions">
                ${
                  sectionType !== "approved"
                    ? `<button class="button-admin button-approve" onclick="updateApprovalStatus('${profile.table_name}', '${profile.id}', 'approved')">Approve</button>`
                    : ""
                }
                ${
                  sectionType !== "denied"
                    ? `<button class="button-admin button-deny" onclick="updateApprovalStatus('${profile.table_name}', '${profile.id}', 'denied')">Deny</button>`
                    : ""
                }
                ${
                  sectionType !== "pending"
                    ? `<button class="button-admin" onclick="updateApprovalStatus('${profile.table_name}', '${profile.id}', 'pending')">Move to Pending</button>`
                    : ""
                }
                <button class="button-admin button-delete" onclick="deleteProfile('${profile.table_name}', '${profile.id}')">Delete</button>
              </div>
            </div>
          </div>
        </div>
      `;
    })
    .join("");
}
    
    async function loadAdminData() {
      // ---------------------------------
      // Care Requests
      // ---------------------------------
      const crBox = document.getElementById("careRequests");
      const { data: cr, error: crErr } = await window.db
        .from("care_requests")
        .select("*")
        .order("created_at", { ascending: false });

      if (!renderEmptyOrError(crBox, crErr, "No care requests yet.", cr)) {
        cr.forEach((x) => {
          crBox.appendChild(
            cardRow(`${x.name} (${fmtDate(x.created_at)})`, [
              `<strong>Email:</strong> ${x.email}`,
              `<strong>Type:</strong> ${x.care_type}`,
              `<strong>Location:</strong> ${x.location}`,
              `<strong>Schedule:</strong> ${x.schedule || ""}`,
              `${x.details || ""}`
            ])
          );
        });
      }

      // ---------------------------------
      // Job Listings
      // ---------------------------------
      const jpBox = document.getElementById("jobPostsAdmin");
      const { data: jp, error: jpErr } = await window.db
        .from("job_posts")
        .select("*")
        .order("created_at", { ascending: false });

      if (!renderEmptyOrError(jpBox, jpErr, "No job posts yet.", jp)) {
        jp.forEach((job) => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <h3>${job.title}</h3>
            <p><strong>Status:</strong> ${job.status || "(none)"}</p>
            <p><strong>Type:</strong> ${job.care_type}</p>
            <p><strong>Location:</strong> ${job.location}</p>
            <p><strong>Schedule:</strong> ${job.schedule}</p>
            ${job.pay_range ? `<p><strong>Pay:</strong> ${job.pay_range}</p>` : ``}
            <p>${job.description || ""}</p>
            <p style="font-size:13px;color:#777;">Posted ${fmtDate(job.created_at)}</p>

            <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;">
              <button class="button" type="button" data-approve="1">Approve</button>
              <button class="button" type="button" data-deny="1">Deny</button>
            </div>
          `;

          card.querySelector('[data-approve="1"]').addEventListener("click", () => {
            setJobPostStatus(job.id, true);
          });

          card.querySelector('[data-deny="1"]').addEventListener("click", () => {
            setJobPostStatus(job.id, false);
          });

          jpBox.appendChild(card);
        });
      }

      // ---------------------------------
      // Caregiver Listings
      // ---------------------------------
const cpBox = document.getElementById("caregiverPostsAdmin");
const { data: cp, error: cpErr } = await window.db
  .from("caregiver_profiles")
  .select("*")
  .order("created_at", { ascending: false });

      if (!renderEmptyOrError(cpBox, cpErr, "No caregiver posts yet.", cp)) {
        cp.forEach((cg) => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
${cg.photo_url ? `<img class="admin-photo" src="${cg.photo_url}" alt="${cg.name_display}">` : ``}
<h3>${cg.name_display} — ${cg.care_type}</h3>
<p><strong>Status:</strong> ${cg.status || "(none)"}</p>
<p><strong>Location:</strong> ${cg.location}</p>
${cg.availability ? `<p><strong>Availability:</strong> ${cg.availability}</p>` : ``}
<p>${cg.bio || ""}</p>
            <p style="font-size:13px;color:#777;">Posted ${fmtDate(cg.created_at)}</p>

            <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;">
              <button class="button" type="button" data-approve="1">Approve</button>
              <button class="button" type="button" data-deny="1">Deny</button>
            </div>
          `;

          card.querySelector('[data-approve="1"]').addEventListener("click", () => {
            setCaregiverPostStatus(cg.id, true);
          });

          card.querySelector('[data-deny="1"]').addEventListener("click", () => {
            setCaregiverPostStatus(cg.id, false);
          });

          cpBox.appendChild(card);
        });
      }

      // ---------------------------------
      // Caregiver Applications
      // ---------------------------------
      const caBox = document.getElementById("caregiverApps");
      const { data: ca, error: caErr } = await window.db
        .from("caregiver_applications")
        .select("*")
        .order("created_at", { ascending: false });

      if (!renderEmptyOrError(caBox, caErr, "No caregiver applications yet.", ca)) {
        ca.forEach((x) => {
          caBox.appendChild(
            cardRow(`${x.name} (${fmtDate(x.created_at)})`, [
              `<strong>Email:</strong> ${x.email}`,
              `<strong>Phone:</strong> ${x.phone}`,
              `<strong>Type:</strong> ${x.care_type}`,
              `<strong>Location:</strong> ${x.location}`,
              `${(x.experience || "").replace(/\n/g, "<br>")}`
            ])
          );
        });
      }

      // ---------------------------------
      // Job Applications
      // ---------------------------------
      const jaBox = document.getElementById("jobApps");
      const { data: ja, error: jaErr } = await window.db
        .from("job_applications")
        .select("*")
        .order("created_at", { ascending: false });

      if (!renderEmptyOrError(jaBox, jaErr, "No job applications yet.", ja)) {
        ja.forEach((x) => {
          jaBox.appendChild(
            cardRow(`${x.applicant_name} (${fmtDate(x.created_at)})`, [
              `<strong>Email:</strong> ${x.applicant_email}`,
              `<strong>Phone:</strong> ${x.applicant_phone}`,
              `<strong>Location:</strong> ${x.applicant_location}`,
              `<strong>Job ID:</strong> ${x.job_id}`,
              `${(x.message || "").replace(/\n/g, "<br>")}`
            ])
          );
        });
      }

      // ---------------------------------
      // Caregiver Requests
      // ---------------------------------
      const rqBox = document.getElementById("caregiverReqs");
      const { data: rq, error: rqErr } = await window.db
        .from("caregiver_requests")
        .select("*")
        .order("created_at", { ascending: false });

      if (!renderEmptyOrError(rqBox, rqErr, "No caregiver requests yet.", rq)) {
        rq.forEach((x) => {
          rqBox.appendChild(
            cardRow(`${x.requester_name} (${fmtDate(x.created_at)})`, [
              `<strong>Email:</strong> ${x.requester_email}`,
              `<strong>Phone:</strong> ${x.requester_phone}`,
              `<strong>Location:</strong> ${x.requester_location}`,
              `<strong>Schedule:</strong> ${x.schedule || ""}`,
              `<strong>Caregiver ID:</strong> ${x.caregiver_id}`,
              `${(x.message || "").replace(/\n/g, "<br>")}`
            ])
          );
        });
      }
    }

    // =====================================================
    // Auth / Init
    // =====================================================
    async function showDashboardIfLoggedIn() {
      const { data } = await window.db.auth.getSession();
      const session = data?.session;

      if (session) {
        document.getElementById("loginCard").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        await loadAdminData();
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      const loginForm = document.getElementById("loginForm");
      const loginMsg = document.getElementById("loginMsg");

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        loginMsg.style.display = "none";

        const email = document.getElementById("adminEmail").value;
        const password = document.getElementById("adminPassword").value;

        const { error } = await window.db.auth.signInWithPassword({ email, password });
        if (error) {
          handleError(error, "Login failed");
          return;
        }

        await showDashboardIfLoggedIn();
      });

      document.getElementById("signOutBtn")?.addEventListener("click", async () => {
        const { error } = await window.db.auth.signOut();
        if (error) {
          handleError(error, "Sign out failed");
          return;
        }

        location.reload();
      });

      showDashboardIfLoggedIn();
    });
  </script>
</body>
</html>
