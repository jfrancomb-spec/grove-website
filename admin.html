<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grove | Admin</title>

  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" type="image/png" href="./MainIcon.png" />
</head>

<body>
  <div id="header-placeholder"></div>

  <main class="admin-page">
    <section class="admin-section">
      <div class="flex-between">
        <div>
          <h1>Admin Moderation Dashboard</h1>
          <p class="admin-subtext">
            Review held and queued content, investigate flagged users, and resolve moderation decisions.
          </p>
          <p class="admin-subtext" id="adminSignedInText"></p>
        </div>

        <div class="button-row-inline">
          <a class="button button-secondary" href="./account.html">Back to Account</a>
          <button class="button" type="button" id="signOutBtn">Sign Out</button>
        </div>
      </div>
    </section>

    <section class="admin-section">
      <div id="dashboard">
        <div class="form-card">
          <div class="flex-between">
            <div>
              <h2 class="mb-0">Moderation Queue</h2>
              <p class="admin-subtext">
                Open items are newest moderation cases. Resolve with care.
              </p>
            </div>
          </div>

          <div class="dashboard-stats mt-22">
            <div class="dashboard-stat">
              <div class="dashboard-label">Open</div>
              <div class="dashboard-value" id="statOpen">0</div>
            </div>

            <div class="dashboard-stat">
              <div class="dashboard-label">In Review</div>
              <div class="dashboard-value" id="statInReview">0</div>
            </div>

            <div class="dashboard-stat">
              <div class="dashboard-label">Resolved</div>
              <div class="dashboard-value" id="statResolved">0</div>
            </div>

            <div class="dashboard-stat">
              <div class="dashboard-label">Flagged Users</div>
              <div class="dashboard-value" id="statFlaggedUsers">0</div>
            </div>
          </div>
        </div>

        <section class="admin-section">
          <h2>Open Queue</h2>
          <div id="open-list" class="admin-list"></div>
        </section>

        <section class="admin-section">
          <h2>In Review</h2>
          <div id="in-review-list" class="admin-list"></div>
        </section>

        <section class="admin-section">
          <h2>Resolved</h2>
          <div id="resolved-list" class="admin-list"></div>
        </section>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./app.js"></script>
  <script src="./grove-admin.js"></script>

  <script>
  (function () {
    let currentUser = null;

    async function requireAdminSession() {
      try {
        const user = await window.requireAdminUser?.();

        if (!user) {
          return null;
        }

        window.currentUser = user;
        return user;
      } catch (error) {
        console.error(error);
        window.location.href = "./account.html";
        return null;
      }
    }

    async function refreshAdminDashboard() {
      try {
        await window.GroveAdmin.loadQueueData();

        const stats = window.GroveAdmin.getStats();
        document.getElementById("statOpen").textContent = stats.open;
        document.getElementById("statInReview").textContent = stats.inReview;
        document.getElementById("statResolved").textContent = stats.resolved;
        document.getElementById("statFlaggedUsers").textContent = stats.flaggedUsers;

        const sections = window.GroveAdmin.getSections();

        const openList = document.getElementById("open-list");
        const inReviewList = document.getElementById("in-review-list");
        const resolvedList = document.getElementById("resolved-list");

        window.GroveAdmin.renderQueueSection(
          openList,
          sections.open,
          "No open moderation items."
        );

        window.GroveAdmin.renderQueueSection(
          inReviewList,
          sections.inReview,
          "No items currently in review."
        );

        window.GroveAdmin.renderQueueSection(
          resolvedList,
          sections.resolved,
          "No resolved moderation items yet."
        );

        window.GroveAdmin.bindActionButtons(document, async (action, id) => {
          try {
            await window.GroveAdmin.handleQueueAction(action, id);
            await refreshAdminDashboard();
          } catch (error) {
            console.error(error);
            handleError(error, "Admin action failed");
          }
        });
      } catch (error) {
        console.error(error);
        document.getElementById("open-list").innerHTML =
          "<p>Unable to load moderation queue.</p>";
        document.getElementById("in-review-list").innerHTML =
          "<p>Unable to load moderation queue.</p>";
        document.getElementById("resolved-list").innerHTML =
          "<p>Unable to load moderation queue.</p>";
      }
    }

    async function initPage() {
      currentUser = await requireAdminSession();
      if (!currentUser) return;

      const signedInText = document.getElementById("adminSignedInText");
      if (signedInText) {
        signedInText.textContent = `Signed in as ${currentUser.email}.`;
      }

      await refreshAdminDashboard();
    }

    window.addEventListener("DOMContentLoaded", () => {
      const signOutBtn = document.getElementById("signOutBtn");

      signOutBtn?.addEventListener("click", async () => {
        const { error } = await window.db.auth.signOut();

        if (error) {
          handleError(error, "Sign out failed");
          return;
        }

        window.location.href = "./login.html";
      });

      initPage();
    });
  })();
</script>
  
</body>
</html>
