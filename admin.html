<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grove | Admin</title>

  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" type="image/png" href="./MainIcon.png" />
</head>

<body>
  <div id="header-placeholder"></div>

  <main class="admin-page">
    <section class="admin-section">
      <h1>Admin Moderation Dashboard</h1>
      <p class="admin-subtext">
        Review held and queued content, investigate flagged users, and resolve moderation decisions.
      </p>
    </section>

    <section class="admin-section">
      <div class="form-card" id="loginCard" style="display:none;">
        <h2 class="mt-0">Admin Sign In</h2>

        <form id="loginForm">
          <div class="row">
            <input id="adminEmail" type="email" placeholder="Admin Email" required />
          </div>

          <div class="row">
            <input id="adminPassword" type="password" placeholder="Password" required />
          </div>

          <button class="button" type="submit">Sign In</button>
        </form>

        <p id="loginMsg" class="success" style="display:none;"></p>
      </div>

      <div id="dashboard" style="display:none;">
        <div class="form-card">
          <div class="flex-between">
            <div>
              <h2 class="mb-0">Moderation Queue</h2>
              <p class="admin-subtext">
                Open items are newest moderation cases. Resolve with care.
              </p>
            </div>

            <button class="button" type="button" id="signOutBtn">Sign Out</button>
          </div>

          <div class="dashboard-stats mt-22">
            <div class="dashboard-stat">
              <div class="dashboard-label">Open</div>
              <div class="dashboard-value" id="statOpen">0</div>
            </div>

            <div class="dashboard-stat">
              <div class="dashboard-label">In Review</div>
              <div class="dashboard-value" id="statInReview">0</div>
            </div>

            <div class="dashboard-stat">
              <div class="dashboard-label">Resolved</div>
              <div class="dashboard-value" id="statResolved">0</div>
            </div>

            <div class="dashboard-stat">
              <div class="dashboard-label">Flagged Users</div>
              <div class="dashboard-value" id="statFlaggedUsers">0</div>
            </div>
          </div>
        </div>

        <section class="admin-section">
          <h2>Open Queue</h2>
          <div id="open-list" class="admin-list"></div>
        </section>

        <section class="admin-section">
          <h2>In Review</h2>
          <div id="in-review-list" class="admin-list"></div>
        </section>

        <section class="admin-section">
          <h2>Resolved</h2>
          <div id="resolved-list" class="admin-list"></div>
        </section>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./app.js"></script>
  <script src="./grove-admin.js"></script>

  <script>
    (function () {
      async function refreshAdminDashboard() {
        try {
          await window.GroveAdmin.loadQueueData();

          const stats = window.GroveAdmin.getStats();
          document.getElementById("statOpen").textContent = stats.open;
          document.getElementById("statInReview").textContent = stats.inReview;
          document.getElementById("statResolved").textContent = stats.resolved;
          document.getElementById("statFlaggedUsers").textContent = stats.flaggedUsers;

          const sections = window.GroveAdmin.getSections();

          const openList = document.getElementById("open-list");
          const inReviewList = document.getElementById("in-review-list");
          const resolvedList = document.getElementById("resolved-list");

          window.GroveAdmin.renderQueueSection(
            openList,
            sections.open,
            "No open moderation items."
          );

          window.GroveAdmin.renderQueueSection(
            inReviewList,
            sections.inReview,
            "No items currently in review."
          );

          window.GroveAdmin.renderQueueSection(
            resolvedList,
            sections.resolved,
            "No resolved moderation items yet."
          );

          window.GroveAdmin.bindActionButtons(document, async (action, id) => {
            try {
              await window.GroveAdmin.handleQueueAction(action, id);
              await refreshAdminDashboard();
            } catch (error) {
              console.error(error);
              handleError(error, "Admin action failed");
            }
          });
        } catch (error) {
          console.error(error);
          document.getElementById("open-list").innerHTML =
            "<p>Unable to load moderation queue.</p>";
          document.getElementById("in-review-list").innerHTML =
            "<p>Unable to load moderation queue.</p>";
          document.getElementById("resolved-list").innerHTML =
            "<p>Unable to load moderation queue.</p>";
        }
      }

      async function showDashboardIfLoggedIn() {
        const adminUser = await window.GroveAdmin.loadSession();

        const loginCard = document.getElementById("loginCard");
        const dashboard = document.getElementById("dashboard");

        if (!adminUser) {
          loginCard.style.display = "block";
          dashboard.style.display = "none";
          return;
        }

        loginCard.style.display = "none";
        dashboard.style.display = "block";

        await refreshAdminDashboard();
      }

      window.addEventListener("DOMContentLoaded", () => {
        const loginForm = document.getElementById("loginForm");
        const loginMsg = document.getElementById("loginMsg");
        const signOutBtn = document.getElementById("signOutBtn");

        loginForm?.addEventListener("submit", async (e) => {
          e.preventDefault();
          if (loginMsg) loginMsg.style.display = "none";

          const email = document.getElementById("adminEmail").value.trim();
          const password = document.getElementById("adminPassword").value;

          const { error } = await window.db.auth.signInWithPassword({
            email,
            password
          });

          if (error) {
            handleError(error, "Login failed");
            return;
          }

          await showDashboardIfLoggedIn();
        });

        signOutBtn?.addEventListener("click", async () => {
          const { error } = await window.db.auth.signOut();

          if (error) {
            handleError(error, "Sign out failed");
            return;
          }

          location.reload();
        });

        showDashboardIfLoggedIn();
      });
    })();
  </script>
</body>
</html>
