<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grove | Request Caregiver</title>

  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" type="image/png" href="./MainIcon.png" />
</head>

<body>
  <!-- Shared header -->
  <div id="header-placeholder"></div>

  <main>
    <!-- HERO -->
    <div class="hero">
      <h1>Contact This Caregiver</h1>
      <div class="subtitle" id="caregiverSubtitle">Loading caregiver profile...</div>
    </div>

    <!-- REQUEST FORM -->
    <section>
      <div class="form-card">
        <h2 style="margin-top: 0;">Your Request</h2>

        <p style="margin-top: 0;">
          Share a few details so the caregiver can decide if the opportunity fits their availability.
        </p>

        <form id="requestForm">
          <div class="row">
            <input id="req_name" type="text" placeholder="Your Name" required />
          </div>

          <div class="row">
            <input id="req_email" type="email" placeholder="Email Address" required />
          </div>

          <div class="row">
            <input id="req_phone" type="text" placeholder="Phone Number" required />
          </div>

          <div class="row">
            <input id="req_location" type="text" placeholder="City or Neighborhood" required />
          </div>

          <div class="row">
            <input id="req_schedule" type="text" placeholder="Schedule Needed (days/times) (optional)" />
          </div>

          <div class="row">
            <textarea id="req_message" placeholder="Tell the caregiver about your needs (optional)"></textarea>
          </div>

          <button class="button" type="submit">Send Request</button>
        </form>

        <!-- Shown after successful submit -->
        <p id="requestSuccess" class="success">
          ✅ Request sent! If the caregiver is available and interested, they can reach out.
        </p>

        <p style="margin-top: 16px;">
          <a href="./caregivers.html">← Back to Caregivers</a>
        </p>
      </div>
    </section>
  </main>

  <!-- Shared footer -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./app.js"></script>

  <!-- Page script -->
  <script>
    async function loadCaregiverAndWireRequest() {
      const subtitle = document.getElementById("caregiverSubtitle");
      const form = document.getElementById("requestForm");

      const params = new URLSearchParams(window.location.search);
      const caregiverId = params.get("caregiver_id");

      if (!caregiverId) {
        subtitle.textContent = "Missing caregiver id.";
        return;
      }

      // Wait until window.db exists (guards load order)
      let tries = 0;
      while (!window.db && tries < 40) {
        await new Promise((r) => setTimeout(r, 50));
        tries++;
      }
      if (!window.db) {
        subtitle.textContent = "Database connection not ready. Please refresh.";
        return;
      }

      // Load caregiver basics
      const { data: caregiver, error } = await window.db
        .from("caregiver_posts")
        .select("id,name_first,care_type,location")
        .eq("id", caregiverId)
        .single();

      if (error || !caregiver) {
        subtitle.textContent = "Unable to load caregiver.";
        console.error(error);
        return;
      }

      subtitle.textContent = `${caregiver.name_first} • ${caregiver.care_type} • ${caregiver.location}`;

      // Submit request
      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const payload = {
          caregiver_id: caregiver.id,
          requester_name: document.getElementById("req_name")?.value || "",
          requester_email: document.getElementById("req_email")?.value || "",
          requester_phone: document.getElementById("req_phone")?.value || "",
          requester_location: document.getElementById("req_location")?.value || "",
          schedule: document.getElementById("req_schedule")?.value || "",
          message: document.getElementById("req_message")?.value || ""
        };

        const { error: insertError } = await window.db
          .from("caregiver_requests")
          .insert([payload]);

        if (insertError) {
          // handleError is defined in app.js
          handleError(insertError, "Request failed");
          return;
        }

        // showSuccess is defined in app.js
        showSuccess("requestSuccess", form);
      });
    }

    loadCaregiverAndWireRequest();
  </script>
</body>
</html>
