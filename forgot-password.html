<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Grove | Forgot Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" type="image/png" href="./MainIcon.png" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      color: #1f2937;
    }

    .forgot-page {
      max-width: 460px;
      margin: 80px auto;
      padding: 0 20px;
    }

    .forgot-card {
      background: white;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .forgot-card h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 10px;
    }

    .forgot-subtext {
      text-align: center;
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 15px;
      box-sizing: border-box;
    }

    .forgot-button {
      width: 100%;
      padding: 12px;
      background: #4f7fa8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .forgot-button:hover {
      background: #3f6c91;
    }

    .error-message {
      color: #b91c1c;
      margin-top: 12px;
      text-align: center;
      min-height: 20px;
    }

    .success-message {
      color: #166534;
      margin-top: 12px;
      text-align: center;
      min-height: 20px;
      line-height: 1.5;
    }

    .forgot-links {
      margin-top: 22px;
      text-align: center;
      font-size: 14px;
      color: #6b7280;
      line-height: 1.8;
    }

    .forgot-links a {
      color: #4f7fa8;
      text-decoration: none;
      font-weight: 600;
    }

    .forgot-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="forgot-page">
    <div class="forgot-card">
      <h1>Reset Your Password</h1>
      <p class="forgot-subtext">
        Enter your email address and we’ll send you a link to reset your Grove password.
      </p>

      <form id="forgotPasswordForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" autocomplete="email" required />
        </div>

        <button class="forgot-button" type="submit" id="forgotBtn">Send Reset Link</button>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
      </form>

      <div class="forgot-links">
        <div><a href="./login.html">Back to Login</a></div>
        <div>Need an account? <a href="./signup.html">Create one</a></div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./app.js"></script>

  <script>
    (function () {
      const form = document.getElementById("forgotPasswordForm");
      const forgotBtn = document.getElementById("forgotBtn");
      const errorMessage = document.getElementById("errorMessage");
      const successMessage = document.getElementById("successMessage");

      async function redirectIfSignedIn() {
        try {
          const { data, error } = await window.db.auth.getSession();

          if (error) {
            console.error(error);
            return;
          }

          if (data?.session?.user) {
            window.location.href = "./account.html";
          }
        } catch (error) {
          console.error("Session check failed:", error);
        }
      }

      async function handleForgotPassword(event) {
        event.preventDefault();

        errorMessage.textContent = "";
        successMessage.textContent = "";

        const email = document.getElementById("email").value.trim();

        if (!email) {
          errorMessage.textContent = "Please enter your email address.";
          return;
        }

        const originalText = forgotBtn.textContent;

        try {
          forgotBtn.disabled = true;
          forgotBtn.textContent = "Sending...";

          const resetUrl = `${window.location.origin}${window.location.pathname.replace("forgot-password.html", "reset-password.html")}`;

          const { error } = await window.db.auth.resetPasswordForEmail(email, {
            redirectTo: resetUrl
          });

          if (error) {
            errorMessage.textContent = error.message || "Unable to send reset email.";
            return;
          }

          successMessage.textContent =
            "If that email address is in Grove, a password reset link has been sent.";

          form.reset();
        } catch (error) {
          console.error(error);
          errorMessage.textContent = "Something went wrong while sending the reset email.";
        } finally {
          forgotBtn.disabled = false;
          forgotBtn.textContent = originalText;
        }
      }

      window.addEventListener("DOMContentLoaded", async () => {
        await redirectIfSignedIn();
        form?.addEventListener("submit", handleForgotPassword);
      });
    })();
  </script>
</body>
</html>
