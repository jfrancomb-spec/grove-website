<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grove | Caregiver Profile</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" type="image/png" href="./MainIcon.png" />
</head>

<body>
  <div id="header-placeholder"></div>

  <main>
    <div class="hero">
      <h1>Caregiver Profile</h1>
      <div class="subtitle">
        Sign in to create, review, and update your caregiver profile.
      </div>
    </div>

    <section>
      <div class="form-card" id="authCard">
        <h2 class="mt-0">Sign In</h2>
        <p class="mt-0">
          Enter your email and we’ll send you a secure sign-in link.
        </p>

        <div class="row">
          <input id="cg_auth_email" type="email" placeholder="Email Address" />
        </div>

        <button class="button" type="button" id="sendLinkBtn">Send Sign-In Link</button>

        <p id="authMessage" class="success"></p>
      </div>

<div class="form-card" id="profileCard" style="display:none;">
  <div class="flex-between">
    <h2 class="mb-0">Your Caregiver Dashboard</h2>
    <button class="button" type="button" id="signOutBtn">Sign Out</button>
  </div>

  <p class="mt-10" id="signedInText"></p>

  <div class="dashboard-stats">
    <div class="dashboard-stat">
      <div class="dashboard-label">Profile Status</div>
      <div class="dashboard-value" id="dashProfileStatus">—</div>
    </div>

    <div class="dashboard-stat">
      <div class="dashboard-label">Confirmed Encounters</div>
      <div class="dashboard-value" id="dashConfirmedEncounters">0</div>
    </div>

    <div class="dashboard-stat">
      <div class="dashboard-label">Average Response Time</div>
      <div class="dashboard-value" id="dashResponseTime">—</div>
    </div>

    <div class="dashboard-stat">
      <div class="dashboard-label">Messages</div>
      <div class="dashboard-value" id="dashMessages">0</div>
    </div>
  </div>

  <h3 class="mt-22">Your Profile</h3>

        <form id="caregiverProfileForm">
          <div class="row">
            <input id="cg_first_name" type="text" placeholder="First Name" required />
          </div>

          <div class="row">
            <input id="cg_last_name" type="text" placeholder="Last Name" required />
          </div>

          <div class="row">
            <input id="cg_email" type="email" placeholder="Best Email Address" required disabled />
          </div>

          <div class="row">
            <input id="cg_phone" type="text" placeholder="Phone Number" inputmode="numeric" />
          </div>

          <div class="row">
            <input id="cg_location" type="text" placeholder="City or Neighborhood" required />
          </div>

          <div class="row">
            <label class="mb-6"><strong>Types of Care You Provide</strong></label>
            <div class="checkbox-group">
              <label><input type="checkbox" name="cg_care_types" value="Childcare" /> Childcare</label>
              <label><input type="checkbox" name="cg_care_types" value="Senior Care" /> Senior Care</label>
              <label><input type="checkbox" name="cg_care_types" value="Pet Care" /> Pet Care</label>
              <label><input type="checkbox" name="cg_care_types" value="Household Help" /> Household Help</label>
              <label><input type="checkbox" name="cg_care_types" value="Other" /> Other</label>
            </div>
          </div>

          <div class="row">
            <select id="cg_years_experience" required>
              <option value="">Years of Experience</option>
              <option value="none">None</option>
              <option value="1-2">1–2</option>
              <option value="2-5">2–5</option>
              <option value="5-10">5–10</option>
              <option value="10+">10+</option>
            </select>
          </div>

          <div class="row">
            <input id="cg_availability" type="text" placeholder="Availability (days/times)" />
          </div>

          <div class="row">
            <label class="mb-6"><strong>Profile Details</strong></label>
            <div class="checkbox-group">
              <label><input id="cg_drivers_license" type="checkbox" /> Driver’s License</label>
              <label><input id="cg_cpr_certified" type="checkbox" /> CPR Certified</label>
              <label><input id="cg_non_smoker" type="checkbox" /> Non-Smoker</label>
              <label><input id="cg_non_vaper" type="checkbox" /> Non-Vaper</label>
              <label><input id="cg_comfortable_with_cats" type="checkbox" /> Comfortable with Cats</label>
              <label><input id="cg_comfortable_with_dogs" type="checkbox" /> Comfortable with Dogs</label>
            </div>
          </div>

          <div class="row">
            <label for="cg_photos"><strong>Profile Photos (up to 5)</strong></label>
            <input id="cg_photos" type="file" accept="image/*" multiple />
          </div>

          <div class="row" id="photoPreviewWrap" style="display:none;">
            <div id="photoPreviewList" class="photo-preview-list"></div>
          </div>

          <div class="row">
            <textarea id="cg_bio" placeholder="Tell families about your experience, personality, and the kind of care you provide" required></textarea>
          </div>

          <button class="button" type="submit">Save Profile</button>
        </form>

        <p id="caregiverProfileSuccess" class="success">
          ✅ Profile saved successfully.
        </p>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./app.js"></script>

  <script>
    let currentUser = null;
    let existingProfile = null;

    function formatPhoneNumber(value) {
      const digits = value.replace(/\D/g, "").slice(0, 10);
      if (digits.length === 0) return "";
      if (digits.length < 4) return digits;
      if (digits.length < 7) return `(${digits.slice(0, 3)}) ${digits.slice(3)}`;
      return `(${digits.slice(0, 3)}) ${digits.slice(3, 6)}-${digits.slice(6)}`;
    }

    function getSelectedCareTypes() {
      return Array.from(document.querySelectorAll('input[name="cg_care_types"]:checked'))
        .map(cb => cb.value);
    }

    function setSelectedCareTypes(careTypes) {
      const values = Array.isArray(careTypes) ? careTypes : [];
      document.querySelectorAll('input[name="cg_care_types"]').forEach(cb => {
        cb.checked = values.includes(cb.value);
      });
    }

    function renderPhotoPreview(urls) {
      const wrap = document.getElementById("photoPreviewWrap");
      const list = document.getElementById("photoPreviewList");
      if (!wrap || !list) return;

      list.innerHTML = "";
      if (!Array.isArray(urls) || urls.length === 0) {
        wrap.style.display = "none";
        return;
      }

      urls.forEach((url) => {
        const img = document.createElement("img");
        img.src = url;
        img.alt = "Profile photo";
        img.className = "preview-photo";
        list.appendChild(img);
      });

      wrap.style.display = "block";
    }

    async function sendMagicLink() {
      const email = document.getElementById("cg_auth_email").value.trim();
      const msg = document.getElementById("authMessage");

      if (!email) {
        alert("Please enter your email first.");
        return;
      }

const { error } = await window.db.auth.signInWithOtp({
  email,
  options: {
    emailRedirectTo: "https://jfrancomb-spec.github.io/grove-website/caregiver.html"
  }
});

      if (error) {
        handleError(error, "Sign-in link failed");
        return;
      }

      if (msg) {
        msg.textContent = "Check your email for a sign-in link.";
        msg.style.display = "block";
      }
    }

    async function loadOwnProfile() {
      if (!currentUser) return null;

      const { data, error } = await window.db
        .from("caregiver_profiles")
        .select("*")
        .eq("user_id", currentUser.id)
        .maybeSingle();

      if (error) {
        handleError(error, "Profile load failed");
        return null;
      }

      return data || null;
    }

    function fillProfileForm(profile) {
      existingProfile = profile;

      document.getElementById("dashProfileStatus").textContent =
  profile?.status ? profile.status.charAt(0).toUpperCase() + profile.status.slice(1) : "Draft";

document.getElementById("dashConfirmedEncounters").textContent =
  profile?.confirmed_encounters != null ? profile.confirmed_encounters : 0;

document.getElementById("dashResponseTime").textContent =
  profile?.average_response_minutes != null
    ? `${profile.average_response_minutes} min`
    : "—";

document.getElementById("dashMessages").textContent = "0";
      
      document.getElementById("cg_first_name").value = profile?.first_name || "";
      document.getElementById("cg_last_name").value = profile?.last_name || "";
      document.getElementById("cg_email").value = currentUser?.email || profile?.email || "";
      document.getElementById("cg_phone").value = profile?.phone || "";
      document.getElementById("cg_location").value = profile?.location || "";
      document.getElementById("cg_years_experience").value = profile?.years_experience || "";
      document.getElementById("cg_availability").value = profile?.availability || "";
      document.getElementById("cg_bio").value = profile?.bio || "";

      document.getElementById("cg_drivers_license").checked = !!profile?.has_drivers_license;
      document.getElementById("cg_cpr_certified").checked = !!profile?.cpr_certified;
      document.getElementById("cg_non_smoker").checked = !!profile?.non_smoker;
      document.getElementById("cg_non_vaper").checked = !!profile?.non_vaper;
      document.getElementById("cg_comfortable_with_cats").checked = !!profile?.comfortable_with_cats;
      document.getElementById("cg_comfortable_with_dogs").checked = !!profile?.comfortable_with_dogs;

      setSelectedCareTypes(profile?.care_types || []);
      renderPhotoPreview(profile?.photo_urls || (profile?.photo_url ? [profile.photo_url] : []));
    }

    async function uploadCaregiverPhotos(userId) {
      const photoInput = document.getElementById("cg_photos");
      const files = Array.from(photoInput?.files || []).slice(0, 5);

      if (!files.length) {
        return existingProfile?.photo_urls || (existingProfile?.photo_url ? [existingProfile.photo_url] : []);
      }

      const photoUrls = [];

      for (const file of files) {
        const safeName = file.name.replace(/\s+/g, "_");
        const filePath = `caregivers/${userId}/${Date.now()}_${Math.random().toString(36).slice(2)}_${safeName}`;

        const { error: uploadError } = await window.db
          .storage
          .from("profile-photos")
          .upload(filePath, file);

        if (uploadError) {
          handleError(uploadError, "Photo upload failed");
          return null;
        }

        const { data: publicData } = window.db
          .storage
          .from("profile-photos")
          .getPublicUrl(filePath);

        if (publicData?.publicUrl) {
          photoUrls.push(publicData.publicUrl);
        }
      }

      return photoUrls;
    }

    async function saveProfile(e) {
      e.preventDefault();

      if (!currentUser) {
        alert("Please sign in first.");
        return;
      }

      const careTypes = getSelectedCareTypes();
      if (!careTypes.length) {
        alert("Please select at least one type of care.");
        return;
      }

      const photoUrls = await uploadCaregiverPhotos(currentUser.id);
      if (photoUrls === null) return;

      const firstName = document.getElementById("cg_first_name").value.trim();
      const lastName = document.getElementById("cg_last_name").value.trim();

      const payload = {
        user_id: currentUser.id,
        first_name: firstName,
        last_name: lastName,
        name_display: `${firstName} ${lastName}`.trim(),
        email: currentUser.email || "",
        phone: document.getElementById("cg_phone").value.trim(),
        location: document.getElementById("cg_location").value.trim(),
        care_types: careTypes,
        care_type: careTypes[0] || "",
        years_experience: document.getElementById("cg_years_experience").value,
        availability: document.getElementById("cg_availability").value.trim(),
        has_drivers_license: document.getElementById("cg_drivers_license").checked,
        cpr_certified: document.getElementById("cg_cpr_certified").checked,
        non_smoker: document.getElementById("cg_non_smoker").checked,
        non_vaper: document.getElementById("cg_non_vaper").checked,
        comfortable_with_cats: document.getElementById("cg_comfortable_with_cats").checked,
        comfortable_with_dogs: document.getElementById("cg_comfortable_with_dogs").checked,
        bio: document.getElementById("cg_bio").value.trim(),
        photo_urls: photoUrls,
        photo_url: photoUrls[0] || null
      };

      const { error } = await window.db
        .from("caregiver_profiles")
        .upsert(payload, { onConflict: "user_id" });

      if (error) {
        handleError(error, "Profile save failed");
        return;
      }

      document.getElementById("caregiverProfileSuccess").style.display = "block";
      existingProfile = await loadOwnProfile();
      fillProfileForm(existingProfile);
    }

    async function signOut() {
      const { error } = await window.db.auth.signOut();
      if (error) {
        handleError(error, "Sign out failed");
        return;
      }
      window.location.href = "./caregiver.html";
    }

    async function checkSessionAndSetup() {
      const { data } = await window.db.auth.getSession();
      currentUser = data?.session?.user || null;

      const authCard = document.getElementById("authCard");
      const profileCard = document.getElementById("profileCard");
      const signedInText = document.getElementById("signedInText");
      const emailInput = document.getElementById("cg_email");
      const phoneInput = document.getElementById("cg_phone");

      phoneInput?.addEventListener("input", (e) => {
        e.target.value = formatPhoneNumber(e.target.value);
      });

      if (!currentUser) {
        authCard.style.display = "block";
        profileCard.style.display = "none";
        return;
      }

      authCard.style.display = "none";
      profileCard.style.display = "block";
signedInText.textContent = `Signed in as ${currentUser.email}. You can review and update your caregiver profile below.`;
      emailInput.value = currentUser.email || "";

      existingProfile = await loadOwnProfile();
      fillProfileForm(existingProfile);
    }

    window.addEventListener("DOMContentLoaded", () => {
      document.getElementById("sendLinkBtn")?.addEventListener("click", sendMagicLink);
      document.getElementById("signOutBtn")?.addEventListener("click", signOut);
      document.getElementById("caregiverProfileForm")?.addEventListener("submit", saveProfile);
      checkSessionAndSetup();
    });
  </script>
</body>
</html>
