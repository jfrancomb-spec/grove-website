<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grove | Caregiver Profile</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" type="image/png" href="./MainIcon.png" />
  <style>
    .profile-view-shell {
      max-width: 1100px;
      margin: 0 auto 48px;
      padding: 0 20px;
    }

    .profile-view-shell section {
      max-width: none;
      padding: 0;
    }

    .profile-view-grid {
      display: grid;
      gap: 24px;
    }

    .profile-view-card,
    .profile-view-empty {
      background: #fff;
      border: 1px solid var(--card-border);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    .profile-view-card {
      overflow: hidden;
    }

    .profile-hero-card {
      padding: 28px;
      background: linear-gradient(135deg, #f7fbfa 0%, #ffffff 55%, #eef7f4 100%);
    }

    .profile-hero-grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px;
      align-items: start;
    }

    .profile-avatar {
      width: 190px;
      height: 190px;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--card-border);
      background: #eef6f4;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #52606d;
      font-weight: 700;
      text-align: center;
      padding: 14px;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .profile-photo-stack {
      display: grid;
      gap: 12px;
      align-content: start;
      width: 280px;
    }

    .profile-photo-stack .profile-photo-gallery {
      display: grid;
      grid-template-columns: repeat(4, 56px);
      gap: 10px;
      align-items: center;
    }

    .profile-photo-stack .profile-photo-thumb {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--card-border);
      background: #eef6f4;
    }

    .profile-photo-stack .profile-photo-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .profile-eyebrow {
      margin: 0 0 8px;
      color: var(--caregiver);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .profile-name {
      margin: 0;
      font-size: 34px;
      line-height: 1.08;
      color: #102a43;
    }

    .profile-subtitle,
    .profile-body-copy,
    .profile-empty-copy {
      margin: 10px 0 0;
      color: #52606d;
      line-height: 1.6;
    }

    .profile-chip-row,
    .profile-badge-row,
    .profile-action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .profile-chip,
    .profile-signal {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #dbe7e3;
      color: #234;
      font-size: 14px;
      font-weight: 700;
    }

    .profile-chip-muted,
    .profile-signal-muted {
      color: #667788;
      background: #f8fbfa;
      font-weight: 600;
    }

    .profile-stats-grid,
    .profile-sections-grid {
      display: grid;
      gap: 16px;
    }

    .profile-stats-grid {
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      padding: 24px 28px 0;
    }

    .profile-stat,
    .profile-section {
      background: #fff;
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 18px;
    }

    .profile-stat-label {
      margin-bottom: 8px;
      color: #6b7280;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .profile-stat-value {
      color: #102a43;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
    }

    .profile-sections-grid {
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      padding: 0 28px 28px;
    }

    .profile-reviews-shell {
      padding: 0 28px 28px;
    }

    .profile-section h3 {
      margin: 0 0 12px;
      color: #102a43;
      font-size: 20px;
    }

    .review-rating {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      color: #102a43;
    }

    .review-stars {
      color: #d4a017;
      letter-spacing: 0.08em;
      font-size: 15px;
      line-height: 1;
    }

    .profile-list {
      margin: 0;
      padding-left: 20px;
      color: #345;
      line-height: 1.7;
    }

    .profile-list li + li {
      margin-top: 6px;
    }

    .profile-view-empty {
      padding: 28px;
    }

    .profile-actions-shell {
      padding: 0 28px 28px;
    }

    @media (max-width: 800px) {
      .profile-hero-grid {
        grid-template-columns: 1fr;
      }

      .profile-avatar {
        width: 150px;
        height: 150px;
      }

      .profile-photo-stack {
        width: 100%;
      }

      .profile-name {
        font-size: 28px;
      }

      .profile-stats-grid,
      .profile-sections-grid,
      .profile-reviews-shell,
      .profile-actions-shell {
        padding-left: 20px;
        padding-right: 20px;
      }
    }
  </style>
</head>

<body>
  <div id="header-placeholder"></div>

  <main>
    <div class="hero">
      <h1>Caregiver Profile</h1>
      <div class="subtitle" id="caregiverHeroSubtitle">
        Sign in to view your caregiver profile or create one.
      </div>
    </div>

    <div class="profile-view-shell">
      <section class="profile-view-grid">
        <div class="form-card" id="authCard">
          <h2 class="mt-0">Sign In</h2>
          <p class="mt-0">
            Enter your email and we'll send you a secure sign-in link so you can view your caregiver profile.
          </p>

          <div class="row">
            <input id="cg_auth_email" type="email" placeholder="Email Address" />
          </div>

          <button class="button button-caregiver" type="button" id="sendLinkBtn">Send Sign-In Link</button>
          <p id="authMessage" class="success"></p>
        </div>

        <div id="profileView" style="display:none;"></div>
      </section>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./app.js"></script>
  <script src="./grove-profiles.js"></script>
  <script src="./browse-helpers.js"></script>

  <script>
    (function () {
      let currentUser = null;
      let currentReviews = [];
      let bundle = {
        parent: null,
        visibleVersion: null,
        pendingVersion: null,
        workingVersion: null
      };

      function getDisplayName(profile) {
        return profile?.name_display || window.GroveProfiles.buildDefaultDisplayName({
          firstName: window.GroveProfiles.getAccountFirstName(currentUser, ""),
          lastName: window.GroveProfiles.getAccountLastName(currentUser, "")
        }) || "Your caregiver profile";
      }

      function getResponseReadiness(parent) {
        if (parent?.average_response_minutes != null) {
          return `${parent.average_response_minutes} min average`;
        }

        return "Building response history";
      }

      function buildSignals(profile) {
        const signals = [];

        if (profile?.has_drivers_license) signals.push("Driver's License");
        if (profile?.cpr_certified) signals.push("CPR Certified");
        if (profile?.non_smoker) signals.push("Non-smoker");
        if (profile?.non_vaper) signals.push("Non-vaper");
        if (profile?.comfortable_with_cats) signals.push("Comfortable with cats");
        if (profile?.comfortable_with_dogs) signals.push("Comfortable with dogs");

        return signals;
      }

      function formatExperienceLabel(value) {
        const experience = String(value || "").trim();
        if (!experience) return "";
        if (/^none$/i.test(experience)) return "None";
        if (/year/i.test(experience)) return experience;
        return `${experience} years`;
      }

      function buildStarsLabel(avgRating) {
        const numeric = Number(avgRating);
        if (Number.isNaN(numeric) || numeric <= 0) return "";
        return `${numeric.toFixed(1)} stars`;
      }

      function buildStarsMarkup(rating) {
        const numeric = Number(rating);
        if (Number.isNaN(numeric) || numeric <= 0) return "";
        const filledCount = Math.max(0, Math.min(5, Math.round(numeric)));
        const stars = `${"★".repeat(filledCount)}${"☆".repeat(5 - filledCount)}`;
        return `<span class="review-rating"><span class="review-stars" aria-hidden="true">${stars}</span><span>${buildStarsLabel(numeric)}</span></span>`;
      }

      function buildReviewSummary(reviews) {
        if (!Array.isArray(reviews) || !reviews.length) {
          return `<p class="profile-body-copy mt-0">No reviews yet.</p>`;
        }

        const ratings = reviews
          .map((review) => Number(review.rating))
          .filter((rating) => !Number.isNaN(rating));

        if (!ratings.length) {
          return `<p class="profile-body-copy mt-0">${reviews.length} review${reviews.length === 1 ? "" : "s"}</p>`;
        }

        const average = ratings.reduce((sum, rating) => sum + rating, 0) / ratings.length;

        return `
          <p class="profile-body-copy mt-0">
            ${buildStarsMarkup(average)} (${reviews.length} review${reviews.length === 1 ? "" : "s"})
          </p>
        `;
      }

      function buildReviews(reviews) {
        if (!Array.isArray(reviews) || !reviews.length) {
          return "";
        }

        const isMockOnly = reviews.every((review) => review.is_mock);

        return `
          ${isMockOnly ? `<p class="role-note">Sample reviews shown for preview.</p>` : ""}
          <div class="review-list">
            ${reviews.map((review) => `
              <div class="review-card">
                <p>
                  <strong>${review.reviewer_name || "Anonymous"}</strong>
                  ${review.rating ? ` - ${buildStarsMarkup(review.rating)}` : ""}
                </p>
                ${review.review_text ? `<p>${review.review_text}</p>` : ""}
              </div>
            `).join("")}
          </div>
        `;
      }

      function buildStat(label, value, extraHtml = "") {
        return `
          <div class="profile-stat">
            <div class="profile-stat-label">${label}</div>
            <div class="profile-stat-value">${value}</div>
            ${extraHtml}
          </div>
        `;
      }

      function buildList(items, emptyLabel) {
        if (!items.length) {
          return `<p class="profile-body-copy mt-0">${emptyLabel}</p>`;
        }

        return `
          <ul class="profile-list">
            ${items.map((item) => `<li>${item}</li>`).join("")}
          </ul>
        `;
      }

      function buildPhotoGallery(photos, displayName) {
        if (!Array.isArray(photos) || photos.length <= 1) {
          return "";
        }

        const galleryPhotos = photos.slice(1);
        if (!galleryPhotos.length) {
          return "";
        }

        return `
          <div class="profile-photo-gallery">
            ${galleryPhotos.map((photoUrl, index) => `
              <div class="profile-photo-thumb">
                <img src="${photoUrl}" alt="${displayName} photo ${index + 2}">
              </div>
            `).join("")}
          </div>
        `;
      }

      function getBackLinkConfig() {
        if (typeof window.getReturnNavigationConfig === "function") {
          return window.getReturnNavigationConfig({
            defaultHref: "./account.html",
            defaultLabel: "Back to Dashboard",
            returnMap: {
              apply: (params) => {
                const jobId = params.get("job_id");
                return {
                  href: jobId
                    ? `./apply.html?job_id=${encodeURIComponent(jobId)}`
                    : "./apply.html",
                  label: "Back to Application"
                };
              },
              "edit-caregiver": {
                href: "./edit-caregiver.html",
                label: "Back to Edit Caregiver Profile"
              }
            }
          });
        }

        return {
          href: "./account.html",
          label: "Back to Dashboard"
        };
      }

      function renderProfileView() {
        const container = document.getElementById("profileView");
        const profile = bundle.workingVersion;
        const backLink = getBackLinkConfig();

        if (!container) return;

        if (!profile) {
          container.innerHTML = `
            <div class="profile-view-empty">
              <h2 class="mt-0">Your caregiver profile is ready when you are.</h2>
              <p class="profile-empty-copy">
                Create your profile to show families your care style, experience, and availability.
              </p>
              <div class="profile-action-row mt-22">
                <a class="button button-caregiver" href="./edit-caregiver.html">Create Caregiver Profile</a>
                <a class="button button-secondary" href="${backLink.href}">${backLink.label}</a>
              </div>
            </div>
          `;
          container.style.display = "block";
          return;
        }

        const photos = window.GroveProfiles.getExistingPhotoUrls(profile);
        const displayName = getDisplayName(profile);
        const careTypes = Array.isArray(profile.care_types) ? profile.care_types : [];
        const signals = buildSignals(profile);

        container.innerHTML = `
          <div class="profile-view-card">
            <div class="profile-hero-card">
              <div class="profile-hero-grid">
                <div class="profile-photo-stack">
                  <div class="profile-avatar">
                    ${photos.length
                      ? `<img src="${photos[0]}" alt="${displayName}">`
                      : "<span>Add a photo in Edit Profile</span>"}
                  </div>
                  ${buildPhotoGallery(photos, displayName)}
                </div>

                <div>
                  <p class="profile-eyebrow">Profile Preview</p>
                  <h2 class="profile-name">${displayName}</h2>
                  <p class="profile-subtitle">
                    ${profile.location || "Add your location in Edit Profile"}
                  </p>

                  <div class="profile-chip-row mt-16">
                    <span class="profile-chip">${careTypes.length ? careTypes.join(", ") : "Add care types"}</span>
                    <span class="profile-chip profile-chip-muted">${getResponseReadiness(bundle.parent)}</span>
                  </div>

                  <div class="profile-badge-row mt-16">
                    ${signals.length
                      ? signals.map((signal) => `<span class="profile-signal">${signal}</span>`).join("")
                      : '<span class="profile-signal profile-signal-muted">Add trust signals in Edit Profile</span>'}
                  </div>
                </div>
              </div>
            </div>

            <div class="profile-stats-grid">
              ${buildStat(
                "Confirmed Encounters",
                bundle.parent?.confirmed_encounters != null ? String(bundle.parent.confirmed_encounters) : "0"
              )}
            </div>

            <div class="profile-sections-grid">
              <div class="profile-section">
                <h3>About You</h3>
                <p class="profile-body-copy mt-0">
                  ${profile.bio || "Add a warm introduction so families can get a feel for your care style."}
                </p>
              </div>

              <div class="profile-section">
                <h3>Care Fit</h3>
                ${buildList([
                  ...(careTypes.length ? [`Care types: ${careTypes.join(", ")}`] : []),
                  ...(profile.years_experience ? [`Experience: ${formatExperienceLabel(profile.years_experience)}`] : []),
                  ...(profile.availability ? [`Availability: ${profile.availability}`] : [])
                ], "Add care details in Edit Profile.")}
              </div>

              <div class="profile-section">
                <h3>Preferences and Household Comfort</h3>
                ${buildList(signals, "Add comfort and preference details in Edit Profile.")}
              </div>
            </div>

            <div class="profile-reviews-shell">
              <div class="profile-section">
                <h3>Reviews</h3>
                ${buildReviewSummary(currentReviews)}
                ${buildReviews(currentReviews)}
              </div>
            </div>

            <div class="profile-actions-shell">
              <div class="profile-action-row">
                <a class="button button-caregiver" href="./edit-caregiver.html">Edit Caregiver Profile</a>
                <a class="button button-secondary" href="${backLink.href}">${backLink.label}</a>
              </div>
            </div>
          </div>
        `;

        container.style.display = "block";
      }

      async function refreshView() {
        bundle = await window.GroveProfiles.loadProfileBundle({
          parentTable: "caregiver_profiles",
          versionTable: "caregiver_profile_versions",
          userId: currentUser.id
        });

        currentReviews = [];

        if (bundle.parent?.id) {
          const { data: reviews, error: reviewError } = await window.db
            .from("caregiver_reviews")
            .select("*")
            .eq("caregiver_profile_id", bundle.parent.id)
            .eq("is_visible", true)
            .in("content_status", ["visible", "approved", "published"])
            .order("created_at", { ascending: false });

          if (reviewError) {
            console.error(reviewError);
          } else {
            currentReviews = window.getDisplayReviews(
              "caregiver",
              { ...bundle.parent, ...bundle.workingVersion },
              reviews || []
            );
          }
        }

        renderProfileView();
      }

      async function sendMagicLink() {
        const email = document.getElementById("cg_auth_email").value.trim();
        const msg = document.getElementById("authMessage");

        if (!email) {
          alert("Please enter your email first.");
          return;
        }

        const { error } = await window.db.auth.signInWithOtp({
          email,
          options: {
            emailRedirectTo: "https://jfrancomb-spec.github.io/grove-website/caregiver.html"
          }
        });

        if (error) {
          handleError(error, "Sign-in link failed");
          return;
        }

        if (msg) {
          msg.textContent = "Check your email for a sign-in link.";
          msg.style.display = "block";
        }
      }

      async function init() {
        try {
          currentUser = await window.GroveProfiles.getCurrentUser();
          const authCard = document.getElementById("authCard");
          const subtitle = document.getElementById("caregiverHeroSubtitle");

          if (!currentUser) {
            if (authCard) authCard.style.display = "block";
            if (subtitle) {
              subtitle.textContent = "Sign in to view your caregiver profile or create one.";
            }
            return;
          }

          if (authCard) authCard.style.display = "none";
          if (subtitle) {
            subtitle.textContent = "Review how your caregiver profile appears to families.";
          }

          await refreshView();
        } catch (error) {
          handleError(error, "Unable to load caregiver profile");
        }
      }

      document.getElementById("sendLinkBtn")?.addEventListener("click", sendMagicLink);

      init();
    })();
  </script>
</body>
</html>
