<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Grove | Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" type="image/png" href="./MainIcon.png" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      color: #1f2937;
    }

    .login-page {
      max-width: 460px;
      margin: 80px auto;
      padding: 0 20px;
    }

    .login-card {
      background: white;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .login-card h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 10px;
    }

    .login-subtext {
      text-align: center;
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 15px;
      box-sizing: border-box;
    }

    .login-button {
      width: 100%;
      padding: 12px;
      background: #4f7fa8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .login-button:hover {
      background: #3f6c91;
    }

    .error-message {
      color: #b91c1c;
      margin-top: 12px;
      text-align: center;
      min-height: 20px;
    }

    .success-message {
      color: #166534;
      margin-top: 12px;
      text-align: center;
      min-height: 20px;
    }

    .login-links {
      margin-top: 22px;
      text-align: center;
      font-size: 14px;
      color: #6b7280;
      line-height: 1.8;
    }

    .login-links a {
      color: #4f7fa8;
      text-decoration: none;
      font-weight: 600;
    }

    .login-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="login-page">
    <div class="login-card">
      <h1>Login to Grove</h1>
      <p class="login-subtext">
        Sign in to manage your account, update profiles, view messages, and access Grove tools.
      </p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" autocomplete="email" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password" required />
        </div>

        <button class="login-button" type="submit" id="loginBtn">Login</button>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
      </form>

      <div class="login-links">
        <div><a href="./forgot-password.html">Forgot password?</a></div>
        <div>New to Grove? <a href="./signup.html">Create an account</a></div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./app.js"></script>

  <script>
    (function () {
      const form = document.getElementById("loginForm");
      const loginBtn = document.getElementById("loginBtn");
      const errorMessage = document.getElementById("errorMessage");
      const successMessage = document.getElementById("successMessage");

      async function redirectIfSignedIn() {
        try {
          const { data, error } = await window.db.auth.getSession();

          if (error) {
            console.error(error);
            return;
          }

          if (data?.session?.user) {
            const destination = await window.getPostLoginDestination(data.session.user.id, {
              forceChoiceOnMultiple: true
            });
            window.location.href = destination;
          }
        } catch (error) {
          console.error("Session check failed:", error);
        }
      }

      async function handleLogin(event) {
        event.preventDefault();

        errorMessage.textContent = "";
        successMessage.textContent = "";

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
          errorMessage.textContent = "Please enter your email and password.";
          return;
        }

        const originalText = loginBtn.textContent;

        try {
          loginBtn.disabled = true;
          loginBtn.textContent = "Signing in...";

          const { error } = await window.db.auth.signInWithPassword({
            email,
            password
          });

          if (error) {
            errorMessage.textContent = error.message || "Login failed.";
            return;
          }

          const user = await window.getCurrentSessionUser();
          const destination = await window.getPostLoginDestination(user?.id, {
            forceChoiceOnMultiple: true
          });

          successMessage.textContent = "Login successful. Redirecting...";
          window.location.href = destination;
        } catch (error) {
          console.error(error);
          errorMessage.textContent = "Something went wrong during sign in.";
        } finally {
          loginBtn.disabled = false;
          loginBtn.textContent = originalText;
        }
      }

      window.addEventListener("DOMContentLoaded", async () => {
        await redirectIfSignedIn();
        form?.addEventListener("submit", handleLogin);
      });
    })();
  </script>
</body>
</html>
