<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grove | Job Details</title>

  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" type="image/png" href="./MainIcon.png" />
</head>

<body>
  <div id="header-placeholder"></div>

  <main>
    <div class="hero">
      <h1 id="jobTitle">Job Details</h1>
      <div class="subtitle" id="jobSubtitle">Loading job details...</div>
    </div>

    <section>
      <div class="form-card" id="jobCard" style="display:none;">
        <div id="jobContent"></div>

        <div class="button-row mt-22" id="jobActions">
          <a class="button button-secondary" id="viewFamilyBtn" href="#" style="display:none;">View Family</a>
          <a class="button button-family" id="applyBtn" href="./login.html">Login to Apply</a>
          <a class="button button-secondary" id="backToSourceBtn" href="./jobs.html">Back to Jobs</a>
        </div>
      </div>

      <div id="jobError" style="display:none;">
        <p>Unable to load this job.</p>
        <p class="mt-16">
          <a id="errorBackLink" href="./jobs.html">Back to Jobs</a>
        </p>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./app.js"></script>

  <script>
    (function () {
      let currentUser = null;
      let caregiverProfileId = null;

      function escapeHtml(value) {
        if (value === null || value === undefined) return "";
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function isVisibleJobVersion(version) {
        if (!version) return false;

        const status = String(version.content_status || "").toLowerCase();
        const isLive = version.is_live === true;

        if (["deleted", "rejected", "flagged"].includes(status)) {
          return false;
        }

        if (isLive) return true;

        return ["published", "approved", "visible"].includes(status);
      }

      function getBackConfig() {
        const params = new URLSearchParams(window.location.search);
        const returnTo = (params.get("returnTo") || "").toLowerCase();

        if (returnTo === "messages") {
          const messageParams = new URLSearchParams();
          const profileType = params.get("profileType");
          const profileId = params.get("profileId");
          const conversationId = params.get("conversation");

          if (profileType) messageParams.set("profileType", profileType);
          if (profileId) messageParams.set("profileId", profileId);
          if (conversationId) messageParams.set("conversation", conversationId);

          return {
            href: `./messages.html${messageParams.toString() ? `?${messageParams.toString()}` : ""}`,
            label: "Back to Messages"
          };
        }

        if (returnTo === "account") {
          return {
            href: "./account.html",
            label: "Back to Dashboard"
          };
        }

        return {
          href: "./jobs.html",
          label: "Back to Jobs"
        };
      }

      function renderJob(parentRow, versionRow, familyProfileId, isSignedIn, applicationByJobId, conversationMetaByJobId) {
        const job = {
          ...parentRow,
          ...versionRow
        };

        const title = job.title || "Care Opportunity";
        const careType = job.care_type || "Not specified";
        const location = job.location || "Location not listed";
        const schedule = job.schedule || "Schedule not listed";
        const payRange = job.pay_range || "";
        const description = job.description || "";
        const postedDate = job.submitted_at || job.created_at
          ? new Date(job.submitted_at || job.created_at).toLocaleDateString()
          : "";

        document.getElementById("jobTitle").textContent = title;
        document.getElementById("jobSubtitle").textContent = `${location} • ${careType}`;

        document.getElementById("jobContent").innerHTML = `
          <p><strong>Location:</strong> ${escapeHtml(location)}</p>
          <p><strong>Care Type:</strong> ${escapeHtml(careType)}</p>
          <p><strong>Schedule:</strong> ${escapeHtml(schedule)}</p>
          ${payRange ? `<p><strong>Pay:</strong> ${escapeHtml(payRange)}</p>` : ""}
          ${postedDate ? `<p><strong>Posted:</strong> ${escapeHtml(postedDate)}</p>` : ""}
          ${description ? `<p><strong>Details:</strong></p><p>${escapeHtml(description)}</p>` : ""}
        `;

        const applyBtn = document.getElementById("applyBtn");
        const backConfig = getBackConfig();
        const backBtn = document.getElementById("backToSourceBtn");
        const existingApplication = applicationByJobId?.[parentRow.id] || null;
        const conversationMeta = conversationMetaByJobId?.[parentRow.id] || null;
        const isOwnJob = !!(currentUser?.id && parentRow.user_id && currentUser.id === parentRow.user_id);
        const applyHref = !isSignedIn
          ? "./login.html"
          : existingApplication
            ? window.buildJobApplicationMessagesHref({
                jobId: parentRow.id,
                targetUserId: parentRow.user_id,
                familyProfileId,
                caregiverProfileId,
                conversationId: conversationMeta?.conversationId || null
              })
            : `./apply.html?job_id=${encodeURIComponent(parentRow.id)}`;
        const applyLabel = !isSignedIn
          ? "Login to Apply"
          : existingApplication
            ? "View Application"
            : "Apply for this job";
        applyBtn.textContent = applyLabel;
        applyBtn.href = applyHref;
        applyBtn.className = "button button-family";
        applyBtn.removeAttribute("aria-disabled");
        applyBtn.removeAttribute("tabindex");
        applyBtn.removeAttribute("title");
        applyBtn.style.pointerEvents = "";
        applyBtn.style.opacity = "";
        applyBtn.style.cursor = "";
        applyBtn.onclick = null;

        if (isOwnJob) {
          applyBtn.textContent = "Apply for this job";
          applyBtn.removeAttribute("href");
          applyBtn.className = "button button-secondary button-disabled";
          applyBtn.setAttribute("aria-disabled", "true");
          applyBtn.setAttribute("tabindex", "-1");
          applyBtn.setAttribute("title", "You cannot apply to your own listing.");
          applyBtn.style.cursor = "not-allowed";
          applyBtn.onclick = function (event) {
            event.preventDefault();
            return false;
          };
        }

        const viewFamilyBtn = document.getElementById("viewFamilyBtn");
        if (familyProfileId) {
          viewFamilyBtn.style.display = "";
          viewFamilyBtn.href = `./family-profile.html?id=${encodeURIComponent(familyProfileId)}`;
        }

        if (backBtn) {
          backBtn.href = backConfig.href;
          backBtn.textContent = backConfig.label;
        }

        document.getElementById("jobCard").style.display = "block";
      }

      async function loadJobDetails() {
        const params = new URLSearchParams(window.location.search);
        const jobId = params.get("job_id");

        if (!jobId) {
          document.getElementById("jobError").style.display = "block";
          return;
        }

        let tries = 0;
        while (!window.db && tries < 40) {
          await new Promise((resolve) => setTimeout(resolve, 50));
          tries++;
        }

        if (!window.db) {
          document.getElementById("jobError").style.display = "block";
          return;
        }

        currentUser = await window.getCurrentSessionUser().catch(() => null);
        const isSignedIn = !!currentUser;
        caregiverProfileId = currentUser?.id
          ? await window.getCaregiverProfileParentIdForUser(currentUser.id).catch(() => null)
          : null;

        const { data: parentRow, error: parentError } = await window.db
          .from("job_posts")
          .select("id, user_id, title, care_type, location, schedule, description, pay_range, current_visible_version_id, content_status, created_at")
          .eq("id", jobId)
          .maybeSingle();

        if (parentError || !parentRow) {
          console.error(parentError);
          const errorBackLink = document.getElementById("errorBackLink");
          const backConfig = getBackConfig();
          if (errorBackLink) {
            errorBackLink.href = backConfig.href;
            errorBackLink.textContent = backConfig.label;
          }
          document.getElementById("jobError").style.display = "block";
          return;
        }

        let versionRow = null;
        if (parentRow.current_visible_version_id) {
          const { data, error } = await window.db
            .from("job_post_versions")
            .select("*")
            .eq("id", parentRow.current_visible_version_id)
            .maybeSingle();

          if (!error && isVisibleJobVersion(data)) {
            versionRow = data;
          }
        }

        let familyProfileId = null;
        if (parentRow.user_id) {
          const { data: familyRow, error: familyError } = await window.db
            .from("family_profiles")
            .select("id, user_id, current_visible_version_id, is_active")
            .eq("user_id", parentRow.user_id)
            .not("current_visible_version_id", "is", null)
            .eq("is_active", true)
            .maybeSingle();

          if (!familyError && familyRow?.id) {
            familyProfileId = familyRow.id;
          }
        }

        let applicationByJobId = {};
        let conversationMetaByJobId = {};

        if (isSignedIn && currentUser?.email) {
          try {
            const uiState = await window.getJobApplicationUiState({
              currentUser,
              caregiverProfileId,
              jobIds: [parentRow.id]
            });
            applicationByJobId = uiState.applicationByJobId || {};
            conversationMetaByJobId = uiState.conversationMetaByJobId || {};
          } catch (error) {
            console.error(error);
          }
        }

        renderJob(parentRow, versionRow, familyProfileId, isSignedIn, applicationByJobId, conversationMetaByJobId);
      }

      window.addEventListener("DOMContentLoaded", loadJobDetails);
    })();
  </script>
</body>
</html>
