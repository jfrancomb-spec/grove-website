<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grove | Apply</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="icon" type="image/png" href="./MainIcon.png">
</head>
<body>

<div id="header-placeholder"></div>

<div class="hero">
  <h1>Apply for this Job</h1>
  <div class="subtitle" id="jobSubtitle">Loading job details...</div>
</div>

<section>
  <div class="form-card">
    <h2 style="margin-top:0;">Your Info</h2>

    <form id="applyForm">
      <div class="row"><input id="app_name" type="text" placeholder="Your Name" required></div>
      <div class="row"><input id="app_email" type="email" placeholder="Email Address" required></div>
      <div class="row"><input id="app_phone" type="text" placeholder="Phone Number" required></div>
      <div class="row"><input id="app_location" type="text" placeholder="City or Neighborhood" required></div>
      <div class="row"><textarea id="app_message" placeholder="Message to the family (experience, availability, questions)" required></textarea></div>

      <button class="button" type="submit">Submit Application</button>
    </form>

    <p id="applySuccess" class="success">✅ Application sent! Grove will contact you soon.</p>
  </div>
</section>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="./app.js"></script>

<script>
async function loadJobAndWireApply() {
  const params = new URLSearchParams(window.location.search);
  const jobId = params.get("job_id");
  if (!jobId) {
    document.getElementById("jobSubtitle").textContent = "Missing job id.";
    return;
  }

  // Load job details for display
  const { data: job, error } = await window.db
    .from("job_posts")
    .select("id,title,care_type,location,schedule")
    .eq("id", jobId)
    .single();

  if (error || !job) {
    document.getElementById("jobSubtitle").textContent = "Unable to load job details.";
    console.error(error);
    return;
  }

  document.getElementById("jobSubtitle").textContent =
    `${job.title} • ${job.care_type} • ${job.location} • ${job.schedule}`;

  const form = document.getElementById("applyForm");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const payload = {
      job_id: job.id,
      applicant_name: document.getElementById("app_name").value,
      applicant_email: document.getElementById("app_email").value,
      applicant_phone: document.getElementById("app_phone").value,
      applicant_location: document.getElementById("app_location").value,
      message: document.getElementById("app_message").value,
    };

    const { error: insErr } = await window.db.from("job_applications").insert([payload]);

    if (insErr) {
      alert("Application failed. Please try again.");
      console.error(insErr);
      return;
    }

    document.getElementById("applySuccess").style.display = "block";
    form.style.display = "none";
    document.getElementById("applySuccess").scrollIntoView({ behavior: "smooth" });
  });
}

loadJobAndWireApply();
</script>

</body>
</html>
