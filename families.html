<script>
  (function () {
    let allFamilies = [];
    let reviewMap = {};

    function formatDisplayName(profile) {
      const first = profile.first_name || "";
      const lastInitial = profile.last_name ? `${profile.last_name.charAt(0)}.` : "";
      return `${first} ${lastInitial}`.trim();
    }

    function careTypesNeededText(profile) {
      if (Array.isArray(profile.care_types_needed) && profile.care_types_needed.length) {
        return profile.care_types_needed.join(", ");
      }
      return "";
    }

    function buildStars(avg) {
      if (!avg) return "";
      const rounded = Math.round(avg * 10) / 10;
      return `⭐ ${rounded}`;
    }

    function getReviewSummary(familyId) {
      const reviews = reviewMap[familyId] || [];
      if (!reviews.length) return "";

      const avg = reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length;

      return `
        <p><strong>Rating:</strong> ${buildStars(avg)} (${reviews.length} review${reviews.length === 1 ? "" : "s"})</p>
      `;
    }

    function getRecentReview(familyId) {
      const reviews = reviewMap[familyId] || [];
      if (!reviews.length) return "";

      const latest = reviews[0];
      if (!latest.review_text) return "";

      return `
        <p><strong>Recent Review:</strong> “${latest.review_text}”</p>
      `;
    }

    function buildHomeBadges(profile) {
      const badges = [];

      if (profile.has_cats) badges.push("Cats in Home");
      if (profile.has_dogs) badges.push("Dogs in Home");
      if (profile.smoking_in_home) badges.push("Smoking in Home");
      if (profile.driving_needed) badges.push("Driving Needed");

      if (!badges.length) return "";

      return `
        <div class="profile-badges">
          ${badges.map((badge) => `<span class="profile-badge">${badge}</span>`).join("")}
        </div>
      `;
    }

    function buildPhotoGallery(profile) {
      const photos = Array.isArray(profile.photo_urls) && profile.photo_urls.length
        ? profile.photo_urls.filter(Boolean)
        : (profile.photo_url ? [profile.photo_url] : []);

      if (!photos.length) return "";

      return `
        <div class="profile-photo-gallery" data-family-gallery>
          <img
            class="profile-main-photo"
            src="${photos[0]}"
            alt="${formatDisplayName(profile)}"
            data-main-photo
          >
          ${
            photos.length
              ? `
                <div class="profile-gallery">
                  ${photos
                    .map((photo, index) => `
                      <button
                        type="button"
                        class="profile-thumb-button${index === 0 ? " active" : ""}"
                        data-thumb-index="${index}"
                        data-photo="${photo}"
                        aria-label="View photo ${index + 1}"
                      >
                        <img src="${photo}" alt="Family photo ${index + 1}">
                      </button>
                    `)
                    .join("")}
                </div>
              `
              : ""
          }
        </div>
      `;
    }

    function wireCardGallery(card) {
      const gallery = card.querySelector("[data-family-gallery]");
      if (!gallery) return;

      const mainPhoto = gallery.querySelector("[data-main-photo]");
      const thumbButtons = gallery.querySelectorAll("[data-thumb-index]");

      thumbButtons.forEach((button) => {
        button.addEventListener("click", () => {
          const newPhoto = button.getAttribute("data-photo");
          if (!mainPhoto || !newPhoto) return;

          mainPhoto.src = newPhoto;

          thumbButtons.forEach((btn) => btn.classList.remove("active"));
          button.classList.add("active");
        });
      });
    }

    function buildActionButtons(profile) {
      const profileBtn = `
        <a class="button" href="./family-profile.html?id=${profile.id}">
          View Profile
        </a>
      `;

      const messageBtn = profile.user_id
        ? `
          <a class="button" href="./messages.html?user=${profile.user_id}">
            Message This Family
          </a>
        `
        : "";

      return `
        <div class="caregiver-actions">
          ${profileBtn}
          ${messageBtn}
        </div>
      `;
    }

    function renderFamilies(list) {
      const container = document.getElementById("familiesContainer");
      const countEl = document.getElementById("famCount");

      if (countEl) {
        countEl.innerHTML = `<strong>${list.length} family profile(s) shown</strong>`;
      }

      container.innerHTML = "";

      if (!list.length) {
        container.innerHTML = "<p>No families match those filters yet.</p>";
        return;
      }

      list.forEach((profile) => {
        const card = document.createElement("div");
        card.className = "card caregiver-card";

        const displayName = formatDisplayName(profile);
        const careTypesNeeded = careTypesNeededText(profile);

        const responseTime =
          profile.average_response_minutes != null
            ? `${profile.average_response_minutes} min average response`
            : "";

        const encounters =
          profile.confirmed_encounters != null
            ? `${profile.confirmed_encounters} confirmed encounter${profile.confirmed_encounters === 1 ? "" : "s"}`
            : "";

        card.innerHTML = `
          ${buildPhotoGallery(profile)}
          <h3>${displayName}</h3>
          ${profile.location ? `<p><strong>Location:</strong> ${profile.location}</p>` : ``}
          ${careTypesNeeded ? `<p><strong>Care Needed:</strong> ${careTypesNeeded}</p>` : ``}
          ${responseTime ? `<p><strong>Response Time:</strong> ${responseTime}</p>` : ``}
          ${encounters ? `<p><strong>Confirmed Encounters:</strong> ${encounters}</p>` : ``}
          ${getReviewSummary(profile.id)}
          ${getRecentReview(profile.id)}
          ${buildHomeBadges(profile)}
          ${profile.household_description ? `<p>${profile.household_description}</p>` : ``}
          ${buildActionButtons(profile)}
        `;

        container.appendChild(card);
        wireCardGallery(card);
      });
    }

    function applyFilters() {
      const typeVal = (document.getElementById("famFilterType")?.value || "").trim().toLowerCase();
      const locVal = (document.getElementById("famFilterLocation")?.value || "").trim().toLowerCase();
      const keyVal = (document.getElementById("famFilterKeyword")?.value || "").trim().toLowerCase();

      const filtered = allFamilies.filter((profile) => {
        const careTypesNeeded = Array.isArray(profile.care_types_needed)
          ? profile.care_types_needed.join(" ").toLowerCase()
          : "";

        const location = (profile.location || "").trim().toLowerCase();
        const household = (profile.household_description || "").trim().toLowerCase();
        const children = (profile.children_description || "").trim().toLowerCase();
        const pets = (profile.pets_description || "").trim().toLowerCase();

        const badgeText = [
          profile.has_cats ? "cats in home" : "",
          profile.has_dogs ? "dogs in home" : "",
          profile.smoking_in_home ? "smoking in home" : "",
          profile.driving_needed ? "driving needed" : ""
        ].join(" ").toLowerCase();

        const typeOk = !typeVal || careTypesNeeded.includes(typeVal);
        const locOk = !locVal || location.includes(locVal);
        const keyOk =
          !keyVal ||
          careTypesNeeded.includes(keyVal) ||
          household.includes(keyVal) ||
          children.includes(keyVal) ||
          pets.includes(keyVal) ||
          badgeText.includes(keyVal) ||
          location.includes(keyVal);

        return typeOk && locOk && keyOk;
      });

      renderFamilies(filtered);
    }

    async function loadReviews() {
      const { data: reviewData, error: reviewError } = await window.db
        .from("family_reviews")
        .select("*")
        .eq("is_visible", true)
        .order("created_at", { ascending: false });

      if (reviewError) {
        console.error(reviewError);
        reviewMap = {};
        return;
      }

      reviewMap = {};
      (reviewData || []).forEach((review) => {
        if (!reviewMap[review.family_profile_id]) {
          reviewMap[review.family_profile_id] = [];
        }
        reviewMap[review.family_profile_id].push(review);
      });
    }

    async function loadFamiliesOnce() {
      let tries = 0;
      while (!window.db && tries < 40) {
        await new Promise((resolve) => setTimeout(resolve, 50));
        tries++;
      }

      const container = document.getElementById("familiesContainer");

      if (!window.db) {
        container.innerHTML = "<p>Database connection not ready. Please refresh.</p>";
        return;
      }

      const { data, error } = await window.db
        .from("family_profiles")
        .select("*")
        .eq("is_active", true)
        .eq("approval_status", "approved")
        .order("created_at", { ascending: false });

      if (error) {
        container.innerHTML = "<p>Unable to load families right now.</p>";
        console.error(error);
        return;
      }

      allFamilies = data || [];
      await loadReviews();
      applyFilters();
    }

    function wireEvents() {
      document.getElementById("famApplyBtn")?.addEventListener("click", applyFilters);

      document.getElementById("famClearBtn")?.addEventListener("click", () => {
        document.getElementById("famFilterType").value = "";
        document.getElementById("famFilterLocation").value = "";
        document.getElementById("famFilterKeyword").value = "";
        applyFilters();
      });

      document.getElementById("famFilterType")?.addEventListener("change", applyFilters);
      document.getElementById("famFilterLocation")?.addEventListener("input", applyFilters);
      document.getElementById("famFilterKeyword")?.addEventListener("input", applyFilters);
    }

    window.addEventListener("DOMContentLoaded", () => {
      wireEvents();
      loadFamiliesOnce();
    });
  })();
</script>
