<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Grove | My Postings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" type="image/png" href="./MainIcon.png" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Arial, sans-serif;
      background: #f5f7fa;
      color: #1f2937;
    }

    body.button-theme-caregiver {
      background: var(--caregiver-light);
    }

    body.button-theme-family {
      background: var(--family-light);
    }

    .page {
      max-width: 1160px;
      margin: 0 auto 40px;
      padding: 0 20px 40px;
    }

    .postings-hero {
      margin-bottom: 24px;
    }

    body.button-theme-caregiver .postings-hero {
      background: #dcefe9;
    }

    body.button-theme-family .postings-hero {
      background: #ddeaf6;
    }

    .jobs-card {
      background: white;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      margin-bottom: 24px;
      border: 1px solid transparent;
    }

    body.button-theme-family .jobs-card {
      border-color: #d9e6f1;
    }

    body.button-theme-caregiver .jobs-card {
      border-color: #d6ebe7;
    }

    .jobs-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .jobs-card-subtext {
      margin: 0;
      color: #6b7280;
      line-height: 1.5;
    }

    .button {
      appearance: none;
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-family: Calibri, Candara, "Segoe UI", Arial, sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .button-family {
      background: #4f7fa8;
      color: white;
    }

    .button-family:hover {
      background: #426d91;
    }

    .my-jobs-loading,
    .my-jobs-message,
    .my-jobs-empty {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      color: #4b5563;
    }

    .my-jobs-message.error {
      background: #fef2f2;
      border-color: #fecaca;
      color: #991b1b;
    }

    .my-jobs-message.success {
      background: #ecfdf5;
      border-color: #bbf7d0;
      color: #166534;
    }

    .my-jobs-groups {
      display: grid;
      gap: 14px;
    }

    .my-jobs-group h3 {
      margin: 0 0 8px;
      font-size: 18px;
      color: #111827;
    }

    .my-jobs-grid {
      display: grid;
      gap: 10px;
    }

    .job-card {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      background: #fff;
    }

    .job-card-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .job-card-side {
      display: grid;
      justify-items: end;
      gap: 6px;
    }

    .job-card-header {
      min-width: 0;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .job-card-header-copy {
      min-width: 0;
    }

    .job-card h4 {
      margin: 0 0 3px;
      font-size: 18px;
      color: #111827;
      line-height: 1.2;
    }

    .job-meta-line {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.3;
    }

    .job-card-photo {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      object-fit: cover;
      object-position: center;
      display: block;
      border: 1px solid #e5e7eb;
      background: #eef2f7;
      justify-self: start;
    }

    .job-details p {
      margin: 0 0 4px;
      font-size: 14px;
      line-height: 1.35;
      color: #374151;
    }

    .job-actions {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .job-application-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      background: #fff7ed;
      color: #9a3412;
    }

    .job-action-button {
      appearance: none;
      border: none;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .job-action-button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .job-action-edit {
      background: #4f7fa8;
      color: white;
    }

    .job-action-edit:hover {
      background: #426d91;
    }

    .job-action-deactivate {
      background: #e5e7eb;
      color: #111827;
    }

    .job-action-deactivate:hover {
      background: #d1d5db;
    }

    .job-action-reactivate {
      background: #409088;
      color: white;
    }

    .job-action-reactivate:hover {
      background: #347872;
    }

    .job-action-applicants {
      background: #4f7fa8;
      color: white;
    }

    .job-action-applicants:hover {
      background: #426d91;
    }

    .job-action-applicants-disabled {
      background: #e5e7eb;
      color: #6b7280;
      cursor: not-allowed;
    }

    .job-action-applicants-disabled:hover {
      background: #e5e7eb;
      color: #6b7280;
    }

    .my-jobs-empty p {
      margin-top: 0;
      margin-bottom: 14px;
    }

    .error-box {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 18px;
      display: none;
    }

    @media (max-width: 640px) {
      .page {
        margin-top: 24px;
      }

      .jobs-card {
        padding: 16px;
      }

      .job-card-top,
      .jobs-card-header {
        grid-template-columns: 1fr;
      }

      .job-card-side {
        justify-items: start;
      }

      .job-card-header {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .job-card-photo {
        width: 64px;
        height: 64px;
      }
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main>
    <div class="hero postings-hero">
      <h1>My Postings</h1>
      <div class="subtitle">
        Review your posted jobs, preview what caregivers see, and jump into applicants.
      </div>
    </div>

    <div class="page">
      <div id="errorBox" class="error-box"></div>

      <section class="jobs-card" id="jobsCard">
        <div class="jobs-card-header">
          <div>
            <h2>Your Job Posts</h2>
            <p class="jobs-card-subtext">
              Manage the care requests you have posted through Grove.
            </p>
          </div>

          <a class="button button-family" href="./findcare.html">Post a New Job</a>
        </div>

        <div id="myJobsLoading" class="my-jobs-loading" style="display:none;">
          Loading your job posts...
        </div>

        <div id="myJobsMessage" class="my-jobs-message" style="display:none;"></div>

        <div id="myJobsGroups" class="my-jobs-groups"></div>
      </section>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./app.js"></script>
  <script src="./grove-profiles.js"></script>

  <script>
    (function () {
      const errorBox = document.getElementById("errorBox");
      const myJobsLoading = document.getElementById("myJobsLoading");
      const myJobsMessage = document.getElementById("myJobsMessage");
      const myJobsGroups = document.getElementById("myJobsGroups");

      let currentUser = null;
      let currentUserId = null;
      let currentFamilyProfileId = null;
      let jobActionInProgress = false;

      function hideError() {
        if (!errorBox) return;
        errorBox.style.display = "none";
        errorBox.textContent = "";
      }

      function showError(message) {
        if (!errorBox) return;
        errorBox.textContent = message;
        errorBox.style.display = "block";
      }

      async function requireSession() {
        const user = await window.getCurrentSessionUser().catch(() => null);
        if (!user) {
          window.location.href = "./login.html";
          return null;
        }
        return { user };
      }

      async function getActiveFamilyProfile(userId) {
        const { data, error } = await window.db
          .from("family_profiles")
          .select("id, user_id, current_visible_version_id, current_pending_version_id, is_active")
          .eq("user_id", userId)
          .maybeSingle();

        if (error) throw error;
        return data || null;
      }

      function setMyJobsLoading(isLoading) {
        myJobsLoading.style.display = isLoading ? "block" : "none";
      }

      function showMyJobsMessage(message, isError, isSuccess) {
        let className = "my-jobs-message";
        if (isError) className += " error";
        if (isSuccess) className += " success";

        myJobsMessage.textContent = message;
        myJobsMessage.className = className;
        myJobsMessage.style.display = "block";
      }

      function clearMyJobsMessage() {
        myJobsMessage.textContent = "";
        myJobsMessage.className = "my-jobs-message";
        myJobsMessage.style.display = "none";
      }

      function generateFallbackJobTitle(careType) {
        const normalized = String(careType || "").toLowerCase();

        if (normalized === "childcare") return "Childcare Needed";
        if (normalized === "senior care") return "Senior Care Needed";
        if (normalized === "pet care") return "Pet Care Needed";
        if (normalized === "household help") return "Household Help Needed";

        return "Care Needed";
      }

      function formatDate(value) {
        if (!value) return "Unknown";

        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "Unknown";

        return date.toLocaleDateString([], {
          year: "numeric",
          month: "short",
          day: "numeric"
        });
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function getJobApplicantsMessagesHref(jobId) {
        const params = new URLSearchParams({
          profileType: "family",
          jobFilter: jobId
        });

        if (currentFamilyProfileId) {
          params.set("profileId", currentFamilyProfileId);
        }

        return `./messages.html?${params.toString()}`;
      }

      function deriveJobStatus(job, visibleVersion, pendingVersion) {
        if (!job.is_active && job.content_status !== "deleted") {
          return {
            key: "inactive",
            label: "Inactive",
            reason: job.status_reason || "This job post is not currently active.",
            group: "inactive"
          };
        }

        if (pendingVersion) {
          if (pendingVersion.content_status === "queued") {
            return {
              key: "queued",
              label: "Pending Review",
              reason: pendingVersion.status_reason || pendingVersion.review_status || "This job post is waiting for moderation review.",
              group: "pending"
            };
          }

          if (pendingVersion.content_status === "flagged") {
            return {
              key: "flagged",
              label: "Flagged",
              reason: pendingVersion.moderation_reason || pendingVersion.status_reason || "This job post was flagged for review.",
              group: "attention"
            };
          }

          if (pendingVersion.content_status === "rejected") {
            return {
              key: "rejected",
              label: "Rejected",
              reason: pendingVersion.rejection_reason || pendingVersion.moderation_reason || pendingVersion.status_reason || "This job post needs changes before it can go live.",
              group: "attention"
            };
          }
        }

        if (visibleVersion && visibleVersion.content_status === "published" && visibleVersion.is_live) {
          return {
            key: "published",
            label: "Published",
            reason: visibleVersion.status_reason || "This job post is live and visible to caregivers.",
            group: "live"
          };
        }

        if (job.content_status === "queued") {
          return {
            key: "queued",
            label: "Pending Review",
            reason: job.status_reason || "This job post is waiting for moderation review.",
            group: "pending"
          };
        }

        if (job.content_status === "rejected") {
          return {
            key: "rejected",
            label: "Rejected",
            reason: job.status_reason || "This job post needs changes before it can go live.",
            group: "attention"
          };
        }

        return {
          key: "draft",
          label: "Draft",
          reason: job.status_reason || "This job post is not yet published.",
          group: "inactive"
        };
      }

      function normalizeJob(job, versionsById, applicantMetaByJobId) {
        const visibleVersion = job.current_visible_version_id
          ? versionsById[job.current_visible_version_id] || null
          : null;

        const pendingVersion = job.current_pending_version_id
          ? versionsById[job.current_pending_version_id] || null
          : null;

        const displayVersion = pendingVersion || visibleVersion || null;
        const jobPhotoUrls = window.GroveProfiles?.getExistingPhotoUrls(displayVersion || job) || [];
        const statusMeta = deriveJobStatus(job, visibleVersion, pendingVersion);

        return {
          id: job.id,
          title: (displayVersion && displayVersion.title) || job.title || generateFallbackJobTitle(job.care_type),
          careType: (displayVersion && displayVersion.care_type) || job.care_type || "",
          location: (displayVersion && displayVersion.location) || job.location || "",
          schedule: (displayVersion && displayVersion.schedule) || job.schedule || "",
          description: (displayVersion && displayVersion.description) || job.description || "",
          payRange: (displayVersion && displayVersion.pay_range) || job.pay_range || "",
          jobPhotoUrl: jobPhotoUrls[0] || "",
          updatedAt: job.updated_at,
          isActive: job.is_active === true,
          hasApplicants: applicantMetaByJobId?.[job.id]?.hasApplicants === true,
          hasNewApplication: applicantMetaByJobId?.[job.id]?.hasNewApplication === true,
          statusKey: statusMeta.key,
          group: statusMeta.group
        };
      }

      function buildJobCard(job) {
        const card = document.createElement("article");
        card.className = "job-card status-" + job.statusKey;

        const updatedText = formatDate(job.updatedAt);
        const jobPhotoHtml = job.jobPhotoUrl
          ? '<img class="job-card-photo" src="' + escapeHtml(job.jobPhotoUrl) + '" alt="' + escapeHtml(job.title || "Job photo") + '">'
          : '';

        let actionsHtml =
          '<a class="job-action-button job-action-edit" href="./findcare.html?job_post_id=' + encodeURIComponent(job.id) + '">Edit</a>';

        actionsHtml +=
          '<a class="job-action-button job-action-edit" href="./job-details.html?job_id=' + encodeURIComponent(job.id) + '&returnTo=my-jobs">Preview Job</a>';

        if (job.hasApplicants) {
          actionsHtml +=
            '<a class="job-action-button job-action-applicants" href="' + getJobApplicantsMessagesHref(job.id) + '">View Applications</a>';
        } else {
          actionsHtml +=
            '<span class="job-action-button job-action-applicants-disabled" aria-disabled="true">No Applicants Yet</span>';
        }

        if (job.isActive) {
          actionsHtml +=
            '<button class="job-action-button job-action-deactivate" type="button" data-job-action="deactivate" data-job-id="' + escapeHtml(job.id) + '">Deactivate</button>';
        } else {
          actionsHtml +=
            '<button class="job-action-button job-action-reactivate" type="button" data-job-action="reactivate" data-job-id="' + escapeHtml(job.id) + '">Reactivate</button>';
        }

        card.innerHTML =
          '<div class="job-card-top">' +
            '<div class="job-card-header">' +
              jobPhotoHtml +
              '<div class="job-card-header-copy">' +
              '<h4>' + escapeHtml(job.title) + '</h4>' +
              '<div class="job-meta-line">' +
                (job.careType ? '<span>' + escapeHtml(job.careType) + '</span>' : '') +
                (job.location ? '<span>' + (job.careType ? ' • ' : '') + escapeHtml(job.location) + '</span>' : '') +
              '</div>' +
              '</div>' +
            '</div>' +
            '<div class="job-card-side">' +
              (job.hasNewApplication
                ? '<span class="job-application-badge">New application</span>'
                : '') +
            '</div>' +
          '</div>' +
          '<div class="job-details">' +
            (job.schedule ? '<p><strong>Schedule:</strong> ' + escapeHtml(job.schedule) + '</p>' : '') +
            (job.payRange ? '<p><strong>Pay:</strong> ' + escapeHtml(job.payRange) + '</p>' : '') +
            (job.description ? '<p><strong>Details:</strong> ' + escapeHtml(job.description) + '</p>' : '') +
            '<p><strong>Updated:</strong> ' + escapeHtml(updatedText) + '</p>' +
          '</div>' +
          '<div class="job-actions">' + actionsHtml + '</div>';

        return card;
      }

      function renderEmptyJobs() {
        myJobsGroups.innerHTML =
          '<div class="my-jobs-empty">' +
            '<p>You have not posted any care requests yet.</p>' +
            '<a class="button button-family" href="./findcare.html">Post Your First Job</a>' +
          '</div>';
      }

      function renderJobGroups(jobs) {
        myJobsGroups.innerHTML = "";

        const grouped = {
          live: jobs.filter((job) => job.group === "live"),
          pending: jobs.filter((job) => job.group === "pending"),
          attention: jobs.filter((job) => job.group === "attention"),
          inactive: jobs.filter((job) => job.group === "inactive")
        };

        const sections = [
          { key: "live", title: "Live" },
          { key: "pending", title: "Pending Review" },
          { key: "attention", title: "Needs Attention" },
          { key: "inactive", title: "Inactive" }
        ];

        let renderedAny = false;

        sections.forEach((section) => {
          const items = grouped[section.key];
          if (!items.length) return;

          renderedAny = true;

          const wrapper = document.createElement("div");
          wrapper.className = "my-jobs-group";

          if (section.key !== "live") {
            const heading = document.createElement("h3");
            heading.textContent = section.title;
            wrapper.appendChild(heading);
          }

          const grid = document.createElement("div");
          grid.className = "my-jobs-grid";

          items.forEach((job) => {
            grid.appendChild(buildJobCard(job));
          });

          wrapper.appendChild(grid);
          myJobsGroups.appendChild(wrapper);
        });

        if (!renderedAny) {
          renderEmptyJobs();
        }
      }

      async function setJobActiveState(jobId, shouldBeActive) {
        if (!currentUserId) {
          throw new Error("No signed-in user found.");
        }

        const { data, error } = await window.db.functions.invoke("toggle-job-post-active-state", {
          body: {
            job_post_id: jobId,
            is_active: shouldBeActive
          }
        });

        if (error) {
          throw new Error(error.message || "Unable to update job status.");
        }

        if (!data?.success) {
          throw new Error(data?.error || "Unable to update job status.");
        }

        return data;
      }

      async function loadMyJobs(userId) {
        if (!userId) return;

        setMyJobsLoading(true);
        clearMyJobsMessage();
        myJobsGroups.innerHTML = "";

        try {
          const familyProfile = await getActiveFamilyProfile(userId);
          currentFamilyProfileId = familyProfile?.id || null;

          const { data: rows, error } = await window.db
            .from("job_posts")
            .select("id, user_id, title, care_type, location, schedule, description, pay_range, is_active, content_status, status_reason, current_visible_version_id, current_pending_version_id, updated_at")
            .eq("user_id", userId)
            .order("updated_at", { ascending: false });

          if (error) {
            throw error;
          }

          let applicantMetaByJobId = {};

          if (familyProfile?.id && rows?.length) {
            const { data: participantRows, error: participantError } = await window.db
              .from("conversation_participants")
              .select("conversation_id, has_unread_visible_messages, last_read_at, user_id")
              .eq("user_id", userId)
              .eq("is_archived", false);

            if (participantError) {
              throw participantError;
            }

            const participantMetaByConversationId = {};
            (participantRows || []).forEach((row) => {
              if (!row?.conversation_id) return;
              participantMetaByConversationId[row.conversation_id] = row;
            });

            const conversationIds = Object.keys(participantMetaByConversationId);

            if (conversationIds.length) {
              const { data: familyConversations, error: familyConversationsError } = await window.db
                .from("conversations")
                .select("id, family_profile_id, job_post_id, status, last_visible_message_at")
                .in("id", conversationIds)
                .eq("family_profile_id", familyProfile.id)
                .eq("status", "active");

              if (familyConversationsError) {
                throw familyConversationsError;
              }

              const relevantConversations = (familyConversations || []).filter((conversation) => !!conversation.job_post_id);
              const relevantConversationIds = relevantConversations.map((conversation) => conversation.id);
              let messagesByConversationId = {};

              if (relevantConversationIds.length) {
                const { data: messages, error: messagesError } = await window.db
                  .from("messages")
                  .select("conversation_id, sender_user_id, created_at, received_at, sent_at")
                  .in("conversation_id", relevantConversationIds)
                  .order("created_at", { ascending: true });

                if (messagesError) {
                  throw messagesError;
                }

                (messages || []).forEach((message) => {
                  if (!messagesByConversationId[message.conversation_id]) {
                    messagesByConversationId[message.conversation_id] = [];
                  }
                  messagesByConversationId[message.conversation_id].push(message);
                });
              }

              relevantConversations.forEach((conversation) => {
                if (!conversation.job_post_id) return;
                const participantMeta = participantMetaByConversationId[conversation.id];
                const threadMessages = messagesByConversationId[conversation.id] || [];
                const lastMessage = threadMessages.length ? threadMessages[threadMessages.length - 1] : null;
                const latestMessageTime = lastMessage?.received_at || lastMessage?.sent_at || lastMessage?.created_at || conversation.last_visible_message_at || null;
                const hasUnreadFromFlag = participantMeta?.has_unread_visible_messages === true;
                const hasUnreadFromLatestMessage = !!(
                  lastMessage &&
                  lastMessage.sender_user_id &&
                  lastMessage.sender_user_id !== userId &&
                  latestMessageTime &&
                  (!participantMeta?.last_read_at || new Date(latestMessageTime) > new Date(participantMeta.last_read_at))
                );

                const existingMeta = applicantMetaByJobId[conversation.job_post_id] || {
                  hasApplicants: false,
                  hasNewApplication: false
                };

                applicantMetaByJobId[conversation.job_post_id] = {
                  hasApplicants: true,
                  hasNewApplication: existingMeta.hasNewApplication || hasUnreadFromFlag || hasUnreadFromLatestMessage
                };
              });
            }
          }

          const versionIds = [];
          rows.forEach((job) => {
            if (job.current_visible_version_id) versionIds.push(job.current_visible_version_id);
            if (job.current_pending_version_id) versionIds.push(job.current_pending_version_id);
          });

          const uniqueVersionIds = Array.from(new Set(versionIds));
          const versionsById = {};

          if (uniqueVersionIds.length) {
            const { data: versions, error: versionError } = await window.db
              .from("job_post_versions")
              .select("id, job_post_id, version_number, title, care_type, location, schedule, description, pay_range, photo_urls, content_status, review_status, moderation_reason, rejection_reason, is_live, approved_at, submitted_at, updated_at, status_reason")
              .in("id", uniqueVersionIds);

            if (versionError) {
              throw versionError;
            }

            (versions || []).forEach((row) => {
              versionsById[row.id] = row;
            });
          }

          const normalized = (rows || [])
            .map((job) => normalizeJob(job, versionsById, applicantMetaByJobId))
            .sort((a, b) => {
              if (a.hasNewApplication !== b.hasNewApplication) {
                return a.hasNewApplication ? -1 : 1;
              }

              if (a.hasApplicants !== b.hasApplicants) {
                return a.hasApplicants ? -1 : 1;
              }

              const aTime = a.updatedAt ? new Date(a.updatedAt).getTime() : 0;
              const bTime = b.updatedAt ? new Date(b.updatedAt).getTime() : 0;
              return bTime - aTime;
            });

          renderJobGroups(normalized);
        } catch (error) {
          console.error("Failed loading jobs:", error);
          showMyJobsMessage(error.message || "Unable to load your job posts.", true, false);
        } finally {
          setMyJobsLoading(false);
        }
      }

      async function handleJobActionClick(event) {
        const button = event.target.closest("[data-job-action]");
        if (!button) return;

        const action = button.getAttribute("data-job-action");
        const jobId = button.getAttribute("data-job-id");

        if (!action || !jobId || jobActionInProgress) return;

        try {
          jobActionInProgress = true;
          clearMyJobsMessage();

          const buttons = myJobsGroups.querySelectorAll("[data-job-action]");
          buttons.forEach((el) => {
            el.disabled = true;
          });

          if (action === "deactivate") {
            await setJobActiveState(jobId, false);
            showMyJobsMessage("Job post deactivated.", false, true);
          } else if (action === "reactivate") {
            await setJobActiveState(jobId, true);
            showMyJobsMessage("Job post reactivated.", false, true);
          }

          await loadMyJobs(currentUserId);
        } catch (error) {
          console.error(error);
          showMyJobsMessage(error.message || "Unable to update job status.", true, false);
        } finally {
          jobActionInProgress = false;
        }
      }

      async function initPage() {
        hideError();

        const session = await requireSession();
        if (!session) return;

        currentUser = session.user;
        currentUserId = currentUser.id;

        const availableRoles = await window.getAvailableActingRoles(currentUser.id);
        const actingRole = window.resolveActingRole(availableRoles);
        if (actingRole) {
          window.setStoredActingRole(actingRole);
        }

        if (actingRole === "caregiver") {
          window.location.href = "./my-applications.html";
          return;
        }

        await loadMyJobs(currentUser.id);
        window.updateHeaderAuth?.();
      }

      myJobsGroups?.addEventListener("click", handleJobActionClick);
      window.addEventListener("DOMContentLoaded", initPage);
    })();
  </script>
</body>
</html>
