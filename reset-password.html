<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Grove | Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" type="image/png" href="./MainIcon.png" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      color: #1f2937;
    }

    .reset-page {
      max-width: 460px;
      margin: 80px auto;
      padding: 0 20px;
    }

    .reset-card {
      background: white;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .reset-card h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 10px;
    }

    .reset-subtext {
      text-align: center;
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 15px;
      box-sizing: border-box;
    }

    .reset-button {
      width: 100%;
      padding: 12px;
      background: #409088;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .reset-button:hover {
      background: #347872;
    }

    .reset-button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .error-message {
      color: #b91c1c;
      margin-top: 12px;
      text-align: center;
      min-height: 20px;
      line-height: 1.5;
    }

    .success-message {
      color: #166534;
      margin-top: 12px;
      text-align: center;
      min-height: 20px;
      line-height: 1.5;
    }

    .reset-links {
      margin-top: 22px;
      text-align: center;
      font-size: 14px;
      color: #6b7280;
      line-height: 1.8;
    }

    .reset-links a {
      color: #4f7fa8;
      text-decoration: none;
      font-weight: 600;
    }

    .reset-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="reset-page">
    <div class="reset-card">
      <h1>Set a New Password</h1>
      <p class="reset-subtext" id="resetSubtext">
        Enter your new password below.
      </p>

      <form id="resetPasswordForm">
        <div class="form-group">
          <label for="password">New Password</label>
          <input type="password" id="password" autocomplete="new-password" required />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <input type="password" id="confirmPassword" autocomplete="new-password" required />
        </div>

        <button class="reset-button" type="submit" id="resetBtn">Update Password</button>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
      </form>

      <div class="reset-links">
        <div><a href="./login.html">Back to Login</a></div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./app.js"></script>

  <script>
    (function () {
      const form = document.getElementById("resetPasswordForm");
      const resetBtn = document.getElementById("resetBtn");
      const errorMessage = document.getElementById("errorMessage");
      const successMessage = document.getElementById("successMessage");
      const resetSubtext = document.getElementById("resetSubtext");

      async function ensureRecoverySession() {
        try {
          const hash = window.location.hash || "";
          const params = new URLSearchParams(hash.replace(/^#/, ""));
          const type = params.get("type");

          const { data, error } = await window.db.auth.getSession();

          if (error) {
            console.error(error);
          }

          if (data?.session?.user) {
            return true;
          }

          if (type && type !== "recovery") {
            errorMessage.textContent = "This password reset link is invalid or expired.";
            resetBtn.disabled = true;
            return false;
          }

          // Give Supabase a moment in case it is still processing the recovery session
          await new Promise((resolve) => setTimeout(resolve, 500));

          const { data: retryData, error: retryError } = await window.db.auth.getSession();

          if (retryError) {
            console.error(retryError);
          }

          if (retryData?.session?.user) {
            return true;
          }

          errorMessage.textContent = "This password reset link is invalid or expired.";
          resetSubtext.textContent = "Request a new reset email and try again.";
          resetBtn.disabled = true;
          return false;
        } catch (error) {
          console.error(error);
          errorMessage.textContent = "Unable to validate reset link.";
          resetBtn.disabled = true;
          return false;
        }
      }

      async function handleResetPassword(event) {
        event.preventDefault();

        errorMessage.textContent = "";
        successMessage.textContent = "";

        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        if (!password || !confirmPassword) {
          errorMessage.textContent = "Please complete both password fields.";
          return;
        }

        if (password.length < 8) {
          errorMessage.textContent = "Password must be at least 8 characters.";
          return;
        }

        if (password !== confirmPassword) {
          errorMessage.textContent = "Passwords do not match.";
          return;
        }

        const originalText = resetBtn.textContent;

        try {
          resetBtn.disabled = true;
          resetBtn.textContent = "Updating...";

          const { error } = await window.db.auth.updateUser({
            password
          });

          if (error) {
            errorMessage.textContent = error.message || "Unable to update password.";
            return;
          }

          successMessage.textContent = "Password updated successfully. Redirecting to login...";

          setTimeout(async () => {
            try {
              await window.db.auth.signOut();
            } catch (error) {
              console.error(error);
            }

            window.location.href = "./login.html";
          }, 1200);
        } catch (error) {
          console.error(error);
          errorMessage.textContent = "Something went wrong while updating your password.";
        } finally {
          resetBtn.disabled = false;
          resetBtn.textContent = originalText;
        }
      }

      window.addEventListener("DOMContentLoaded", async () => {
        const ok = await ensureRecoverySession();
        if (!ok) return;

        form?.addEventListener("submit", handleResetPassword);
      });
    })();
  </script>
</body>
</html>
