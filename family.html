<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grove | Family Profile</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" type="image/png" href="./MainIcon.png" />
</head>

<body>
  <div id="header-placeholder"></div>

  <main>
    <div class="hero">
      <h1>Family Profile</h1>
      <div class="subtitle">
        Sign in to create, review, and update your family profile.
      </div>
    </div>

    <section>
      <div class="form-card" id="authCard">
        <h2 class="mt-0">Sign In</h2>
        <p class="mt-0">Enter your email and we’ll send you a secure sign-in link.</p>

        <div class="row">
          <input id="fam_auth_email" type="email" placeholder="Email Address" />
        </div>

        <button class="button" type="button" id="sendLinkBtn">Send Sign-In Link</button>
        <p id="authMessage" class="success"></p>
      </div>

      <div class="form-card" id="profileCard" style="display:none;">
        <div class="flex-between">
          <h2 class="mb-0">Your Family Dashboard</h2>
          <button class="button" type="button" id="signOutBtn">Sign Out</button>
        </div>

        <p class="mt-10" id="signedInText"></p>

        <div class="dashboard-stats">
          <div class="dashboard-stat">
            <div class="dashboard-label">Profile Status</div>
            <div class="dashboard-value" id="dashProfileStatus">—</div>
          </div>

          <div class="dashboard-stat">
            <div class="dashboard-label">Confirmed Encounters</div>
            <div class="dashboard-value" id="dashConfirmedEncounters">0</div>
          </div>

          <div class="dashboard-stat">
            <div class="dashboard-label">Average Response Time</div>
            <div class="dashboard-value" id="dashResponseTime">—</div>
          </div>

          <div class="dashboard-stat">
            <div class="dashboard-label">Messages</div>
            <div class="dashboard-value" id="dashMessages">0</div>
          </div>
        </div>

        <h3 class="mt-22">Your Profile</h3>

        <form id="familyProfileForm">
          <div class="row">
            <input id="fam_first_name" type="text" placeholder="First Name" required />
          </div>

          <div class="row">
            <input id="fam_last_name" type="text" placeholder="Last Name" required />
          </div>

          <div class="row">
            <input id="fam_email" type="email" placeholder="Email Address" required disabled />
          </div>

          <div class="row">
            <input id="fam_phone" type="text" placeholder="Phone Number" inputmode="numeric" />
          </div>

          <div class="row">
            <input id="fam_location" type="text" placeholder="City or Neighborhood" required />
          </div>

          <div class="row">
            <label class="mb-6"><strong>Types of Care Needed</strong></label>
            <div class="checkbox-group">
              <label><input type="checkbox" name="fam_care_types_needed" value="Childcare" /> Childcare</label>
              <label><input type="checkbox" name="fam_care_types_needed" value="Senior Care" /> Senior Care</label>
              <label><input type="checkbox" name="fam_care_types_needed" value="Pet Care" /> Pet Care</label>
              <label><input type="checkbox" name="fam_care_types_needed" value="Household Help" /> Household Help</label>
              <label><input type="checkbox" name="fam_care_types_needed" value="Other" /> Other</label>
            </div>
          </div>

          <div class="row">
            <label class="mb-6"><strong>Home Details</strong></label>
            <div class="checkbox-group">
              <label><input id="fam_has_cats" type="checkbox" /> Cats in Home</label>
              <label><input id="fam_has_dogs" type="checkbox" /> Dogs in Home</label>
              <label><input id="fam_smoking_in_home" type="checkbox" /> Smoking in Home</label>
              <label><input id="fam_driving_needed" type="checkbox" /> Driving Needed</label>
            </div>
          </div>

          <div class="row">
            <label for="fam_household_description"><strong>Household Description</strong></label>
            <textarea id="fam_household_description" placeholder="Tell caregivers a little about your household"></textarea>
          </div>

          <div class="row">
            <label for="fam_children_description"><strong>Children</strong></label>
            <textarea id="fam_children_description" placeholder="Ages, routines, interests, anything helpful"></textarea>
          </div>

          <div class="row">
            <label for="fam_pets_description"><strong>Pets</strong></label>
            <textarea id="fam_pets_description" placeholder="Tell caregivers about any pets in the home"></textarea>
          </div>

          <div class="row">
            <label for="fam_photos"><strong>Profile Photos (up to 5)</strong></label>
            <input id="fam_photos" type="file" accept="image/*" multiple />
          </div>

          <div class="row" id="photoPreviewWrap" style="display:none;">
            <div class="family-photo-gallery">
              <img id="family-main-photo" class="family-main-photo" src="" alt="Family photo" />
              <div id="photoPreviewList" class="family-thumbnails"></div>
            </div>
          </div>

          <button class="button" type="submit">Save Profile</button>
        </form>

        <p id="familyProfileSuccess" class="success">✅ Profile saved successfully.</p>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./app.js"></script>

  <script>
    let currentUser = null;
    let existingProfile = null;

    function formatPhoneNumber(value) {
      const digits = value.replace(/\D/g, "").slice(0, 10);
      if (digits.length === 0) return "";
      if (digits.length < 4) return digits;
      if (digits.length < 7) return `(${digits.slice(0, 3)}) ${digits.slice(3)}`;
      return `(${digits.slice(0, 3)}) ${digits.slice(3, 6)}-${digits.slice(6)}`;
    }

    function getSelectedCareTypesNeeded() {
      return Array.from(document.querySelectorAll('input[name="fam_care_types_needed"]:checked'))
        .map(cb => cb.value);
    }

    function setSelectedCareTypesNeeded(values) {
      const selected = Array.isArray(values) ? values : [];
      document.querySelectorAll('input[name="fam_care_types_needed"]').forEach(cb => {
        cb.checked = selected.includes(cb.value);
      });
    }

    function renderPhotoPreview(urls) {
      const wrap = document.getElementById("photoPreviewWrap");
      const list = document.getElementById("photoPreviewList");
      const mainImage = document.getElementById("family-main-photo");

      if (!wrap || !list || !mainImage) return;

      const photos = Array.isArray(urls) ? urls.filter(Boolean) : [];

      if (!photos.length) {
        wrap.style.display = "none";
        list.innerHTML = "";
        mainImage.removeAttribute("src");
        return;
      }

      let activeIndex = 0;

      function drawGallery() {
        mainImage.src = photos[activeIndex];
        mainImage.alt = `Family photo ${activeIndex + 1}`;

        list.innerHTML = photos
          .map((url, index) => {
            const activeClass = index === activeIndex ? " active" : "";
            return `
              <button
                type="button"
                class="gallery-thumb${activeClass}"
                data-index="${index}"
                aria-label="View photo ${index + 1}"
              >
                <img src="${url}" alt="Family photo ${index + 1}" />
              </button>
            `;
          })
          .join("");

        list.querySelectorAll(".gallery-thumb").forEach((button) => {
          button.addEventListener("click", () => {
            activeIndex = Number(button.dataset.index);
            drawGallery();
          });
        });
      }

      wrap.style.display = "block";
      drawGallery();
    }

    async function sendMagicLink() {
      const email = document.getElementById("fam_auth_email").value.trim();
      const msg = document.getElementById("authMessage");

      if (!email) {
        alert("Please enter your email first.");
        return;
      }

      const { error } = await window.db.auth.signInWithOtp({
        email,
        options: {
          emailRedirectTo: "https://jfrancomb-spec.github.io/grove-website/family.html"
        }
      });

      if (error) {
        handleError(error, "Sign-in link failed");
        return;
      }

      if (msg) {
        msg.textContent = "Check your email for a sign-in link.";
        msg.style.display = "block";
      }
    }

    async function signOut() {
      const { error } = await window.db.auth.signOut();
      if (error) {
        handleError(error, "Sign out failed");
        return;
      }
      window.location.href = "./family.html";
    }

    async function loadOwnProfile() {
      if (!currentUser) return null;

      const { data, error } = await window.db
        .from("family_profiles")
        .select("*")
        .eq("user_id", currentUser.id)
        .maybeSingle();

      if (error) {
        handleError(error, "Profile load failed");
        return null;
      }

      return data || null;
    }

    function fillProfileForm(profile) {
      existingProfile = profile;

      document.getElementById("fam_first_name").value = profile?.first_name || "";
      document.getElementById("fam_last_name").value = profile?.last_name || "";
      document.getElementById("fam_email").value = currentUser?.email || profile?.email || "";
      document.getElementById("fam_phone").value = profile?.phone || "";
      document.getElementById("fam_location").value = profile?.location || "";
      document.getElementById("fam_household_description").value = profile?.household_description || "";
      document.getElementById("fam_children_description").value = profile?.children_description || "";
      document.getElementById("fam_pets_description").value = profile?.pets_description || "";

      document.getElementById("fam_has_cats").checked = !!profile?.has_cats;
      document.getElementById("fam_has_dogs").checked = !!profile?.has_dogs;
      document.getElementById("fam_smoking_in_home").checked = !!profile?.smoking_in_home;
      document.getElementById("fam_driving_needed").checked = !!profile?.driving_needed;

      setSelectedCareTypesNeeded(profile?.care_types_needed || []);

      const status = profile?.approval_status || "pending";
      const statusEl = document.getElementById("dashProfileStatus");

      let label = "Pending Review";
      let badgeClass = "badge-pending";

      if (status === "approved") {
        label = "Approved";
        badgeClass = "badge-approved";
      } else if (status === "denied") {
        label = "Needs Update";
        badgeClass = "badge-denied";
      }

      statusEl.innerHTML = `<span class="badge ${badgeClass}">${label}</span>`;

      document.getElementById("dashConfirmedEncounters").textContent =
        profile?.confirmed_encounters != null ? profile.confirmed_encounters : 0;

      document.getElementById("dashResponseTime").textContent =
        profile?.average_response_minutes != null ? `${profile.average_response_minutes} min` : "—";

      document.getElementById("dashMessages").textContent = "0";

      renderPhotoPreview(profile?.photo_urls || (profile?.photo_url ? [profile.photo_url] : []));
    }

    async function uploadFamilyPhotos(userId) {
      const photoInput = document.getElementById("fam_photos");
      const files = Array.from(photoInput?.files || []).slice(0, 5);

      if (!files.length) {
        return existingProfile?.photo_urls || (existingProfile?.photo_url ? [existingProfile.photo_url] : []);
      }

      const photoUrls = [];

      for (const file of files) {
        const safeName = file.name.replace(/\s+/g, "_");
        const filePath = `families/${userId}/${Date.now()}_${Math.random().toString(36).slice(2)}_${safeName}`;

        const { error: uploadError } = await window.db
          .storage
          .from("profile-photos")
          .upload(filePath, file);

        if (uploadError) {
          handleError(uploadError, "Photo upload failed");
          return null;
        }

        const { data: publicData } = window.db
          .storage
          .from("profile-photos")
          .getPublicUrl(filePath);

        if (publicData?.publicUrl) {
          photoUrls.push(publicData.publicUrl);
        }
      }

      return photoUrls;
    }

    async function saveProfile(e) {
      e.preventDefault();

      if (!currentUser) {
        alert("Please sign in first.");
        return;
      }

      const photoUrls = await uploadFamilyPhotos(currentUser.id);
      if (photoUrls === null) return;

      const firstName = document.getElementById("fam_first_name").value.trim();
      const lastName = document.getElementById("fam_last_name").value.trim();

      const payload = {
        user_id: currentUser.id,
        first_name: firstName,
        last_name: lastName,
        name_display: `${firstName} ${lastName}`.trim(),
        email: currentUser.email || "",
        phone: document.getElementById("fam_phone").value.trim(),
        location: document.getElementById("fam_location").value.trim(),
        care_types_needed: getSelectedCareTypesNeeded(),
        has_cats: document.getElementById("fam_has_cats").checked,
        has_dogs: document.getElementById("fam_has_dogs").checked,
        smoking_in_home: document.getElementById("fam_smoking_in_home").checked,
        driving_needed: document.getElementById("fam_driving_needed").checked,
        household_description: document.getElementById("fam_household_description").value.trim(),
        children_description: document.getElementById("fam_children_description").value.trim(),
        pets_description: document.getElementById("fam_pets_description").value.trim(),
        photo_urls: photoUrls,
        photo_url: photoUrls[0] || null,
        approval_status: existingProfile?.approval_status || "pending"
      };

      const { error } = await window.db
        .from("family_profiles")
        .upsert(payload, { onConflict: "user_id" });

      if (error) {
        handleError(error, "Profile save failed");
        return;
      }

      document.getElementById("familyProfileSuccess").style.display = "block";
      existingProfile = await loadOwnProfile();
      fillProfileForm(existingProfile);
    }

    async function checkSessionAndSetup() {
      const { data } = await window.db.auth.getSession();
      currentUser = data?.session?.user || null;

      const authCard = document.getElementById("authCard");
      const profileCard = document.getElementById("profileCard");
      const signedInText = document.getElementById("signedInText");
      const emailInput = document.getElementById("fam_email");
      const phoneInput = document.getElementById("fam_phone");

      phoneInput?.addEventListener("input", (e) => {
        e.target.value = formatPhoneNumber(e.target.value);
      });

      if (!currentUser) {
        authCard.style.display = "block";
        profileCard.style.display = "none";
        return;
      }

      authCard.style.display = "none";
      profileCard.style.display = "block";
      signedInText.textContent = `Signed in as ${currentUser.email}. You can review and update your family profile below.`;
      emailInput.value = currentUser.email || "";

      existingProfile = await loadOwnProfile();
      fillProfileForm(existingProfile);
    }

    window.addEventListener("DOMContentLoaded", () => {
      document.getElementById("sendLinkBtn")?.addEventListener("click", sendMagicLink);
      document.getElementById("signOutBtn")?.addEventListener("click", signOut);
      document.getElementById("familyProfileForm")?.addEventListener("submit", saveProfile);
      checkSessionAndSetup();
    });
  </script>
</body>
</html>
