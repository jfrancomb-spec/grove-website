<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grove | Messages</title>

  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" type="image/png" href="./MainIcon.png" />
</head>

<body>
  <div id="header-placeholder"></div>

  <main>
    <div class="hero">
      <h1>Messages</h1>
      <div class="subtitle">
        View your conversations and send messages.
      </div>
    </div>

    <section>
      <div class="messages-layout">
        <div class="form-card">
          <h2 class="mt-0">Inbox</h2>
          <div id="conversationList"></div>
        </div>

        <div class="form-card">
          <h2 class="mt-0">Conversation</h2>
          <div id="threadHeader" class="mb-16 text-muted">Select a conversation to view messages.</div>
          <div id="messageThread" class="message-thread"></div>

          <div id="messageComposer" style="display:none;">
            <div class="row">
              <textarea id="messageText" placeholder="Write your message..."></textarea>
            </div>
            <button class="button" id="sendMessageBtn" type="button">Send Message</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./app.js"></script>

  <script>
    (function () {
      let currentUser = null;
      let selectedConversationId = null;
      let conversations = [];
      let messagesByConversationId = {};
      let participantMap = {};
      let userInfoMap = {};

      function formatMessageTime(ts) {
        try {
          return new Date(ts).toLocaleString();
        } catch {
          return "";
        }
      }

      function escapeHtml(value) {
        if (value === null || value === undefined) return "";
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatCaregiverName(profile) {
        const first = profile.first_name || "";
        const lastInitial = profile.last_name ? `${profile.last_name.charAt(0)}.` : "";
        return `${first} ${lastInitial}`.trim() || profile.name_display || "Caregiver";
      }

      function formatFamilyName(profile) {
        const first = profile.first_name || "";
        const lastInitial = profile.last_name ? `${profile.last_name.charAt(0)}.` : "";
        return `${first} ${lastInitial}`.trim() || profile.name_display || "Family";
      }

      function getOtherParticipant(conversationId) {
        const participants = participantMap[conversationId] || [];
        return participants.find((p) => p.user_id !== currentUser.id) || null;
      }

      function getDisplayNameForConversation(conversationId) {
        const other = getOtherParticipant(conversationId);
        if (!other) return "Conversation";
        return userInfoMap[other.user_id]?.name || "Conversation";
      }

      function getDisplayPhotoForConversation(conversationId) {
        const other = getOtherParticipant(conversationId);
        if (!other) return "";
        return userInfoMap[other.user_id]?.photo_url || "";
      }

      function getConversationAvatar(conversationId) {
        const photo = getDisplayPhotoForConversation(conversationId);
        const name = getDisplayNameForConversation(conversationId);
        const initial = name ? name.charAt(0).toUpperCase() : "?";

        if (photo) {
          return `<img class="conversation-avatar" src="${escapeHtml(photo)}" alt="${escapeHtml(name)}">`;
        }

        return `<div class="conversation-avatar conversation-avatar-fallback">${escapeHtml(initial)}</div>`;
      }

      function isConversationUnread(conversationId) {
        const participants = participantMap[conversationId] || [];
        const myParticipant = participants.find((p) => p.user_id === currentUser.id);
        const thread = messagesByConversationId[conversationId] || [];

        if (!myParticipant || !thread.length) return false;

        if (myParticipant.has_unread_visible_messages === true) return true;

        const lastMessage = thread[thread.length - 1];
        if (!lastMessage) return false;
        if (lastMessage.sender_user_id === currentUser.id) return false;
        if (!myParticipant.last_read_at) return true;

        return new Date(lastMessage.created_at) > new Date(myParticipant.last_read_at);
      }

      async function loadSession() {
        const { data } = await window.db.auth.getSession();
        currentUser = data?.session?.user || null;

        if (!currentUser) {
          document.getElementById("conversationList").innerHTML = "<p>Please sign in first.</p>";
          document.getElementById("threadHeader").textContent = "You must be signed in to view messages.";
          return false;
        }

        return true;
      }

      async function getCurrentUserFamilyProfileId() {
        const { data, error } = await window.db
          .from("family_profiles")
          .select("id, current_visible_version_id")
          .eq("user_id", currentUser.id)
          .not("current_visible_version_id", "is", null)
          .maybeSingle();

        if (error) {
          console.error(error);
          return null;
        }

        return data?.id || null;
      }

      async function getCurrentUserCaregiverProfileId() {
        const { data, error } = await window.db
          .from("caregiver_profiles")
          .select("id, current_visible_version_id")
          .eq("user_id", currentUser.id)
          .not("current_visible_version_id", "is", null)
          .maybeSingle();

        if (error) {
          console.error(error);
          return null;
        }

        return data?.id || null;
      }

      async function findExistingConversation(targetUserId, familyProfileId, caregiverProfileId) {
        const { data: myParticipants, error: myParticipantsError } = await window.db
          .from("conversation_participants")
          .select("conversation_id")
          .eq("user_id", currentUser.id);

        if (myParticipantsError) {
          console.error(myParticipantsError);
          return null;
        }

        const conversationIds = (myParticipants || []).map((row) => row.conversation_id);
        if (!conversationIds.length) return null;

        const { data: conversationsData, error: conversationsError } = await window.db
          .from("conversations")
          .select("*")
          .in("id", conversationIds)
          .eq("family_profile_id", familyProfileId)
          .eq("caregiver_profile_id", caregiverProfileId)
          .eq("status", "active");

        if (conversationsError) {
          console.error(conversationsError);
          return null;
        }

        if (!conversationsData?.length) return null;

        for (const conversation of conversationsData) {
          const { data: participants, error: participantsError } = await window.db
            .from("conversation_participants")
            .select("*")
            .eq("conversation_id", conversation.id);

          if (participantsError) {
            console.error(participantsError);
            continue;
          }

          const userIds = (participants || []).map((p) => p.user_id);
          if (userIds.includes(currentUser.id) && userIds.includes(targetUserId) && userIds.length === 2) {
            return conversation;
          }
        }

        return null;
      }

      async function createConversation(targetUserId, familyProfileId, caregiverProfileId) {
        let myRole = "";
        let myProfileId = null;
        let targetRole = "";
        let targetProfileId = null;

        const myFamilyProfileId = await getCurrentUserFamilyProfileId();
        const myCaregiverProfileId = await getCurrentUserCaregiverProfileId();

        if (myFamilyProfileId && myFamilyProfileId === familyProfileId) {
          myRole = "family";
          myProfileId = familyProfileId;
          targetRole = "caregiver";
          targetProfileId = caregiverProfileId;
        } else if (myCaregiverProfileId && myCaregiverProfileId === caregiverProfileId) {
          myRole = "caregiver";
          myProfileId = caregiverProfileId;
          targetRole = "family";
          targetProfileId = familyProfileId;
        } else if (familyProfileId && caregiverProfileId) {
          if (myFamilyProfileId) {
            myRole = "family";
            myProfileId = myFamilyProfileId;
            targetRole = "caregiver";
            targetProfileId = caregiverProfileId;
          } else if (myCaregiverProfileId) {
            myRole = "caregiver";
            myProfileId = myCaregiverProfileId;
            targetRole = "family";
            targetProfileId = familyProfileId;
          }
        }

        const { data: conversation, error: conversationError } = await window.db
          .from("conversations")
          .insert([{
            created_by_user_id: currentUser.id,
            conversation_type: "direct",
            family_profile_id: familyProfileId,
            caregiver_profile_id: caregiverProfileId,
            status: "active",
            last_message_at: null,
            last_message_preview: null,
            last_visible_message_at: null,
            last_visible_message_preview: null,
            has_hidden_messages: false,
            first_hidden_message_at: null
          }])
          .select("*")
          .single();

        if (conversationError) {
          console.error(conversationError);
          return null;
        }

        const inserts = [
          {
            conversation_id: conversation.id,
            user_id: currentUser.id,
            participant_role: myRole || "user",
            profile_id: myProfileId,
            has_unread_visible_messages: false
          },
          {
            conversation_id: conversation.id,
            user_id: targetUserId,
            participant_role: targetRole || "user",
            profile_id: targetProfileId,
            has_unread_visible_messages: false
          }
        ];

        const { error: participantError } = await window.db
          .from("conversation_participants")
          .insert(inserts);

        if (participantError) {
          console.error(participantError);
          return null;
        }

        return conversation;
      }

      async function ensureConversationFromQuery() {
        const params = new URLSearchParams(window.location.search);

        const requestedConversationId = params.get("conversation");
        if (requestedConversationId) {
          selectedConversationId = requestedConversationId;
          return;
        }

        const targetUserId = params.get("targetUser");
        let familyProfileId = params.get("familyProfileId");
        let caregiverProfileId = params.get("caregiverProfileId");

        if (!targetUserId) return;

        if (!familyProfileId && caregiverProfileId) {
          familyProfileId = await getCurrentUserFamilyProfileId();
        }

        if (!caregiverProfileId && familyProfileId) {
          caregiverProfileId = await getCurrentUserCaregiverProfileId();
        }

        console.log("Messaging query debug", {
          currentUserId: currentUser?.id,
          targetUserId,
          familyProfileId,
          caregiverProfileId
        });

        if (!familyProfileId || !caregiverProfileId) {
          document.getElementById("threadHeader").textContent =
            "Unable to start this conversation because the matching profile could not be found.";
          return;
        }

        const existing = await findExistingConversation(targetUserId, familyProfileId, caregiverProfileId);

        if (existing?.id) {
          selectedConversationId = existing.id;

          const url = new URL(window.location.href);
          url.search = "";
          url.searchParams.set("conversation", selectedConversationId);
          window.history.replaceState({}, "", url);

          return;
        }

        const created = await createConversation(targetUserId, familyProfileId, caregiverProfileId);

        if (created?.id) {
          selectedConversationId = created.id;

          const url = new URL(window.location.href);
          url.search = "";
          url.searchParams.set("conversation", selectedConversationId);
          window.history.replaceState({}, "", url);
        } else {
          document.getElementById("threadHeader").textContent =
            "Unable to create the conversation right now.";
        }
      }

      async function loadConversations() {
        const { data: myParticipants, error: participantError } = await window.db
          .from("conversation_participants")
          .select("*")
          .eq("user_id", currentUser.id)
          .eq("is_archived", false);

        if (participantError) {
          console.error(participantError);
          document.getElementById("conversationList").innerHTML = "<p>Unable to load conversations.</p>";
          return;
        }

        const conversationIds = (myParticipants || []).map((row) => row.conversation_id);

        if (!conversationIds.length) {
          conversations = [];
          participantMap = {};
          messagesByConversationId = {};
          renderConversationList();
          renderSelectedThread();
          return;
        }

        const { data: conversationData, error: conversationError } = await window.db
          .from("conversations")
          .select("*")
          .in("id", conversationIds)
          .order("last_visible_message_at", { ascending: false, nullsFirst: false });

        if (conversationError) {
          console.error(conversationError);
          document.getElementById("conversationList").innerHTML = "<p>Unable to load conversations.</p>";
          return;
        }

        conversations = conversationData || [];

        const { data: allParticipants, error: allParticipantsError } = await window.db
          .from("conversation_participants")
          .select("*")
          .in("conversation_id", conversationIds);

        if (allParticipantsError) {
          console.error(allParticipantsError);
          return;
        }

        participantMap = {};
        (allParticipants || []).forEach((participant) => {
          if (!participantMap[participant.conversation_id]) {
            participantMap[participant.conversation_id] = [];
          }
          participantMap[participant.conversation_id].push(participant);
        });

        const { data: allMessages, error: messageError } = await window.db
          .from("messages")
          .select("*")
          .in("conversation_id", conversationIds)
          .or(
            `and(sender_user_id.eq.${currentUser.id},visible_to_sender.eq.true),and(sender_user_id.neq.${currentUser.id},visible_to_recipient.eq.true)`
          )
          .order("created_at", { ascending: true });

        if (messageError) {
          console.error(messageError);
          return;
        }

        messagesByConversationId = {};
        (allMessages || []).forEach((message) => {
          if (!messagesByConversationId[message.conversation_id]) {
            messagesByConversationId[message.conversation_id] = [];
          }
          messagesByConversationId[message.conversation_id].push(message);
        });

        await loadConversationUserInfo();
        renderConversationList();
        renderSelectedThread();
      }

      async function loadConversationUserInfo() {
        const participantUserIds = Array.from(
          new Set(
            Object.values(participantMap)
              .flat()
              .map((participant) => participant.user_id)
              .filter((userId) => userId && userId !== currentUser.id)
          )
        );

        if (!participantUserIds.length) {
          userInfoMap = {};
          return;
        }

        userInfoMap = {};

        const { data: caregiverProfiles, error: caregiverError } = await window.db
          .from("caregiver_profiles")
          .select("user_id, current_visible_version_id")
          .in("user_id", participantUserIds)
          .not("current_visible_version_id", "is", null);

        if (caregiverError) {
          console.error(caregiverError);
        }

        const caregiverVersionIds = (caregiverProfiles || [])
          .map((profile) => profile.current_visible_version_id)
          .filter(Boolean);

        if (caregiverVersionIds.length) {
          const { data: caregiverVersions, error: caregiverVersionsError } = await window.db
            .from("caregiver_profile_versions")
            .select("id, first_name, last_name, name_display, photo_url")
            .in("id", caregiverVersionIds);

          if (caregiverVersionsError) {
            console.error(caregiverVersionsError);
          } else {
            const caregiverVersionMap = {};
            (caregiverVersions || []).forEach((version) => {
              caregiverVersionMap[version.id] = version;
            });

            (caregiverProfiles || []).forEach((profile) => {
              const version = caregiverVersionMap[profile.current_visible_version_id];
              if (version) {
                userInfoMap[profile.user_id] = {
                  name: formatCaregiverName(version),
                  photo_url: version.photo_url || ""
                };
              }
            });
          }
        }

        const { data: familyProfiles, error: familyError } = await window.db
          .from("family_profiles")
          .select("user_id, current_visible_version_id")
          .in("user_id", participantUserIds)
          .not("current_visible_version_id", "is", null);

        if (familyError) {
          console.error(familyError);
        }

        const familyVersionIds = (familyProfiles || [])
          .map((profile) => profile.current_visible_version_id)
          .filter(Boolean);

        if (familyVersionIds.length) {
          const { data: familyVersions, error: familyVersionsError } = await window.db
            .from("family_profile_versions")
            .select("id, first_name, last_name, name_display, photo_url")
            .in("id", familyVersionIds);

          if (familyVersionsError) {
            console.error(familyVersionsError);
          } else {
            const familyVersionMap = {};
            (familyVersions || []).forEach((version) => {
              familyVersionMap[version.id] = version;
            });

            (familyProfiles || []).forEach((profile) => {
              if (userInfoMap[profile.user_id]) return;

              const version = familyVersionMap[profile.current_visible_version_id];
              if (version) {
                userInfoMap[profile.user_id] = {
                  name: formatFamilyName(version),
                  photo_url: version.photo_url || ""
                };
              }
            });
          }
        }
      }

      function renderConversationList() {
        const container = document.getElementById("conversationList");
        container.innerHTML = "";

        if (!conversations.length) {
          container.innerHTML = "<p>No conversations yet.</p>";
          return;
        }

        const sortedConversations = [...conversations].sort((a, b) => {
          const aUnread = isConversationUnread(a.id) ? 1 : 0;
          const bUnread = isConversationUnread(b.id) ? 1 : 0;

          if (aUnread !== bUnread) {
            return bUnread - aUnread;
          }

          const aThread = messagesByConversationId[a.id] || [];
          const bThread = messagesByConversationId[b.id] || [];

          const aLast = aThread.length ? aThread[aThread.length - 1] : null;
          const bLast = bThread.length ? bThread[bThread.length - 1] : null;

          const aTime = aLast
            ? new Date(aLast.received_at || aLast.sent_at || aLast.created_at).getTime()
            : (a.last_visible_message_at ? new Date(a.last_visible_message_at).getTime() : 0);

          const bTime = bLast
            ? new Date(bLast.received_at || bLast.sent_at || bLast.created_at).getTime()
            : (b.last_visible_message_at ? new Date(b.last_visible_message_at).getTime() : 0);

          return bTime - aTime;
        });

        sortedConversations.forEach((conversation) => {
          const thread = messagesByConversationId[conversation.id] || [];
          const lastMessage = thread.length ? thread[thread.length - 1] : null;
          const unread = isConversationUnread(conversation.id);

          const previewText = lastMessage?.message_text || conversation.last_visible_message_preview || "No messages yet";
          const previewTime = lastMessage
            ? (lastMessage.received_at || lastMessage.sent_at || lastMessage.created_at)
            : conversation.last_visible_message_at;

          const button = document.createElement("button");
          button.type = "button";
          button.className = "conversation-item";

          if (selectedConversationId === conversation.id) {
            button.classList.add("active");
          }

          button.innerHTML = `
            <div class="conversation-row">
              ${getConversationAvatar(conversation.id)}
              <div class="conversation-main">
                <div class="conversation-top">
                  <span><strong>${escapeHtml(getDisplayNameForConversation(conversation.id))}</strong></span>
                  ${unread ? `<span class="unread-pill">New</span>` : ""}
                </div>
                <div class="conversation-preview">${escapeHtml(previewText)}</div>
                <div class="conversation-time">${previewTime ? formatMessageTime(previewTime) : ""}</div>
              </div>
            </div>
          `;

          button.addEventListener("click", async () => {
            selectedConversationId = conversation.id;

            const url = new URL(window.location.href);
            url.search = "";
            url.searchParams.set("conversation", conversation.id);
            window.history.replaceState({}, "", url);

            await markConversationRead(conversation.id);
            await loadConversations();
          });

          container.appendChild(button);
        });
      }

      function renderSelectedThread() {
        const threadHeader = document.getElementById("threadHeader");
        const threadEl = document.getElementById("messageThread");
        const composer = document.getElementById("messageComposer");

        threadEl.innerHTML = "";

        const params = new URLSearchParams(window.location.search);
        const targetUser = params.get("targetUser");

        if (!selectedConversationId) {
          if (targetUser) {
            threadHeader.textContent = "Start a new conversation";
            threadEl.innerHTML = "<p>Write your first message below.</p>";
            composer.style.display = "block";
            return;
          }

          threadHeader.textContent = "Select a conversation to view messages.";
          composer.style.display = "none";
          return;
        }

        threadHeader.textContent = `Conversation with ${getDisplayNameForConversation(selectedConversationId)}`;
        composer.style.display = "block";

        const thread = messagesByConversationId[selectedConversationId] || [];

        if (!thread.length) {
          threadEl.innerHTML = "<p>No messages yet. Start the conversation below.</p>";
          return;
        }

        thread.forEach((message) => {
          const isSentByMe = message.sender_user_id === currentUser.id;
          const timeLabel = isSentByMe ? "Sent" : "Received";
          const displayTime = isSentByMe
            ? (message.sent_at || message.created_at)
            : (message.received_at || message.created_at);

          const div = document.createElement("div");
          div.className = isSentByMe
            ? "message-bubble sent"
            : "message-bubble received";

          div.innerHTML = `
            <div>${escapeHtml(message.message_text)}</div>
            <div class="message-time">${timeLabel} ${formatMessageTime(displayTime)}</div>
          `;

          threadEl.appendChild(div);
        });

        threadEl.scrollTop = threadEl.scrollHeight;
        markConversationRead(selectedConversationId);
      }

      async function markConversationRead(conversationId) {
        if (!conversationId || !currentUser?.id) return;

        const participants = participantMap[conversationId] || [];
        const myParticipant = participants.find((p) => p.user_id === currentUser.id);

        if (!myParticipant) return;

        const now = new Date().toISOString();

        const { error } = await window.db
          .from("conversation_participants")
          .update({
            last_read_at: now,
            has_unread_visible_messages: false
          })
          .eq("id", myParticipant.id);

        if (error) {
          console.error(error);
          return;
        }

        myParticipant.last_read_at = now;
        myParticipant.has_unread_visible_messages = false;
      }

      async function sendMessage() {
        const textEl = document.getElementById("messageText");
        const text = textEl.value.trim();

        if (!text) return;

        if (!selectedConversationId) {
          const params = new URLSearchParams(window.location.search);
          const targetUserId = params.get("targetUser");
          let familyProfileId = params.get("familyProfileId");
          let caregiverProfileId = params.get("caregiverProfileId");

          if (!targetUserId) {
            alert("No conversation selected.");
            return;
          }

          if (!familyProfileId && caregiverProfileId) {
            familyProfileId = await getCurrentUserFamilyProfileId();
          }

          if (!caregiverProfileId && familyProfileId) {
            caregiverProfileId = await getCurrentUserCaregiverProfileId();
          }

          console.log("Send message debug", {
            currentUserId: currentUser?.id,
            targetUserId,
            familyProfileId,
            caregiverProfileId
          });

          if (!familyProfileId || !caregiverProfileId) {
            alert("Unable to start this conversation because one of the required profiles could not be found.");
            return;
          }

          const existing = await findExistingConversation(targetUserId, familyProfileId, caregiverProfileId);

          if (existing?.id) {
            selectedConversationId = existing.id;
          } else {
            const created = await createConversation(targetUserId, familyProfileId, caregiverProfileId);
            if (!created?.id) {
              alert("Unable to create the conversation.");
              return;
            }
            selectedConversationId = created.id;
          }

          const url = new URL(window.location.href);
          url.search = "";
          url.searchParams.set("conversation", selectedConversationId);
          window.history.replaceState({}, "", url);
        }

        const sendButton = document.getElementById("sendMessageBtn");
        const originalButtonText = sendButton?.textContent || "Send Message";

        try {
          if (sendButton) {
            sendButton.disabled = true;
            sendButton.textContent = "Sending...";
          }

          const { data, error } = await window.db.functions.invoke("send-message", {
            body: {
              conversationId: selectedConversationId,
              messageText: text
            }
          });

          if (error) {
            console.error("Edge function send-message failed:", error);
            alert("Message send failed.");
            return;
          }

          if (!data?.success) {
            console.error("Unexpected send-message response:", data);
            alert("Message send failed.");
            return;
          }

          textEl.value = "";

          await markConversationRead(selectedConversationId);

          const keepConversationId = selectedConversationId;
          await loadConversations();
          selectedConversationId = keepConversationId;
          renderConversationList();
          renderSelectedThread();

          document.getElementById("messageText")?.focus();
        } catch (err) {
          console.error("Send message error:", err);
          alert("Message send failed.");
        } finally {
          if (sendButton) {
            sendButton.disabled = false;
            sendButton.textContent = originalButtonText;
          }
        }
      }

      function wireComposerShortcuts() {
        const textEl = document.getElementById("messageText");
        if (!textEl) return;

        textEl.addEventListener("keydown", async (event) => {
          if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            await sendMessage();
          }
        });
      }

      window.addEventListener("DOMContentLoaded", async () => {
        const ok = await loadSession();
        if (!ok) return;

        document.getElementById("sendMessageBtn")?.addEventListener("click", sendMessage);
        wireComposerShortcuts();

        await ensureConversationFromQuery();
        await loadConversations();
      });
    })();
  </script>
</body>
</html>
