<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grove | Messages</title>

  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" type="image/png" href="./MainIcon.png" />

  <style>
    .messages-page .hero {
      margin-bottom: 4px;
    }

    .thread-summary-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      margin-bottom: 12px;
      border: 1px solid #d9e6e3;
      border-radius: 14px;
      background: #f7fbfa;
    }

    .thread-summary-copy {
      min-width: 0;
      flex: 1 1 auto;
    }

    .thread-summary-label {
      margin-bottom: 1px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #6b7280;
    }

    .thread-summary-title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      color: #102a43;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #threadActions {
      flex-wrap: nowrap;
      justify-content: flex-end;
      gap: 10px;
      margin: 0;
      flex: 0 0 auto;
    }

    #messageText {
      background: #f8fafc;
      border-color: #c9d8d4;
    }

    .messages-shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 20px;
    }

    .messages-filters {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .messages-filter-field {
      display: grid;
      gap: 4px;
    }

    .messages-filter-field label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #6b7280;
    }

    .messages-filter-field select {
      width: 100%;
      min-width: 0;
      padding: 10px 12px;
      border: 1px solid #cfd8e3;
      border-radius: 10px;
      background: #fff;
      font: inherit;
      color: #102a43;
    }

    @media (max-width: 640px) {
      .messages-page .hero {
        margin-bottom: 4px;
      }

      .thread-summary-card {
        flex-direction: column;
        align-items: stretch;
        padding: 8px 10px;
      }

      .thread-summary-title {
        white-space: normal;
      }

      #threadActions {
        flex-wrap: wrap;
        justify-content: flex-start;
      }

      .messages-shell {
        padding: 0 16px 18px;
      }

      .messages-filters {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="header-placeholder"></div>

  <main class="messages-page">
    <div class="hero">
      <h1>Messages</h1>
      <div class="subtitle">
        View your conversations and send messages.
      </div>
    </div>

    <section class="messages-shell">
      <div class="messages-layout">
        <div class="form-card">
          <div class="messages-filters">
            <div class="messages-filter-field">
              <label for="conversationJobFilter">Job</label>
              <select id="conversationJobFilter">
                <option value="">All Jobs</option>
              </select>
            </div>
            <div class="messages-filter-field">
              <label for="conversationPersonFilter" id="conversationPersonFilterLabel">Person</label>
              <select id="conversationPersonFilter">
                <option value="">All People</option>
              </select>
            </div>
          </div>
          <div id="conversationList"></div>
        </div>

        <div class="form-card">
          <div class="thread-summary-card">
            <div class="thread-summary-copy">
              <div class="thread-summary-label" id="threadSummaryLabel">Conversation</div>
              <div id="threadHeader" class="thread-summary-title">Loading...</div>
            </div>
            <div id="threadActions" class="button-row" style="display:none;"></div>
          </div>
          <div id="messageThread" class="message-thread"></div>

          <div id="messageComposer" style="display:none;">
            <div class="row">
              <textarea id="messageText" placeholder="Write your message..."></textarea>
            </div>
            <button class="button" id="sendMessageBtn" type="button">Send Message</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./app.js"></script>

  <script>
    (function () {
      let currentUser = null;
      let selectedConversationId = null;
      let conversations = [];
      let messagesByConversationId = {};
      let participantMap = {};
      let userInfoMap = {};
      let availableProfiles = [];
      let activeProfileId = null;
      let activeProfileType = null;
      let jobsById = {};
      let selectedConversationJobFilter = "";
      let selectedConversationPersonFilter = "";

      function formatMessageTime(ts) {
        try {
          return new Date(ts).toLocaleString();
        } catch {
          return "";
        }
      }

      function escapeHtml(value) {
        if (value === null || value === undefined) return "";
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function getRoleLabel(type) {
        return type === "family" ? "Family" : "Caregiver";
      }

      function setProfileScopeMessage(message) {
        const scopeText = document.getElementById("globalActingRoleValue");
        if (scopeText) scopeText.textContent = message;
      }

      function renderProfileScopeCard() {
        const card = document.getElementById("globalActingRoleNotice");
        const actions = document.getElementById("globalActingRoleToggle");
        if (!card || !actions) return;

        if (!availableProfiles.length) {
          card.style.display = "none";
          return;
        }

        card.style.display = "";
        actions.innerHTML = "";

        if (activeProfileId && activeProfileType) {
          setProfileScopeMessage(getRoleLabel(activeProfileType));
        } else if (availableProfiles.length === 1) {
          setProfileScopeMessage(getRoleLabel(availableProfiles[0].type));
        } else {
          const storedRole = window.getStoredActingRole?.();
          setProfileScopeMessage(getRoleLabel(storedRole || availableProfiles[0]?.type));
        }

        const alternateProfile = availableProfiles.find((profile) => profile.type !== activeProfileType);
        if (alternateProfile) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = alternateProfile.type === "family"
            ? "button button-family"
            : "button button-caregiver";
          button.textContent = `Switch to ${getRoleLabel(alternateProfile.type)}`;
          button.addEventListener("click", () => {
            window.setStoredActingRole?.(alternateProfile.type);
            window.location.href = `./messages.html?profileType=${encodeURIComponent(alternateProfile.type)}&profileId=${encodeURIComponent(alternateProfile.id)}`;
          });
          actions.appendChild(button);
        }
      }

      async function loadAvailableProfiles() {
        availableProfiles = [];

        const [familyProfileId, caregiverProfileId] = await Promise.all([
          getCurrentUserFamilyProfileId(),
          getCurrentUserCaregiverProfileId()
        ]);

        if (familyProfileId) {
          availableProfiles.push({ type: "family", id: familyProfileId });
        }

        if (caregiverProfileId) {
          availableProfiles.push({ type: "caregiver", id: caregiverProfileId });
        }
      }

      function setActiveProfile(type, id, { replaceUrl = true } = {}) {
        activeProfileType = type || null;
        activeProfileId = id || null;

        if (!replaceUrl) return;

        const url = new URL(window.location.href);

        if (activeProfileType && activeProfileId) {
          url.searchParams.set("profileType", activeProfileType);
          url.searchParams.set("profileId", activeProfileId);
        } else {
          url.searchParams.delete("profileType");
          url.searchParams.delete("profileId");
        }

        window.history.replaceState({}, "", url);
      }

      function updateConversationFilterUrl() {
        const url = new URL(window.location.href);

        if (selectedConversationJobFilter) {
          url.searchParams.set("jobFilter", selectedConversationJobFilter);
        } else {
          url.searchParams.delete("jobFilter");
        }

        if (selectedConversationPersonFilter) {
          url.searchParams.set("personFilter", selectedConversationPersonFilter);
        } else {
          url.searchParams.delete("personFilter");
        }

        window.history.replaceState({}, "", url);
      }

      function updateConversationUrl(conversationId) {
        const url = new URL(window.location.href);

        if (activeProfileType && activeProfileId) {
          url.searchParams.set("profileType", activeProfileType);
          url.searchParams.set("profileId", activeProfileId);
        }

        if (conversationId) {
          url.searchParams.delete("targetUser");
          url.searchParams.delete("familyProfileId");
          url.searchParams.delete("caregiverProfileId");
          url.searchParams.set("conversation", conversationId);
        } else {
          url.searchParams.delete("conversation");
        }

        window.history.replaceState({}, "", url);
      }

      function getOwnedProfile(type) {
        return availableProfiles.find((profile) => profile.type === type) || null;
      }

      function isConversationRelevantToActiveProfile(conversation) {
        if (!conversation || !activeProfileId || !activeProfileType) return false;
        if (activeProfileType === "family") {
          return conversation.family_profile_id === activeProfileId;
        }
        if (activeProfileType === "caregiver") {
          return conversation.caregiver_profile_id === activeProfileId;
        }
        return false;
      }

      function resolveProfileFromParams(params) {
        const requestedProfileType = params.get("profileType");
        const requestedProfileId = params.get("profileId");

        if (requestedProfileType && requestedProfileId) {
          const matched = availableProfiles.find((profile) =>
            profile.type === requestedProfileType && profile.id === requestedProfileId
          );
          if (matched) return matched;
        }

        const requestedFamilyId = params.get("familyProfileId");
        const requestedCaregiverId = params.get("caregiverProfileId");

        if (requestedFamilyId && !requestedCaregiverId) {
          return getOwnedProfile("caregiver");
        }

        if (requestedCaregiverId && !requestedFamilyId) {
          return getOwnedProfile("family");
        }

        if (availableProfiles.length === 1) {
          return availableProfiles[0];
        }

        const storedRole = window.getStoredActingRole?.();
        if (storedRole) {
          const storedProfile = availableProfiles.find((profile) => profile.type === storedRole);
          if (storedProfile) return storedProfile;
        }

        return null;
      }

      async function resolveProfileFromConversation(conversationId) {
        if (!conversationId) return null;

        const { data, error } = await window.db
          .from("conversation_participants")
          .select("profile_id")
          .eq("conversation_id", conversationId)
          .eq("user_id", currentUser.id)
          .maybeSingle();

        if (error) {
          console.error(error);
          return null;
        }

        if (data?.profile_id) {
          const matchedProfile = availableProfiles.find((profile) => profile.id === data.profile_id);
          if (matchedProfile) return matchedProfile;
        }

        const { data: conversation, error: conversationError } = await window.db
          .from("conversations")
          .select("id, family_profile_id, caregiver_profile_id")
          .eq("id", conversationId)
          .maybeSingle();

        if (conversationError) {
          console.error(conversationError);
          return null;
        }

        if (conversation?.family_profile_id) {
          const familyProfile = availableProfiles.find((profile) =>
            profile.type === "family" && profile.id === conversation.family_profile_id
          );
          if (familyProfile) return familyProfile;
        }

        if (conversation?.caregiver_profile_id) {
          const caregiverProfile = availableProfiles.find((profile) =>
            profile.type === "caregiver" && profile.id === conversation.caregiver_profile_id
          );
          if (caregiverProfile) return caregiverProfile;
        }

        return null;
      }

      function formatCaregiverName(profile) {
        if (profile.name_display) {
          return profile.name_display;
        }
        const first = profile.first_name || "";
        const lastInitial = profile.last_name ? `${profile.last_name.charAt(0)}.` : "";
        return `${first} ${lastInitial}`.trim() || profile.name_display || "Caregiver";
      }

      function formatFamilyName(profile) {
        if (profile.name_display) {
          return profile.name_display;
        }
        const first = profile.first_name || "";
        const lastInitial = profile.last_name ? `${profile.last_name.charAt(0)}.` : "";
        return `${first} ${lastInitial}`.trim() || profile.name_display || "Family";
      }

      function getOtherParticipant(conversationId) {
        const participants = participantMap[conversationId] || [];
        return participants.find((p) => p.user_id !== currentUser.id) || null;
      }

      function getDisplayNameForConversation(conversationId) {
        const other = getOtherParticipant(conversationId);
        if (!other) return "Conversation";
        return userInfoMap[other.user_id]?.name || "Conversation";
      }

      function getDisplayPhotoForConversation(conversationId) {
        const other = getOtherParticipant(conversationId);
        if (!other) return "";
        return userInfoMap[other.user_id]?.photo_url || "";
      }

      function getOtherParticipantUserId(conversationId) {
        const other = getOtherParticipant(conversationId);
        return other?.user_id || "";
      }

      function getCounterpartRoleLabel() {
        if (activeProfileType === "family") return "Caregiver";
        if (activeProfileType === "caregiver") return "Family";
        return "Person";
      }

      function getFilteredConversations() {
        return conversations.filter((conversation) => {
          if (selectedConversationJobFilter && conversation.job_post_id !== selectedConversationJobFilter) {
            return false;
          }

          if (selectedConversationPersonFilter && getOtherParticipantUserId(conversation.id) !== selectedConversationPersonFilter) {
            return false;
          }

          return true;
        });
      }

      function renderConversationFilters() {
        const jobSelect = document.getElementById("conversationJobFilter");
        const personSelect = document.getElementById("conversationPersonFilter");
        const personLabel = document.getElementById("conversationPersonFilterLabel");
        if (!jobSelect || !personSelect || !personLabel) return;

        personLabel.textContent = getCounterpartRoleLabel();

        const previousJobValue = selectedConversationJobFilter;
        const previousPersonValue = selectedConversationPersonFilter;

        const jobOptions = [];
        const seenJobIds = new Set();
        const personOptions = [];
        const seenPersonIds = new Set();

        conversations.forEach((conversation) => {
          if (conversation.job_post_id && !seenJobIds.has(conversation.job_post_id)) {
            seenJobIds.add(conversation.job_post_id);
            const linkedJob = jobsById[conversation.job_post_id] || null;
            jobOptions.push({
              value: conversation.job_post_id,
              label: linkedJob?.title || "Linked job"
            });
          }

          const otherUserId = getOtherParticipantUserId(conversation.id);
          if (otherUserId && !seenPersonIds.has(otherUserId)) {
            seenPersonIds.add(otherUserId);
            personOptions.push({
              value: otherUserId,
              label: getDisplayNameForConversation(conversation.id)
            });
          }
        });

        jobOptions.sort((a, b) => a.label.localeCompare(b.label));
        personOptions.sort((a, b) => a.label.localeCompare(b.label));

        jobSelect.innerHTML = '<option value="">All Jobs</option>' + jobOptions.map((option) =>
          `<option value="${escapeHtml(option.value)}">${escapeHtml(option.label)}</option>`
        ).join("");

        personSelect.innerHTML = `<option value="">All ${escapeHtml(getCounterpartRoleLabel())}s</option>` + personOptions.map((option) =>
          `<option value="${escapeHtml(option.value)}">${escapeHtml(option.label)}</option>`
        ).join("");

        selectedConversationJobFilter = jobOptions.some((option) => option.value === previousJobValue) ? previousJobValue : "";
        selectedConversationPersonFilter = personOptions.some((option) => option.value === previousPersonValue) ? previousPersonValue : "";

        jobSelect.value = selectedConversationJobFilter;
        personSelect.value = selectedConversationPersonFilter;
      }

      function getConversationAvatar(conversationId) {
        const photo = getDisplayPhotoForConversation(conversationId);
        const name = getDisplayNameForConversation(conversationId);
        const initial = name ? name.charAt(0).toUpperCase() : "?";

        if (photo) {
          return `<img class="conversation-avatar" src="${escapeHtml(photo)}" alt="${escapeHtml(name)}">`;
        }

        return `<div class="conversation-avatar conversation-avatar-fallback">${escapeHtml(initial)}</div>`;
      }

      function getSelectedConversation() {
        if (!selectedConversationId) return null;
        return conversations.find((conversation) => conversation.id === selectedConversationId) || null;
      }

      function getConversationListPreview(conversation, lastMessage) {
        if (conversation?.job_post_id) {
          const linkedJob = jobsById[conversation.job_post_id] || null;
          if (linkedJob?.title) {
            return linkedJob.title;
          }
        }

        return lastMessage?.message_text || conversation?.last_visible_message_preview || "No messages yet";
      }

      function getThreadProfileHref(conversation) {
        if (!conversation) return "";

        if (activeProfileType === "caregiver" && conversation.family_profile_id) {
          return `./family-profile.html?id=${encodeURIComponent(conversation.family_profile_id)}`;
        }

        if (activeProfileType === "family" && conversation.caregiver_profile_id) {
          return `./caregiver-profile.html?id=${encodeURIComponent(conversation.caregiver_profile_id)}`;
        }

        return "";
      }

      function setThreadSummary(label, title) {
        const summaryLabel = document.getElementById("threadSummaryLabel");
        const threadHeader = document.getElementById("threadHeader");

        if (summaryLabel) {
          summaryLabel.textContent = label;
        }

        if (threadHeader) {
          threadHeader.textContent = title;
        }
      }

      function renderThreadActions() {
        const actions = document.getElementById("threadActions");
        if (!actions) return;

        const conversation = getSelectedConversation();
        if (!conversation) {
          actions.innerHTML = "";
          actions.style.display = "none";
          return;
        }

        const threadProfileHref = getThreadProfileHref(conversation);
        const profileLabel = activeProfileType === "caregiver"
          ? "View Family"
          : activeProfileType === "family"
            ? "View Caregiver"
            : "View Profile";

        let jobActionHtml = "";
        if (conversation.job_post_id) {
          const jobDetailsParams = new URLSearchParams({
            job_id: conversation.job_post_id,
            returnTo: "messages"
          });

          if (activeProfileType) {
            jobDetailsParams.set("profileType", activeProfileType);
          }

          if (activeProfileId) {
            jobDetailsParams.set("profileId", activeProfileId);
          }

          if (conversation.id) {
            jobDetailsParams.set("conversation", conversation.id);
          }

          jobActionHtml = `<a class="button button-secondary" href="./job-details.html?${jobDetailsParams.toString()}">View Job</a>`;
        }

        actions.innerHTML =
          jobActionHtml +
          (threadProfileHref
            ? `<a class="button button-secondary" href="${threadProfileHref}">${profileLabel}</a>`
            : "");

        if (!actions.innerHTML) {
          actions.style.display = "none";
          return;
        }

        actions.style.display = "";
      }

      function isConversationUnread(conversationId) {
        const participants = participantMap[conversationId] || [];
        const myParticipant = participants.find((p) => p.user_id === currentUser.id);
        const thread = messagesByConversationId[conversationId] || [];

        if (!myParticipant || !thread.length) return false;

        if (myParticipant.has_unread_visible_messages === true) return true;

        const lastMessage = thread[thread.length - 1];
        if (!lastMessage) return false;
        if (lastMessage.sender_user_id === currentUser.id) return false;
        if (!myParticipant.last_read_at) return true;

        return new Date(lastMessage.created_at) > new Date(myParticipant.last_read_at);
      }

      async function requireSession() {
        const { data, error } = await window.db.auth.getSession();

        if (error) {
          console.error(error);
          window.location.href = "./login.html";
          return false;
        }

        currentUser = data?.session?.user || null;
        window.currentUser = currentUser;

        if (!currentUser) {
          window.location.href = "./login.html";
          return false;
        }

        return true;
      }

      async function getCurrentUserFamilyProfileId() {
        const { data, error } = await window.db
          .from("family_profiles")
          .select("id, current_visible_version_id, current_pending_version_id")
          .eq("user_id", currentUser.id)
          .maybeSingle();

        if (error) {
          console.error(error);
          return null;
        }

        if (!data) return null;

        return (data.current_visible_version_id || data.current_pending_version_id)
          ? data.id
          : null;
      }

      async function getCurrentUserCaregiverProfileId() {
        const { data, error } = await window.db
          .from("caregiver_profiles")
          .select("id, current_visible_version_id, current_pending_version_id")
          .eq("user_id", currentUser.id)
          .maybeSingle();

        if (error) {
          console.error(error);
          return null;
        }

        if (!data) return null;

        return (data.current_visible_version_id || data.current_pending_version_id)
          ? data.id
          : null;
      }

      async function findExistingConversation(targetUserId, familyProfileId, caregiverProfileId, jobPostId = null) {
        const { data: myParticipants, error: myParticipantsError } = await window.db
          .from("conversation_participants")
          .select("conversation_id")
          .eq("user_id", currentUser.id);

        if (myParticipantsError) {
          console.error(myParticipantsError);
          return null;
        }

        const conversationIds = Array.from(new Set((myParticipants || []).map((row) => row.conversation_id).filter(Boolean)));
        if (!conversationIds.length) return null;

        const { data: conversationsData, error: conversationsError } = await window.db
          .from("conversations")
          .select("*")
          .in("id", conversationIds)
          .eq("family_profile_id", familyProfileId)
          .eq("caregiver_profile_id", caregiverProfileId)
          .eq("status", "active");

        if (conversationsError) {
          console.error(conversationsError);
          return null;
        }

        const matchingConversations = (conversationsData || []).filter((conversation) => {
          if (jobPostId) {
            return conversation.job_post_id === jobPostId;
          }
          return !conversation.job_post_id;
        });

        if (!matchingConversations.length) return null;

        for (const conversation of matchingConversations) {
          const { data: participants, error: participantsError } = await window.db
            .from("conversation_participants")
            .select("*")
            .eq("conversation_id", conversation.id);

          if (participantsError) {
            console.error(participantsError);
            continue;
          }

          const userIds = (participants || []).map((p) => p.user_id);
          if (userIds.includes(currentUser.id) && userIds.includes(targetUserId) && userIds.length === 2) {
            return conversation;
          }
        }

        return null;
      }

      async function createConversation(targetUserId, familyProfileId, caregiverProfileId, jobPostId = null) {
        let myRole = "";
        let myProfileId = null;
        let targetRole = "";
        let targetProfileId = null;

        if (activeProfileType === "family" && activeProfileId && activeProfileId === familyProfileId) {
          myRole = "family";
          myProfileId = familyProfileId;
          targetRole = "caregiver";
          targetProfileId = caregiverProfileId;
        } else if (activeProfileType === "caregiver" && activeProfileId && activeProfileId === caregiverProfileId) {
          myRole = "caregiver";
          myProfileId = caregiverProfileId;
          targetRole = "family";
          targetProfileId = familyProfileId;
        } else if (familyProfileId && caregiverProfileId) {
          if (activeProfileType === "family" && activeProfileId) {
            myRole = "family";
            myProfileId = activeProfileId;
            targetRole = "caregiver";
            targetProfileId = caregiverProfileId;
          } else if (activeProfileType === "caregiver" && activeProfileId) {
            myRole = "caregiver";
            myProfileId = activeProfileId;
            targetRole = "family";
            targetProfileId = familyProfileId;
          }
        }

        if (!myRole || !myProfileId || !targetRole || !targetProfileId) {
          console.error("Unable to resolve conversation profiles.", {
            activeProfileType,
            activeProfileId,
            familyProfileId,
            caregiverProfileId
          });
          return null;
        }

        const { data: conversation, error: conversationError } = await window.db
          .from("conversations")
          .insert([{
            created_by_user_id: currentUser.id,
            conversation_type: "direct",
            family_profile_id: familyProfileId,
            caregiver_profile_id: caregiverProfileId,
            job_post_id: jobPostId,
            status: "active",
            last_message_at: null,
            last_message_preview: null,
            last_visible_message_at: null,
            last_visible_message_preview: null,
            has_hidden_messages: false,
            first_hidden_message_at: null
          }])
          .select("*")
          .single();

        if (conversationError) {
          console.error(conversationError);
          return null;
        }

        const inserts = [
          {
            conversation_id: conversation.id,
            user_id: currentUser.id,
            participant_role: myRole || "user",
            profile_id: myProfileId,
            has_unread_visible_messages: false
          },
          {
            conversation_id: conversation.id,
            user_id: targetUserId,
            participant_role: targetRole || "user",
            profile_id: targetProfileId,
            has_unread_visible_messages: false
          }
        ];

        const { error: participantError } = await window.db
          .from("conversation_participants")
          .insert(inserts);

        if (participantError) {
          console.error(participantError);
          return null;
        }

        return conversation;
      }

      async function ensureConversationFromQuery() {
        const params = new URLSearchParams(window.location.search);

        const requestedConversationId = params.get("conversation");
        if (requestedConversationId) {
          if (!activeProfileId || !activeProfileType) {
            const resolvedProfile = await resolveProfileFromConversation(requestedConversationId);
            if (resolvedProfile) {
              setActiveProfile(resolvedProfile.type, resolvedProfile.id, { replaceUrl: true });
              renderProfileScopeCard();
            }
          }

          if (!activeProfileId || !activeProfileType) {
            selectedConversationId = null;
            setThreadSummary("Conversation", "Choose a profile to view this conversation.");
            return;
          }

          selectedConversationId = requestedConversationId;
          return;
        }

        const targetUserId = params.get("targetUser");
        let familyProfileId = params.get("familyProfileId");
        let caregiverProfileId = params.get("caregiverProfileId");
        const jobPostId = params.get("jobId");

        if (!targetUserId) return;

        if (!activeProfileId || !activeProfileType) {
          setThreadSummary(
            "Conversation",
            availableProfiles.length > 1
              ? "Choose the profile you want to use for messaging."
              : "Create a profile before starting a conversation."
          );
          return;
        }

        if (activeProfileType === "family" && !familyProfileId) {
          familyProfileId = activeProfileId;
        }

        if (activeProfileType === "caregiver" && !caregiverProfileId) {
          caregiverProfileId = activeProfileId;
        }

        if (!familyProfileId || !caregiverProfileId) {
          setThreadSummary("Conversation", "Unable to start this conversation because the matching profile could not be found.");
          return;
        }

        const existing = await findExistingConversation(targetUserId, familyProfileId, caregiverProfileId, jobPostId);

        if (existing?.id) {
          selectedConversationId = existing.id;
          updateConversationUrl(selectedConversationId);
          return;
        }

        const created = await createConversation(targetUserId, familyProfileId, caregiverProfileId, jobPostId);

        if (created?.id) {
          selectedConversationId = created.id;
          updateConversationUrl(selectedConversationId);
        } else {
          setThreadSummary("Conversation", "Unable to create the conversation right now.");
        }
      }

      async function loadConversations() {
        if (!activeProfileId) {
          conversations = [];
          participantMap = {};
          messagesByConversationId = {};
          renderConversationList();
          renderSelectedThread();
          return;
        }

        const { data: myParticipants, error: participantError } = await window.db
          .from("conversation_participants")
          .select("*")
          .eq("user_id", currentUser.id)
          .eq("is_archived", false);

        if (participantError) {
          console.error(participantError);
          document.getElementById("conversationList").innerHTML = "<p>Unable to load conversations.</p>";
          return;
        }

        const conversationIds = Array.from(new Set((myParticipants || []).map((row) => row.conversation_id).filter(Boolean)));

        if (!conversationIds.length) {
          conversations = [];
          participantMap = {};
          messagesByConversationId = {};
          renderConversationList();
          renderSelectedThread();
          return;
        }

        const { data: conversationData, error: conversationError } = await window.db
          .from("conversations")
          .select("*")
          .in("id", conversationIds)
          .order("last_visible_message_at", { ascending: false, nullsFirst: false });

        if (conversationError) {
          console.error(conversationError);
          document.getElementById("conversationList").innerHTML = "<p>Unable to load conversations.</p>";
          return;
        }

        const participantRows = myParticipants || [];
        const directConversationIds = new Set(
          participantRows
            .filter((row) => row.profile_id === activeProfileId)
            .map((row) => row.conversation_id)
        );

        conversations = (conversationData || []).filter((conversation) => {
          if (directConversationIds.has(conversation.id)) return true;
          return isConversationRelevantToActiveProfile(conversation);
        });

        const filteredConversationIds = conversations.map((conversation) => conversation.id);

        if (!filteredConversationIds.length) {
          participantMap = {};
          messagesByConversationId = {};
          jobsById = {};
          renderConversationList();
          renderSelectedThread();
          return;
        }

        const jobIds = Array.from(new Set(conversations.map((conversation) => conversation.job_post_id).filter(Boolean)));
        jobsById = {};

        if (jobIds.length) {
          const { data: jobs, error: jobsError } = await window.db
            .from("job_posts")
            .select("id, title")
            .in("id", jobIds);

          if (jobsError) {
            console.error(jobsError);
          } else {
            (jobs || []).forEach((job) => {
              jobsById[job.id] = job;
            });
          }
        }

        const { data: allParticipants, error: allParticipantsError } = await window.db
          .from("conversation_participants")
          .select("*")
          .in("conversation_id", filteredConversationIds);

        if (allParticipantsError) {
          console.error(allParticipantsError);
          return;
        }

        participantMap = {};
        (allParticipants || []).forEach((participant) => {
          if (!participantMap[participant.conversation_id]) {
            participantMap[participant.conversation_id] = [];
          }
          participantMap[participant.conversation_id].push(participant);
        });

        const { data: allMessages, error: messageError } = await window.db
          .from("messages")
          .select("*")
          .in("conversation_id", filteredConversationIds)
          .or(
            `and(sender_user_id.eq.${currentUser.id},visible_to_sender.eq.true),and(sender_user_id.neq.${currentUser.id},visible_to_recipient.eq.true)`
          )
          .order("created_at", { ascending: true });

        if (messageError) {
          console.error(messageError);
          return;
        }

        messagesByConversationId = {};
        (allMessages || []).forEach((message) => {
          if (!messagesByConversationId[message.conversation_id]) {
            messagesByConversationId[message.conversation_id] = [];
          }
          messagesByConversationId[message.conversation_id].push(message);
        });

        await loadConversationUserInfo();
        renderConversationList();
        renderSelectedThread();
      }

      async function loadConversationUserInfo() {
        const participantUserIds = Array.from(
          new Set(
            Object.values(participantMap)
              .flat()
              .map((participant) => participant.user_id)
              .filter((userId) => userId && userId !== currentUser.id)
          )
        );

        if (!participantUserIds.length) {
          userInfoMap = {};
          return;
        }

        userInfoMap = {};

        const { data: caregiverProfiles, error: caregiverError } = await window.db
          .from("caregiver_profiles")
          .select("user_id, current_visible_version_id")
          .in("user_id", participantUserIds)
          .not("current_visible_version_id", "is", null);

        if (caregiverError) {
          console.error(caregiverError);
        }

        const caregiverVersionIds = (caregiverProfiles || [])
          .map((profile) => profile.current_visible_version_id)
          .filter(Boolean);

        if (caregiverVersionIds.length) {
          const { data: caregiverVersions, error: caregiverVersionsError } = await window.db
            .from("caregiver_profile_versions")
            .select("id, name_display, photo_url")
            .in("id", caregiverVersionIds);

          if (caregiverVersionsError) {
            console.error(caregiverVersionsError);
          } else {
            const caregiverVersionMap = {};
            (caregiverVersions || []).forEach((version) => {
              caregiverVersionMap[version.id] = version;
            });

            (caregiverProfiles || []).forEach((profile) => {
              const version = caregiverVersionMap[profile.current_visible_version_id];
              if (version) {
                userInfoMap[profile.user_id] = {
                  name: version.name_display || "Caregiver",
                  photo_url: version.photo_url || ""
                };
              }
            });
          }
        }

        const { data: familyProfiles, error: familyError } = await window.db
          .from("family_profiles")
          .select("user_id, current_visible_version_id")
          .in("user_id", participantUserIds)
          .not("current_visible_version_id", "is", null);

        if (familyError) {
          console.error(familyError);
        }

        const familyVersionIds = (familyProfiles || [])
          .map((profile) => profile.current_visible_version_id)
          .filter(Boolean);

        if (familyVersionIds.length) {
          const { data: familyVersions, error: familyVersionsError } = await window.db
            .from("family_profile_versions")
            .select("id, name_display, photo_url")
            .in("id", familyVersionIds);

          if (familyVersionsError) {
            console.error(familyVersionsError);
          } else {
            const familyVersionMap = {};
            (familyVersions || []).forEach((version) => {
              familyVersionMap[version.id] = version;
            });

            (familyProfiles || []).forEach((profile) => {
              if (userInfoMap[profile.user_id]) return;

              const version = familyVersionMap[profile.current_visible_version_id];
              if (version) {
                userInfoMap[profile.user_id] = {
                  name: version.name_display || "Family",
                  photo_url: version.photo_url || ""
                };
              }
            });
          }
        }
      }

      function renderConversationList() {
        const container = document.getElementById("conversationList");
        container.innerHTML = "";
        renderConversationFilters();

        if (!conversations.length) {
          container.innerHTML = "<p>No conversations yet.</p>";
          return;
        }

        const filteredConversations = getFilteredConversations();

        if (!filteredConversations.length) {
          container.innerHTML = "<p>No conversations match the current filters.</p>";
          return;
        }

        const sortedConversations = [...filteredConversations].sort((a, b) => {
          const aUnread = isConversationUnread(a.id) ? 1 : 0;
          const bUnread = isConversationUnread(b.id) ? 1 : 0;

          if (aUnread !== bUnread) {
            return bUnread - aUnread;
          }

          const aThread = messagesByConversationId[a.id] || [];
          const bThread = messagesByConversationId[b.id] || [];

          const aLast = aThread.length ? aThread[aThread.length - 1] : null;
          const bLast = bThread.length ? bThread[bThread.length - 1] : null;

          const aTime = aLast
            ? new Date(aLast.received_at || aLast.sent_at || aLast.created_at).getTime()
            : (a.last_visible_message_at ? new Date(a.last_visible_message_at).getTime() : 0);

          const bTime = bLast
            ? new Date(bLast.received_at || bLast.sent_at || bLast.created_at).getTime()
            : (b.last_visible_message_at ? new Date(b.last_visible_message_at).getTime() : 0);

          return bTime - aTime;
        });

        sortedConversations.forEach((conversation) => {
          const thread = messagesByConversationId[conversation.id] || [];
          const lastMessage = thread.length ? thread[thread.length - 1] : null;
          const unread = isConversationUnread(conversation.id);

          const previewText = getConversationListPreview(conversation, lastMessage);
          const previewTime = lastMessage
            ? (lastMessage.received_at || lastMessage.sent_at || lastMessage.created_at)
            : conversation.last_visible_message_at;

          const button = document.createElement("button");
          button.type = "button";
          button.className = "conversation-item";

          if (selectedConversationId === conversation.id) {
            button.classList.add("active");
          }

          button.innerHTML = `
            <div class="conversation-row">
              ${getConversationAvatar(conversation.id)}
              <div class="conversation-main">
                <div class="conversation-top">
                  <span><strong>${escapeHtml(getDisplayNameForConversation(conversation.id))}</strong></span>
                  ${unread ? `<span class="unread-pill">New</span>` : ""}
                </div>
                <div class="conversation-preview">${escapeHtml(previewText)}</div>
                <div class="conversation-time">${previewTime ? formatMessageTime(previewTime) : ""}</div>
              </div>
            </div>
          `;

          button.addEventListener("click", async () => {
            selectedConversationId = conversation.id;
            updateConversationUrl(conversation.id);

            await markConversationRead(conversation.id);
            await loadConversations();
          });

          container.appendChild(button);
        });
      }

      function renderSelectedThread() {
        const threadHeader = document.getElementById("threadHeader");
        const threadEl = document.getElementById("messageThread");
        const composer = document.getElementById("messageComposer");

        threadEl.innerHTML = "";

        const params = new URLSearchParams(window.location.search);
        const targetUser = params.get("targetUser");

        if (!selectedConversationId) {
          if (targetUser) {
            if (!activeProfileId || !activeProfileType) {
              setThreadSummary("Conversation", "Choose a profile to start a conversation.");
              threadEl.innerHTML = "<p>Select the profile you want to use first.</p>";
              composer.style.display = "none";
              renderThreadActions();
              return;
            }

            setThreadSummary("Conversation", "Start a new conversation");
            threadEl.innerHTML = "<p>Write your first message below.</p>";
            composer.style.display = "block";
            renderThreadActions();
            return;
          }

          setThreadSummary(
            "Conversation",
            activeProfileId
              ? "Select a conversation to view messages."
              : "Choose a profile to view messages."
          );
          composer.style.display = "none";
          renderThreadActions();
          return;
        }

        setThreadSummary("Conversation with", getDisplayNameForConversation(selectedConversationId));
        composer.style.display = "block";
        renderThreadActions();

        const thread = messagesByConversationId[selectedConversationId] || [];

        if (!thread.length) {
          threadEl.innerHTML = "<p>No messages yet. Start the conversation below.</p>";
          return;
        }

        thread.forEach((message) => {
          const isSentByMe = message.sender_user_id === currentUser.id;
          const timeLabel = isSentByMe ? "Sent" : "Received";
          const displayTime = isSentByMe
            ? (message.sent_at || message.created_at)
            : (message.received_at || message.created_at);
          const senderLabel = isSentByMe ? "You" : getDisplayNameForConversation(selectedConversationId);

          const div = document.createElement("div");
          div.className = isSentByMe
            ? "message-bubble sent"
            : "message-bubble received";

          div.innerHTML = `
            <div class="message-sender">${escapeHtml(senderLabel)}</div>
            <div class="message-text">${escapeHtml(message.message_text)}</div>
            <div class="message-time">${timeLabel} ${formatMessageTime(displayTime)}</div>
          `;

          threadEl.appendChild(div);
        });

        threadEl.scrollTop = threadEl.scrollHeight;
        markConversationRead(selectedConversationId);
      }

      async function markConversationRead(conversationId) {
        if (!conversationId || !currentUser?.id) return;

        const participants = participantMap[conversationId] || [];
        const myParticipant = participants.find((p) => p.user_id === currentUser.id);

        if (!myParticipant) return;

        const now = new Date().toISOString();

        const { error } = await window.db
          .from("conversation_participants")
          .update({
            last_read_at: now,
            has_unread_visible_messages: false
          })
          .eq("id", myParticipant.id);

        if (error) {
          console.error(error);
          return;
        }

        myParticipant.last_read_at = now;
        myParticipant.has_unread_visible_messages = false;
      }

      function getMessageSubmissionText(result) {
        switch (result?.content_status) {
          case "posted":
          case "published":
          case "approved":
            return null;
          case "queued":
            return "Message saved. It will be sent once account review is cleared.";
          case "watched":
            return "Message submitted for review.";
          case "flagged":
            return "Your message is under review.";
          default:
            return null;
        }
      }

      function moderationPublishesMessage(result) {
        return ["posted", "published", "approved"].includes(result?.content_status || "");
      }

      async function makeMessageVisibleToRecipient(messageId, moderationResult) {
        if (!messageId || !moderationPublishesMessage(moderationResult)) return;

        const now = new Date().toISOString();
        const { error } = await window.db
          .from("messages")
          .update({
            content_status: moderationResult.content_status,
            visible_to_recipient: true,
            sent_at: now,
            received_at: now
          })
          .eq("id", messageId);

        if (error) {
          throw error;
        }
      }

      async function sendMessage() {
        const textEl = document.getElementById("messageText");
        const text = textEl.value.trim();

        if (!text) return;

        if (!activeProfileId || !activeProfileType) {
          alert("Choose which profile you want to send this message from first.");
          return;
        }

        if (!selectedConversationId) {
          const params = new URLSearchParams(window.location.search);
          const targetUserId = params.get("targetUser");
          let familyProfileId = params.get("familyProfileId");
          let caregiverProfileId = params.get("caregiverProfileId");
          const jobPostId = params.get("jobId");

          if (!targetUserId) {
            alert("No conversation selected.");
            return;
          }

          if (activeProfileType === "family" && !familyProfileId) {
            familyProfileId = activeProfileId;
          }

          if (activeProfileType === "caregiver" && !caregiverProfileId) {
            caregiverProfileId = activeProfileId;
          }

          if (!familyProfileId || !caregiverProfileId) {
            alert("Unable to start this conversation because one of the required profiles could not be found.");
            return;
          }

          const existing = await findExistingConversation(targetUserId, familyProfileId, caregiverProfileId, jobPostId);

          if (existing?.id) {
            selectedConversationId = existing.id;
          } else {
            const created = await createConversation(targetUserId, familyProfileId, caregiverProfileId, jobPostId);
            if (!created?.id) {
              alert("Unable to create the conversation.");
              return;
            }
            selectedConversationId = created.id;
          }
          updateConversationUrl(selectedConversationId);
        }

        const sendButton = document.getElementById("sendMessageBtn");
        const originalButtonText = sendButton?.textContent || "Send Message";

        try {
          if (sendButton) {
            sendButton.disabled = true;
            sendButton.textContent = "Sending...";
          }

          const { data: inserted, error: insertError } = await window.db
            .from("messages")
            .insert([{
              conversation_id: selectedConversationId,
              sender_user_id: currentUser.id,
              message_text: text,
              content_status: "draft",
              visible_to_sender: true,
              visible_to_recipient: false
            }])
            .select()
            .single();

          if (insertError) {
            throw insertError;
          }

          const { data: modResult, error: modError } = await window.db.rpc("moderation_engine", {
            p_action: "submit_content",
            p_payload: {
              related_table: "messages",
              related_id: inserted.id,
              user_id: currentUser.id,
              is_suspicious: false,
              reason: null,
              summary: "Message submitted",
              success_status: "published"
            },
            p_actor_user_id: currentUser.id
          });

          if (modError) {
            throw modError;
          }

          if (!modResult?.ok) {
            throw new Error("Moderation failed.");
          }

          await makeMessageVisibleToRecipient(inserted.id, modResult);

          const statusMessage = getMessageSubmissionText(modResult);
          if (statusMessage) {
            alert(statusMessage);
          }

          textEl.value = "";

          const keepConversationId = selectedConversationId;
          await markConversationRead(selectedConversationId);
          await loadConversations();
          selectedConversationId = keepConversationId;
          renderConversationList();
          renderSelectedThread();

          document.getElementById("messageText")?.focus();
        } catch (err) {
          console.error("Send message error:", err);
          alert(err?.message ? `Message send failed: ${err.message}` : "Message send failed.");
        } finally {
          if (sendButton) {
            sendButton.disabled = false;
            sendButton.textContent = originalButtonText;
          }
        }
      }

      function wireComposerShortcuts() {
        const textEl = document.getElementById("messageText");
        if (!textEl) return;

        textEl.addEventListener("keydown", async (event) => {
          if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            await sendMessage();
          }
        });
      }

      window.addEventListener("DOMContentLoaded", async () => {
        const ok = await requireSession();
        if (!ok) return;

        await loadAvailableProfiles();
        const params = new URLSearchParams(window.location.search);
        selectedConversationJobFilter = params.get("jobFilter") || "";
        selectedConversationPersonFilter = params.get("personFilter") || "";
        const resolvedProfile = resolveProfileFromParams(params);
        if (resolvedProfile) {
          setActiveProfile(resolvedProfile.type, resolvedProfile.id, { replaceUrl: true });
        }
        renderProfileScopeCard();

        document.getElementById("sendMessageBtn")?.addEventListener("click", sendMessage);
        wireComposerShortcuts();
        document.getElementById("conversationJobFilter")?.addEventListener("change", (event) => {
          selectedConversationJobFilter = event.target.value || "";
          updateConversationFilterUrl();
          renderConversationList();
        });
        document.getElementById("conversationPersonFilter")?.addEventListener("change", (event) => {
          selectedConversationPersonFilter = event.target.value || "";
          updateConversationFilterUrl();
          renderConversationList();
        });

        await ensureConversationFromQuery();
        await loadConversations();
      });
    })();
  </script>
</body>
</html>
