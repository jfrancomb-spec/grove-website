<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grove | Messages</title>

  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" type="image/png" href="./MainIcon.png" />
</head>

<body>
  <div id="header-placeholder"></div>

  <main>
    <!-- Hero -->
    <div class="hero">
      <h1>Messages</h1>
      <div class="subtitle">
        View your conversations and send messages.
      </div>
    </div>

    <!-- Messaging layout -->
    <section>
      <div class="messages-layout">
        <div class="form-card">
          <h2 class="mt-0">Inbox</h2>
          <div id="conversationList"></div>
        </div>

        <div class="form-card">
          <h2 class="mt-0">Conversation</h2>
          <div id="threadHeader" class="mb-16 text-muted">Select a conversation to view messages.</div>
          <div id="messageThread" class="message-thread"></div>

          <div id="messageComposer" style="display:none;">
            <div class="row">
              <textarea id="messageText" placeholder="Write your message..."></textarea>
            </div>
            <button class="button" id="sendMessageBtn" type="button">Send Message</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./app.js"></script>

  <script>
    // -----------------------------------
    // Page state
    // -----------------------------------
    let currentUser = null;
    let allMessages = [];
    let selectedUserId = null;
    let userInfoMap = {};

    // -----------------------------------
    // Helpers
    // -----------------------------------
    function formatMessageTime(ts) {
      try {
        return new Date(ts).toLocaleString();
      } catch {
        return "";
      }
    }

    function groupMessagesByOtherUser(messages, currentUserId) {
      const map = {};

      messages.forEach((msg) => {
        const otherUserId = msg.sender_id === currentUserId ? msg.receiver_id : msg.sender_id;
        if (!map[otherUserId]) map[otherUserId] = [];
        map[otherUserId].push(msg);
      });

      Object.values(map).forEach((group) => {
        group.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
      });

      return map;
    }

    function formatCaregiverName(profile) {
      const first = profile.first_name || "";
      const lastInitial = profile.last_name ? `${profile.last_name.charAt(0)}.` : "";
      return `${first} ${lastInitial}`.trim() || "Caregiver";
    }

    function formatFamilyName(profile) {
      const first = profile.first_name || "";
      const lastInitial = profile.last_name ? `${profile.last_name.charAt(0)}.` : "";
      return `${first} ${lastInitial}`.trim() || "Family";
    }

    function getDisplayName(userId) {
      return userInfoMap[userId]?.name || "Conversation";
    }

    function getDisplayPhoto(userId) {
      return userInfoMap[userId]?.photo_url || "";
    }

    function getConversationAvatar(userId) {
      const photo = getDisplayPhoto(userId);
      const name = getDisplayName(userId);
      const initial = name ? name.charAt(0).toUpperCase() : "?";

      if (photo) {
        return `<img class="conversation-avatar" src="${photo}" alt="${name}">`;
      }

      return `<div class="conversation-avatar conversation-avatar-fallback">${initial}</div>`;
    }

    // -----------------------------------
    // Session
    // -----------------------------------
    async function loadSession() {
      const { data } = await window.db.auth.getSession();
      currentUser = data?.session?.user || null;

      if (!currentUser) {
        document.getElementById("conversationList").innerHTML = "<p>Please sign in first.</p>";
        document.getElementById("threadHeader").textContent = "You must be signed in to view messages.";
        return false;
      }

      return true;
    }

    // -----------------------------------
    // Load messages for current user
    // -----------------------------------
    async function loadMessages() {
      const { data, error } = await window.db
        .from("messages")
        .select("*")
        .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`)
        .order("created_at", { ascending: true });

      if (error) {
        handleError(error, "Unable to load messages");
        return;
      }

      allMessages = data || [];
      await loadConversationInfo();
      renderConversationList();
      renderThreadFromQuery();
    }

    // -----------------------------------
    // Load names + photos for other users
    // -----------------------------------
    async function loadConversationInfo() {
      const otherUserIds = Array.from(
        new Set(
          allMessages.map((msg) =>
            msg.sender_id === currentUser.id ? msg.receiver_id : msg.sender_id
          )
        )
      );

      if (!otherUserIds.length) {
        userInfoMap = {};
        return;
      }

      userInfoMap = {};

      const { data: caregiverProfiles, error: caregiverError } = await window.db
        .from("caregiver_profiles")
        .select("user_id, first_name, last_name, photo_url")
        .in("user_id", otherUserIds);

      if (!caregiverError && caregiverProfiles) {
        caregiverProfiles.forEach((profile) => {
          userInfoMap[profile.user_id] = {
            name: formatCaregiverName(profile),
            photo_url: profile.photo_url || ""
          };
        });
      } else if (caregiverError) {
        console.error(caregiverError);
      }

      const { data: familyProfiles, error: familyError } = await window.db
        .from("family_profiles")
        .select("user_id, first_name, last_name, photo_url")
        .in("user_id", otherUserIds);

      if (!familyError && familyProfiles) {
        familyProfiles.forEach((profile) => {
          if (!userInfoMap[profile.user_id]) {
            userInfoMap[profile.user_id] = {
              name: formatFamilyName(profile),
              photo_url: profile.photo_url || ""
            };
          }
        });
      } else if (familyError) {
        console.error(familyError);
      }
    }

    // -----------------------------------
    // Render inbox list
    // -----------------------------------
    function renderConversationList() {
      const container = document.getElementById("conversationList");
      container.innerHTML = "";

      if (!allMessages.length) {
        container.innerHTML = "<p>No conversations yet.</p>";
        return;
      }

      const grouped = groupMessagesByOtherUser(allMessages, currentUser.id);
      const userIds = Object.keys(grouped);

      userIds.sort((a, b) => {
        const lastA = grouped[a][grouped[a].length - 1];
        const lastB = grouped[b][grouped[b].length - 1];
        return new Date(lastB.created_at) - new Date(lastA.created_at);
      });

      userIds.forEach((userId) => {
        const thread = grouped[userId];
        const last = thread[thread.length - 1];
        const unreadCount = thread.filter(
          (m) => m.receiver_id === currentUser.id && !m.is_read
        ).length;

        const button = document.createElement("button");
        button.type = "button";
        button.className = "conversation-item";
        if (selectedUserId === userId) button.classList.add("active");

        button.innerHTML = `
          <div class="conversation-row">
            ${getConversationAvatar(userId)}
            <div class="conversation-main">
              <div class="conversation-top">
                <span><strong>${getDisplayName(userId)}</strong></span>
                ${unreadCount ? `<span class="unread-pill">${unreadCount}</span>` : ""}
              </div>
              <div class="conversation-preview">${last.message_text || ""}</div>
              <div class="conversation-time">${formatMessageTime(last.created_at)}</div>
            </div>
          </div>
        `;

        button.addEventListener("click", () => {
          selectedUserId = userId;
          const url = new URL(window.location.href);
          url.searchParams.set("user", userId);
          window.history.replaceState({}, "", url);
          renderConversationList();
          renderSelectedThread();
        });

        container.appendChild(button);
      });
    }

    // -----------------------------------
    // Read selected thread from query string
    // -----------------------------------
    function renderThreadFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const requestedUser = params.get("user");

      if (requestedUser) {
        selectedUserId = requestedUser;
        renderConversationList();
        renderSelectedThread();
      }
    }

    // -----------------------------------
    // Render selected thread
    // -----------------------------------
    async function renderSelectedThread() {
      const threadHeader = document.getElementById("threadHeader");
      const threadEl = document.getElementById("messageThread");
      const composer = document.getElementById("messageComposer");

      threadEl.innerHTML = "";

      if (!selectedUserId) {
        threadHeader.textContent = "Select a conversation to view messages.";
        composer.style.display = "none";
        return;
      }

      threadHeader.textContent = `Conversation with ${getDisplayName(selectedUserId)}`;
      composer.style.display = "block";

      const thread = allMessages.filter((msg) => {
        return (
          (msg.sender_id === currentUser.id && msg.receiver_id === selectedUserId) ||
          (msg.sender_id === selectedUserId && msg.receiver_id === currentUser.id)
        );
      });

      if (!thread.length) {
        threadEl.innerHTML = "<p>No messages yet. Start the conversation below.</p>";
        return;
      }

      thread.forEach((msg) => {
        const div = document.createElement("div");
        div.className =
          msg.sender_id === currentUser.id
            ? "message-bubble sent"
            : "message-bubble received";

        div.innerHTML = `
          <div>${msg.message_text}</div>
          <div class="message-time">${formatMessageTime(msg.created_at)}</div>
        `;

        threadEl.appendChild(div);
      });

      threadEl.scrollTop = threadEl.scrollHeight;
      await markMessagesRead(thread);
    }

    // -----------------------------------
    // Mark received messages as read
    // -----------------------------------
    async function markMessagesRead(thread) {
      const unreadIds = thread
        .filter((msg) => msg.receiver_id === currentUser.id && !msg.is_read)
        .map((msg) => msg.id);

      if (!unreadIds.length) return;

      const { error } = await window.db
        .from("messages")
        .update({ is_read: true })
        .in("id", unreadIds);

      if (error) {
        console.error(error);
        return;
      }

      allMessages = allMessages.map((msg) =>
        unreadIds.includes(msg.id) ? { ...msg, is_read: true } : msg
      );

      renderConversationList();
    }

    // -----------------------------------
    // Send a message
    // -----------------------------------
    async function sendMessage() {
      const textEl = document.getElementById("messageText");
      const text = textEl.value.trim();

      if (!selectedUserId) {
        alert("No conversation selected.");
        return;
      }

      if (!text) return;

      const payload = {
        sender_id: currentUser.id,
        receiver_id: selectedUserId,
        message_text: text
      };

      const { error } = await window.db
        .from("messages")
        .insert([payload]);

      if (error) {
        handleError(error, "Message send failed");
        return;
      }

      textEl.value = "";
      await loadMessages();
      await renderSelectedThread();
    }

    // -----------------------------------
    // Init
    // -----------------------------------
    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await loadSession();
      if (!ok) return;

      document.getElementById("sendMessageBtn")?.addEventListener("click", sendMessage);
      await loadMessages();
    });
  </script>
</body>
</html>
