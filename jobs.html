<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grove | Care Jobs</title>

<link rel="stylesheet" href="./styles.css">
<link rel="icon" type="image/png" href="./MainIcon.png">

</head>
<body>

<div id="header-placeholder"></div>

<div class="hero">
<h1>Care Jobs</h1>
<div class="subtitle">
Browse local care opportunities in the Grove network.
</div>
</div>

<section>

<div id="jobsContainer" class="cards"></div>

</section>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="./app.js"></script>

<script>

async function loadJobs() {

const { data, error } = await db
.from("job_posts")
.select("*")
.order("created_at", { ascending:false });

const container = document.getElementById("jobsContainer");

container.innerHTML = "";

data.forEach(job => {

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
  <h3>${job.title}</h3>
  <p><strong>Type:</strong> ${job.care_type}</p>
  <p><strong>Location:</strong> ${job.location}</p>
  <p><strong>Schedule:</strong> ${job.schedule}</p>
  ${job.pay_range ? `<p><strong>Pay:</strong> ${job.pay_range}</p>` : ``}
  <p>${job.description}</p>

<a class="button" href="./apply.html?job_id=${job.id}">Apply for this job</a>
`;

container.appendChild(card);

});

}

loadJobs();

</script>

</body>
</html>
