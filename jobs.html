<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grove | Care Jobs</title>

<link rel="stylesheet" href="./styles.css">
<link rel="icon" type="image/png" href="./MainIcon.png">

</head>
<body>

<div id="header-placeholder"></div>

<div class="hero">
<h1>Care Jobs</h1>
<div class="subtitle">
Browse local care opportunities in the Grove network.
</div>
</div>

<section>
<div class="form-card" style="margin-bottom:16px;">
  <h2 style="margin-top:0;">Filter Jobs</h2>

  <div class="row">
    <select id="jobFilterType">
      <option value="">All care types</option>
      <option>Childcare</option>
      <option>Senior Care</option>
      <option>Pet Care</option>
      <option>Household Help</option>
      <option>Other</option>
    </select>
  </div>

  <div class="row">
    <input id="jobFilterLocation" type="text" placeholder="Filter by city/neighborhood (optional)">
  </div>
<p id="jobsCount" style="margin:8px 0 0 0; font-weight:600;"></p>
  <button class="button" type="button" id="jobFilterBtn">Apply Filters</button>
</div>
<div id="jobsContainer" class="cards"></div>

</section>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="./app.js"></script>

<script>
(function () {
  let allJobs = [];

  function renderJobs(list) {
    const container = document.getElementById("jobsContainer");
    const countEl = document.getElementById("jobsCount");

    if (countEl) countEl.textContent = `${list.length} job(s) shown`;

    container.innerHTML = "";
    if (!list.length) {
      container.innerHTML = "<p>No jobs match those filters yet.</p>";
      return;
    }

    list.forEach((job) => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <h3>${job.title}</h3>
        <p><strong>Type:</strong> ${job.care_type}</p>
        <p><strong>Location:</strong> ${job.location}</p>
        <p><strong>Schedule:</strong> ${job.schedule}</p>
        ${job.pay_range ? `<p><strong>Pay:</strong> ${job.pay_range}</p>` : ``}
        <p>${job.description}</p>
        <a class="button" href="./apply.html?job_id=${job.id}">Apply for this job</a>
      `;
      container.appendChild(card);
    });
  }

  function applyFilters() {
    const typeVal = (document.getElementById("jobFilterType")?.value || "").trim().toLowerCase();
    const locVal = (document.getElementById("jobFilterLocation")?.value || "").trim().toLowerCase();

    const filtered = allJobs.filter((job) => {
      const jobType = (job.care_type || "").trim().toLowerCase();
      const jobLoc = (job.location || "").trim().toLowerCase();

      const typeOk = !typeVal || jobType === typeVal;
      const locOk = !locVal || jobLoc.includes(locVal);

      return typeOk && locOk;
    });

    renderJobs(filtered);
  }

  async function loadJobsOnce() {
    // Wait until window.db exists (guards against load order issues)
    let tries = 0;
    while (!window.db && tries < 40) {
      await new Promise((r) => setTimeout(r, 50));
      tries++;
    }
    if (!window.db) {
      document.getElementById("jobsContainer").innerHTML =
        "<p>Database connection not ready. Please refresh.</p>";
      return;
    }

    const { data, error } = await window.db
      .from("job_posts")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) {
      document.getElementById("jobsContainer").innerHTML =
        "<p>Unable to load jobs right now.</p>";
      console.error(error);
      return;
    }

    allJobs = data || [];
    applyFilters();
  }

  window.addEventListener("DOMContentLoaded", () => {
    // Wire filters
    document.getElementById("jobFilterBtn")?.addEventListener("click", () => {
      console.log("Apply Filters clicked");
      applyFilters();
    });

    // Optional: auto-filter as they type/select
    document.getElementById("jobFilterType")?.addEventListener("change", applyFilters);
    document.getElementById("jobFilterLocation")?.addEventListener("input", applyFilters);

    loadJobsOnce();
  });
})();
</script>

</body>
</html>
