<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grove | Care Jobs</title>

<link rel="stylesheet" href="./styles.css">
<link rel="icon" type="image/png" href="./MainIcon.png">

</head>
<body>

<div id="header-placeholder"></div>

<div class="hero">
<h1>Care Jobs</h1>
<div class="subtitle">
Browse local care opportunities in the Grove network.
</div>
</div>

<section>
<div class="form-card" style="margin-bottom:16px;">
  <h2 style="margin-top:0;">Filter Jobs</h2>

  <div class="row">
    <select id="jobFilterType">
      <option value="">All care types</option>
      <option>Childcare</option>
      <option>Senior Care</option>
      <option>Pet Care</option>
      <option>Household Help</option>
      <option>Other</option>
    </select>
  </div>

  <div class="row">
    <input id="jobFilterLocation" type="text" placeholder="Filter by city/neighborhood (optional)">
  </div>

  <button class="button" type="button" id="jobFilterBtn">Apply Filters</button>
</div>
<div id="jobsContainer" class="cards"></div>

</section>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="./app.js"></script>

<script>
window.addEventListener("DOMContentLoaded", () => {

  async function loadJobs() {
    const typeVal = document.getElementById("jobFilterType")?.value || "";
    const locVal = (document.getElementById("jobFilterLocation")?.value || "").trim();

    let query = window.db
      .from("job_posts")
      .select("*")
      .order("created_at", { ascending: false });

    if (typeVal) query = query.eq("care_type", typeVal);
    if (locVal) query = query.ilike("location", `%${locVal}%`);

    const { data, error } = await query;

    const container = document.getElementById("jobsContainer");
    container.innerHTML = "";

    if (error) {
      container.innerHTML = "<p>Unable to load jobs right now.</p>";
      console.error(error);
      return;
    }

    if (!data || data.length === 0) {
      container.innerHTML = "<p>No jobs match those filters yet.</p>";
      return;
    }

    data.forEach(job => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <h3>${job.title}</h3>
        <p><strong>Type:</strong> ${job.care_type}</p>
        <p><strong>Location:</strong> ${job.location}</p>
        <p><strong>Schedule:</strong> ${job.schedule}</p>
        ${job.pay_range ? `<p><strong>Pay:</strong> ${job.pay_range}</p>` : ``}
        <p>${job.description}</p>
        <a class="button" href="./apply.html?job_id=${job.id}">Apply for this job</a>
      `;
      container.appendChild(card);
    });
  }

  // wire button
  document.getElementById("jobFilterBtn")?.addEventListener("click", loadJobs);

  // initial load
  loadJobs();
});
</script>

</body>
</html>
