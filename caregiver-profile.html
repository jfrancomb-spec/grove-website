<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grove | Caregiver Profile</title>

  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" type="image/png" href="./MainIcon.png" />
</head>

<body>
  <div id="header-placeholder"></div>

  <main>
    <div class="hero">
      <h1>Caregiver Profile</h1>
      <div class="subtitle" id="profileSubtitle">Loading caregiver profile...</div>
    </div>

    <section>
      <div class="form-card" id="profileCard" style="display: none;">
        <div id="profileContent"></div>

        <div class="profile-actions mt-22" id="profileActions">
          <a class="button button-caregiver" id="contactBtn" href="#">Contact This Caregiver</a>
          <a class="button" href="./caregivers.html">Back to Caregivers</a>
        </div>
      </div>

      <div id="profileError" style="display: none;">
        <p>Unable to load this caregiver profile.</p>
        <p class="mt-16">
          <a href="./caregivers.html">← Back to Caregivers</a>
        </p>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./app.js"></script>
  <script src="./browse-helpers.js"></script>

  <script>
    (function () {
      let currentCaregiverParent = null;
      let currentCaregiverVersion = null;
      let currentReviews = [];
      let currentPhotoIndex = 0;

      function formatDisplayName(profile) {
        return formatBrowseDisplayName(profile);
      }

      function getCareTypesText(profile) {
        if (Array.isArray(profile.care_types) && profile.care_types.length) {
          return profile.care_types.join(", ");
        }

        return profile.care_type || "";
      }

      function getProfilePhotos(profile) {
        return getProfilePhotoArray(profile);
      }

      function buildStarsLabel(avgRating) {
        const numeric = Number(avgRating);
        if (Number.isNaN(numeric) || numeric <= 0) return "";
        return `⭐ ${numeric.toFixed(1)}`;
      }

      function buildCaregiverBadges(profile) {
        const badges = [];

        if (profile.has_drivers_license) badges.push("Driver’s License");
        if (profile.cpr_certified) badges.push("CPR Certified");
        if (profile.non_smoker) badges.push("Non-smoker");
        if (profile.non_vaper) badges.push("Non-Vaper");
        if (profile.comfortable_with_cats) badges.push("Cat Friendly");
        if (profile.comfortable_with_dogs) badges.push("Dog Friendly");

        if (!badges.length) return "";

        return `
          <div class="profile-badges">
            ${badges.map((badge) => `<span class="profile-badge">${badge}</span>`).join("")}
          </div>
        `;
      }

      function buildReviewSummary(reviews) {
        if (!Array.isArray(reviews) || !reviews.length) {
          return `<p><strong>Rating:</strong> No reviews yet</p>`;
        }

        const ratings = reviews
          .map((review) => Number(review.rating))
          .filter((rating) => !Number.isNaN(rating));

        if (!ratings.length) {
          return `<p><strong>Rating:</strong> ${reviews.length} review${reviews.length === 1 ? "" : "s"}</p>`;
        }

        const average = ratings.reduce((sum, rating) => sum + rating, 0) / ratings.length;

        return `
          <p>
            <strong>Rating:</strong>
            ${buildStarsLabel(average)}
            (${reviews.length} review${reviews.length === 1 ? "" : "s"})
          </p>
        `;
      }

      function buildReviews(reviews) {
        if (!Array.isArray(reviews) || !reviews.length) {
          return "<p>No reviews yet.</p>";
        }

        return `
          <div class="review-list">
            ${reviews.map((review) => `
              <div class="review-card">
                <p>
                  <strong>${review.reviewer_name || "Anonymous"}</strong>
                  ${review.rating ? `• ${buildStarsLabel(review.rating)}` : ""}
                </p>
                ${review.review_text ? `<p>${review.review_text}</p>` : ""}
              </div>
            `).join("")}
          </div>
        `;
      }

      function buildProfileGallery(profile) {
        const photos = getProfilePhotos(profile);

        if (!photos.length) return "";

        const safeIndex = Math.min(currentPhotoIndex, photos.length - 1);
        const mainPhoto = photos[safeIndex];
        const displayName = formatDisplayName(profile);

        return `
          <div class="profile-photo-gallery profile-detail-gallery">
            <img
              class="profile-detail-main-photo"
              id="mainProfilePhoto"
              src="${mainPhoto}"
              alt="${displayName}"
            >

            ${photos.length > 1 ? `
              <div class="profile-gallery" id="profileGalleryThumbs">
                ${photos.map((photo, index) => `
                  <button
                    type="button"
                    class="profile-thumb-button${index === safeIndex ? " active" : ""}"
                    data-index="${index}"
                    data-photo="${photo}"
                    aria-label="View caregiver photo ${index + 1}"
                  >
                    <img src="${photo}" alt="${displayName} photo ${index + 1}">
                  </button>
                `).join("")}
              </div>
            ` : ""}
          </div>
        `;
      }

      function wireProfileGallery() {
        const gallery = document.getElementById("profileGalleryThumbs");
        const mainPhoto = document.getElementById("mainProfilePhoto");

        if (!gallery || !mainPhoto) return;

        const buttons = gallery.querySelectorAll(".profile-thumb-button");

        buttons.forEach((button) => {
          button.addEventListener("click", () => {
            const newPhoto = button.dataset.photo;
            const index = Number(button.dataset.index);

            if (!newPhoto || Number.isNaN(index)) return;

            currentPhotoIndex = index;
            mainPhoto.src = newPhoto;

            buttons.forEach((btn) => btn.classList.remove("active"));
            button.classList.add("active");
          });
        });
      }

      function renderProfile() {
        if (!currentCaregiverParent || !currentCaregiverVersion) return;

        const parent = currentCaregiverParent;
        const profile = currentCaregiverVersion;

        const displayName = formatDisplayName(profile);
        const careTypes = getCareTypesText(profile);

        const responseTime = parent.average_response_minutes != null
          ? formatResponseTime(parent.average_response_minutes)
          : "";

        const encounters = parent.confirmed_encounters != null
          ? `${parent.confirmed_encounters} confirmed encounter${Number(parent.confirmed_encounters) === 1 ? "" : "s"}`
          : "";

        document.getElementById("profileSubtitle").textContent =
          `${displayName}${careTypes ? ` • ${careTypes}` : ""}${profile.location ? ` • ${profile.location}` : ""}`;

        const contactBtn = document.getElementById("contactBtn");

        if (parent.user_id) {
          contactBtn.style.display = "";
          contactBtn.href = "#";
          contactBtn.onclick = async (event) => {
            event.preventDefault();

            await window.openGroveConversation({
              targetUserId: parent.user_id,
              caregiverProfileId: parent.id
            });
          };
        } else {
          contactBtn.style.display = "none";
        }

        document.getElementById("profileContent").innerHTML = `
          <div class="profile-detail">
            ${buildProfileGallery(profile)}

            <h2 class="text-center">${displayName}</h2>

            ${careTypes ? `<p class="text-center"><strong>Care Types:</strong> ${careTypes}</p>` : ""}
            ${profile.location ? `<p class="text-center"><strong>Location:</strong> ${profile.location}</p>` : ""}
            ${profile.years_experience ? `<p class="text-center"><strong>Experience:</strong> ${profile.years_experience}+ years</p>` : ""}
            ${profile.availability ? `<p class="text-center"><strong>Availability:</strong> ${profile.availability}</p>` : ""}
            ${responseTime ? `<p class="text-center"><strong>Response Time:</strong> ${responseTime}</p>` : ""}
            ${encounters ? `<p class="text-center"><strong>Confirmed Encounters:</strong> ${encounters}</p>` : ""}

            ${buildReviewSummary(currentReviews)}
            ${buildCaregiverBadges(profile)}

            ${profile.bio ? `
              <div class="mt-22">
                <h3 class="mb-6">About</h3>
                <p>${profile.bio}</p>
              </div>
            ` : ""}

            <div class="mt-22">
              <h3 class="mb-6">Reviews</h3>
              ${buildReviews(currentReviews)}
            </div>
          </div>
        `;

        wireProfileGallery();
      }

      async function loadProfile() {
        const params = new URLSearchParams(window.location.search);
        const caregiverId = params.get("id");

        if (!caregiverId) {
          document.getElementById("profileError").style.display = "block";
          return;
        }

        let tries = 0;
        while (!window.db && tries < 40) {
          await new Promise((resolve) => setTimeout(resolve, 50));
          tries++;
        }

        if (!window.db) {
          document.getElementById("profileError").style.display = "block";
          return;
        }

        const { data: caregiverParent, error: caregiverParentError } = await window.db
          .from("caregiver_profiles")
          .select("id, user_id, current_visible_version_id, average_response_minutes, confirmed_encounters")
          .eq("id", caregiverId)
          .not("current_visible_version_id", "is", null)
          .maybeSingle();

        if (caregiverParentError || !caregiverParent) {
          console.error(caregiverParentError);
          document.getElementById("profileError").style.display = "block";
          return;
        }

        const { data: caregiverVersion, error: caregiverVersionError } = await window.db
          .from("caregiver_profile_versions")
          .select("*")
          .eq("id", caregiverParent.current_visible_version_id)
          .eq("is_live", true)
          .in("content_status", ["visible", "approved"])
          .maybeSingle();

        if (caregiverVersionError || !caregiverVersion) {
          console.error(caregiverVersionError);
          document.getElementById("profileError").style.display = "block";
          return;
        }

        const { data: reviews, error: reviewError } = await window.db
          .from("caregiver_reviews")
          .select("*")
          .eq("caregiver_profile_id", caregiverId)
          .eq("is_visible", true)
          .in("content_status", ["visible", "approved"])
          .order("created_at", { ascending: false });

        if (reviewError) {
          console.error(reviewError);
        }

        currentCaregiverParent = caregiverParent;
        currentCaregiverVersion = caregiverVersion;
        currentReviews = reviews || [];
        currentPhotoIndex = 0;

        document.getElementById("profileCard").style.display = "block";
        renderProfile();
      }

      window.addEventListener("DOMContentLoaded", () => {
        loadProfile();
      });
    })();
  </script>
</body>
</html>
